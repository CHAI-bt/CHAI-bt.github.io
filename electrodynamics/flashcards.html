    <script>
        MathJax = {
            tex: {
                inlineMath: [
                    ['$', '$'],
                    ['\\(', '\\)']
                ],
                displayMath: [
                    ['$$', '$$'],
                    ['\\[', '\\]']
                ],
                processEscapes: true
            },
            options: {
                ignoreHtmlClass: 'no-mathjax'
            }
        };

    <style>
        :root {
            --bg: #f7f8fb;
            --surface: #ffffff;
            --surface-hover: #f1f3f6;
            --border: #e2e5ea;
            --text: #1a1d23;
            --text-secondary: #5a5f6b;
            --primary: #dc2626;
            --primary-light: #fef2f2;
            --accent: #2563eb;
            --accent-light: #eef3ff;
            --warn: #d97706;
            --warn-light: #fffbeb;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 280px;
            --header-height: 56px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
            z-index: 10;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 2;
        }
        .sidebar-header h2 {
            font-size: 1.05rem;
            font-weight: 700;
        }
        .sidebar-header .subtitle {
            font-size: 0.76rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .sidebar-nav {
            flex: 1;
            padding: 8px 0;
        }
        .nav-section {
            border-bottom: 1px solid var(--border);
        }
        .nav-section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
        }
        .nav-section-header:hover {
            background: var(--surface-hover);
        }
        .nav-section-header .icon {
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        /* Main */
        .main {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .main-header {
            height: var(--header-height);
            padding: 0 28px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 5;
            gap: 12px;
            flex-shrink: 0;
        }
        .main-header h1 {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .main-header .badge {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
            background: var(--primary-light);
            color: var(--primary);
        }
        .breadcrumb {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }
        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .content-area {
            flex: 1;
            padding: 20px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 900px;
            margin: 0 auto;
            width: 100%;
        }

        /* Flashcard - Responsive */
        .flashcard-container {
            perspective: 1000px;
            cursor: pointer;
            width: 100%;
            max-width: 700px;
            margin-bottom: 20px;
        }
        .flashcard {
            width: 100%;
            min-height: clamp(180px, 30vw, 280px);
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            border-radius: var(--radius);
        }
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            min-height: inherit;
            backface-visibility: hidden;
            border-radius: var(--radius);
            padding: clamp(20px, 4vw, 40px) clamp(20px, 4vw, 36px);
            border: 2px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .flashcard-back {
            transform: rotateY(180deg);
        }
        .flashcard-front .fc-q {
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            font-weight: 600;
        }
        .flashcard-front .fc-hint {
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 12px;
            opacity: 0.7;
        }
        .flashcard-back .fc-a {
            font-size: clamp(0.85rem, 2vw, 1rem);
            line-height: 1.7;
        }
        .flashcard-nav {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .fc-btn {
            padding: 8px 20px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 0.82rem;
            transition: var(--transition);
            font-family: inherit;
            font-weight: 500;
        }
        .fc-btn:hover {
            background: var(--surface-hover);
            border-color: var(--primary);
        }
        .fc-index {
            font-size: 0.82rem;
            color: var(--text-secondary);
            min-width: 60px;
            text-align: center;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d0d4db;
            border-radius: 10px;
        }
        /* ===== Mobile: Hamburger + Drawer ===== */
        .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 44px;
            height: 44px;
            padding: 8px;
            background: transparent;
            border: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .menu-toggle span {
            display: block;
            width: 100%;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: transform 0.3s, opacity 0.3s;
        }
        .menu-toggle.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .sidebar-backdrop.active { opacity: 1; }

        @media (max-width: 768px) {
            body { overflow: auto; height: auto; min-height: 100vh; display: block; }
            .menu-toggle { display: flex; }
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                height: 100dvh;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-backdrop.active { display: block; }
            .main { min-height: 100vh; }
            .main-header { gap: 12px; }
        }

        @media (min-width: 769px) {
            .menu-toggle { display: none !important; }
        }
    </style>
</head>

    <script>
        const flashcardsData = [
            // ---- 第四章：电磁波的传播 ----
            { q: '什么是均匀平面电磁波？', a: '在无源均匀线性介质中，电场和磁场都垂直于传播方向，且在等相位面上场量处处相等的电磁波。基本形式：$\\mathbf{E} = \\mathbf{E}_0 e^{i\\mathbf{k}\\cdot\\mathbf{x}-i\\omega t}$，$\\mathbf{B} = \\mathbf{B}_0 e^{i\\mathbf{k}\\cdot\\mathbf{x}-i\\omega t}$。' },
            { q: '色散关系是什么？', a: '波矢 $k$ 与频率 $\\omega$ 必须满足的关系：$k^2 = \\mu\\epsilon\\omega^2$。由此定义相速度 $v_p = \\omega/k = 1/\\sqrt{\\mu\\epsilon} = c/n$ 和折射率 $n = \\sqrt{\\mu\\epsilon/\\mu_0\\epsilon_0}$。' },
            { q: '电磁波的横波性是什么？', a: '在无源均匀介质中，$\\nabla\\cdot\\mathbf{D}=0$ 和 $\\nabla\\cdot\\mathbf{B}=0$ 给出 $\\mathbf{k}\\cdot\\mathbf{E}_0=0$ 和 $\\mathbf{k}\\cdot\\mathbf{B}_0=0$，即电场和磁场都垂直于传播方向。三者满足右手关系：$\\mathbf{B}_0 = \\sqrt{\\mu\\epsilon}\\,\\mathbf{n}\\times\\mathbf{E}_0$。' },
            { q: '什么是斯托克斯参数？', a: '描述偏振态的四个可测量参数：$s_0=a_1^2+a_2^2$（总强度），$s_1=a_1^2-a_2^2$（线偏振），$s_2=2a_1a_2\\cos\\delta$（45°线偏振），$s_3=2a_1a_2\\sin\\delta$（圆偏振）。满足 $s_0^2=s_1^2+s_2^2+s_3^2$。' },
            { q: '斯涅耳定律的内容？', a: '折射定律：$\\frac{\\sin i}{\\sin r} = \\frac{n\'}{n}$，其中 $i$ 是入射角，$r$ 是折射角，$n$ 和 $n\'$ 分别是两种介质的折射率。' },
            { q: '布儒斯特角是什么？', a: '当入射角满足 $\\tan i_B = n\'/n$ 时，反射光的 p 偏振分量完全消失，此时反射光为纯 s 偏振。此时反射线与折射线垂直：$i_B + r = \\pi/2$。' },
            { q: '什么是全反射？', a: '当光从光密介质射向光疏介质（$n > n\'$），且入射角大于临界角 $\\theta_c = \\arcsin(n\'/n)$ 时，光完全反射回原介质，没有透射光。' },
            { q: '什么是趋肤深度？', a: '电磁波在良导体中传播时，场强衰减到表面值的 $1/e$ 时的深度：$\\delta = \\sqrt{2/(\\omega\\mu\\sigma)}$。频率越高，趋肤深度越小。' },
            { q: '什么是群速度和相速度？', a: '相速度 $v_p = \\omega/k$ 是等相位面的传播速度；群速度 $v_g = d\\omega/dk$ 是波包（能量）的传播速度。在无色散介质中 $v_p = v_g$；有色散时 $v_p \\neq v_g$。' },
            { q: '波导中的 TE、TM、TEM 模式是什么？', a: 'TE 模：电场只有横向分量，纵向磁场不为零；TM 模：磁场只有横向分量，纵向电场不为零；TEM 模：电场和磁场都只有横向分量，纵向都为零。金属波导中不能传播 TEM 模。' },

            // ---- 第五章：电磁波的辐射和散射 ----
            { q: '什么是推迟势？', a: '电磁势在 $t$ 时刻的值依赖于源在更早时刻 $t\' = t - |\\mathbf{x}-\\mathbf{x}'|/c$ 的状态：$\\mathbf{A}(\\mathbf{x},t) = \\frac{\\mu_0}{4\\pi}\\int \\frac{\\mathbf{J}(\\mathbf{x}\',t\')}{|\\mathbf{x}-\\mathbf{x}\'|}d^3x\'$。体现了电磁作用的有限传播速度。' },
            { q: '什么是电偶极辐射？', a: '当振荡电偶极矩 $\\mathbf{p}(t)$ 的频率为 $\\omega$ 时，远场辐射功率角分布为 $\\frac{dP}{d\\Omega} = \\frac{\\mu_0\\omega^4|\\mathbf{p}_0|^2}{32\\pi^2c}\\sin^2\\theta$，总辐射功率 $P = \\frac{\\mu_0\\omega^4|\\mathbf{p}_0|^2}{12\\pi c}$。' },
            { q: '什么是磁偶极辐射？', a: '磁偶极矩 $\\mathbf{m}$ 振荡产生的辐射，其辐射功率比电偶极辐射小 $(v/c)^2$ 量级。远场分布形式与电偶极类似，但电场和磁场角色互换。' },
            { q: '什么是汤姆孙散射？', a: '低能光子与自由电子的弹性散射。散射截面 $\\sigma_T = \\frac{8\\pi}{3}r_e^2 \\approx 6.65\\times10^{-29}\\text{m}^2$，其中 $r_e = e^2/(4\\pi\\epsilon_0m_ec^2)$ 是经典电子半径。散射前后光子能量不变。' },
            { q: '什么是康普顿散射？', a: '高能光子与电子的非弹性散射，光子损失能量后波长变长。波长变化 $\\Delta\\lambda = \\frac{h}{m_ec}(1-\\cos\\theta) = \\lambda_C(1-\\cos\\theta)$，其中 $\\lambda_C = h/(m_ec) \\approx 2.43\\times10^{-12}\\text{m}$ 是康普顿波长。' },
            { q: '什么是瑞利散射？', a: '光子能量远小于粒子束缚能时的弹性散射。散射截面 $\\sigma \\propto \\omega^4 \\propto 1/\\lambda^4$，因此短波长（蓝光）比长波长（红光）散射更强，这解释了天空为什么是蓝色的。' },

            // ---- 第六章：运动带电粒子的辐射 ----
            { q: '什么是李纳-维谢尔势？', a: '运动电荷产生的推迟势，考虑了相对论效应。标势 $\\phi = \\frac{q}{4\\pi\\epsilon_0}\\frac{1}{(R-\\mathbf{R}\\cdot\\mathbf{v}/c)}$，矢势 $\\mathbf{A} = \\frac{\\mu_0q}{4\\pi}\\frac{\\mathbf{v}}{(R-\\mathbf{R}\\cdot\\mathbf{v}/c)}$，其中 $\\mathbf{R}$ 是从推迟位置到场点的矢量。' },
            { q: '什么是拉摩公式？', a: '非相对论性加速电荷的辐射功率：$P = \\frac{q^2a^2}{6\\pi\\epsilon_0c^3}$，其中 $a$ 是加速度。功率角分布 $\\frac{dP}{d\\Omega} = \\frac{q^2a^2}{16\\pi^2\\epsilon_0c^3}\\sin^2\\theta$，$\\theta$ 是加速度方向与观察方向的夹角。' },
            { q: '什么是李纳公式？', a: '拉摩公式的相对论推广：$P = \\frac{q^2}{6\\pi\\epsilon_0c}\\gamma^6[(\\dot{\\boldsymbol{\\beta}})^2 - (\\boldsymbol{\\beta}\\times\\dot{\\boldsymbol{\\beta}})^2]$，其中 $\\beta = v/c$，$\\gamma = 1/\\sqrt{1-\\beta^2}$。' },
            { q: '什么是同步辐射？', a: '相对论性电子在磁场中做圆周运动时发出的辐射。特征频率 $\\omega_c = \\frac{3}{2}\\gamma^3\\omega_B$，其中 $\\omega_B = eB/(m_e\\gamma)$ 是回旋频率。辐射集中在前进方向 $\\theta \\sim 1/\\gamma$ 的锥角内。' },
            { q: '什么是切伦可夫辐射？', a: '带电粒子在介质中的速度超过光在介质中的相速度（$v > c/n$）时发出的辐射。辐射角满足 $\\cos\\theta_c = c/(nv)$。产生条件：介质折射率 $n > 1$ 且粒子速度 $v > c/n$。' },
            { q: '什么是辐射阻尼？', a: '加速电荷因辐射而受到的反作用力。亚伯拉罕-洛伦兹力：$\\mathbf{F}_{rad} = \\frac{\\mu_0q^2}{6\\pi c}\\dot{\\mathbf{a}}$。特征时间尺度 $\\tau = \\frac{\\mu_0q^2}{6\\pi m_ec} \\approx 6.24\\times10^{-24}\\text{s}$（电子）。' },
            { q: '经典电子半径是多少？', a: '将电子的静电能 $e^2/(4\\pi\\epsilon_0r_e)$ 等于其静止能量 $m_ec^2$ 得到的特征尺度：$r_e = \\frac{e^2}{4\\pi\\epsilon_0m_ec^2} \\approx 2.82\\times10^{-15}\\text{m}$。' }
        ];

        let fcCurrent = 0;
        let fcOrder = [...Array(flashcardsData.length).keys()];
        let fcFlipped = false;

        function updateFlashcard() {
            const idx = fcOrder[fcCurrent];
            document.getElementById('fcQuestion').innerHTML = flashcardsData[idx].q;
            document.getElementById('fcAnswer').innerHTML = flashcardsData[idx].a;
            document.getElementById('fcIndex').textContent = `${fcCurrent + 1}/${flashcardsData.length}`;
            document.getElementById('fcTotal').textContent = flashcardsData.length;
            fcFlipped = false;
            document.getElementById('flashcard').classList.remove('flipped');
            MathJax.typesetPromise([document.getElementById('flashcard')]);
        }

        function flipCard() {
            fcFlipped = !fcFlipped;
            document.getElementById('flashcard').classList.toggle('flipped', fcFlipped);
        }

        function nextCard(e) {
            e.stopPropagation();
            fcCurrent = (fcCurrent + 1) % flashcardsData.length;
            updateFlashcard();
        }

        function prevCard(e) {
            e.stopPropagation();
            fcCurrent = (fcCurrent - 1 + flashcardsData.length) % flashcardsData.length;
            updateFlashcard();
        }

        function shuffleCards(e) {
            e.stopPropagation();
            for (let i = fcOrder.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [fcOrder[i], fcOrder[j]] = [fcOrder[j], fcOrder[i]];
            }
            fcCurrent = 0;
            updateFlashcard();
        }

        // Sidebar drawer
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const backdrop = document.querySelector('.sidebar-backdrop');
            const btn = document.querySelector('.menu-toggle');
            const isOpen = sidebar.classList.contains('open');
            if (isOpen) {
                sidebar.classList.remove('open');
                backdrop.classList.remove('active');
                btn.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                sidebar.classList.add('open');
                backdrop.classList.add('active');
                btn.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') toggleSidebar(); });
        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', () => { if (window.innerWidth <= 768) toggleSidebar(); });
        });

        // Touch swipe for flashcards
        let touchStartX = 0;
        document.getElementById('flashcardContainer').addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });
        document.getElementById('flashcardContainer').addEventListener('touchend', e => {
            const diff = e.changedTouches[0].screenX - touchStartX;
            if (Math.abs(diff) > 50) { diff > 0 ? prevCard() : nextCard(); }
        });

        updateFlashcard();
    </script>
</body>
</html>
