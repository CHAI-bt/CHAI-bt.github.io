<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第四章：电磁波的传播 · 经典电动力学</title>
    <script>
        MathJax = {
            tex: {
                inlineMath: [['$', '$'], ['\\(', '\\)']],
                displayMath: [['$$', '$$'], ['\\[', '\\)']],
                processEscapes: true
            },
            options: { ignoreHtmlClass: 'no-mathjax' }
        };
    </script>
    <script async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    <style>
        :root {
            --bg: #f7f8fb;
            --surface: #ffffff;
            --surface-hover: #f1f3f6;
            --border: #e2e5ea;
            --text: #1a1d23;
            --text-secondary: #5a5f6b;
            --primary: #dc2626;
            --primary-light: #fef2f2;
            --accent: #2563eb;
            --accent-light: #eef3ff;
            --warn: #d97706;
            --warn-light: #fffbeb;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 280px;
            --header-height: 56px;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
            z-index: 10;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 2;
        }
        .sidebar-header h2 {
            font-size: 1.05rem;
            font-weight: 700;
            color: var(--text);
            letter-spacing: -0.01em;
        }
        .sidebar-header .subtitle {
            font-size: 0.76rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .sidebar-nav { flex: 1; padding: 8px 0; }
        .nav-section { border-bottom: 1px solid var(--border); }
        .nav-section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 10px 20px;
            cursor: pointer;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            transition: var(--transition);
            user-select: none;
            gap: 8px;
            text-decoration: none;
        }
        .nav-section-header:hover { background: var(--surface-hover); }
        .nav-section-header .icon {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
            font-size: 0.85rem;
        }
        .nav-section-header .arrow {
            width: 16px;
            height: 16px;
            transition: transform 0.25s ease;
            flex-shrink: 0;
            opacity: 0.5;
            font-size: 0.65rem;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .nav-section.open .nav-section-header .arrow {
            transform: rotate(90deg);
            opacity: 0.8;
        }
        .nav-subitems {
            display: none;
            padding: 2px 0 8px 36px;
            font-size: 0.78rem;
        }
        .nav-section.open .nav-subitems { display: block; }
        .nav-subitem {
            padding: 4px 10px;
            cursor: pointer;
            color: var(--text-secondary);
            border-radius: var(--radius-sm);
            transition: var(--transition);
            margin: 1px 0;
            font-size: 0.76rem;
            display: block;
            text-decoration: none;
        }
        .nav-subitem:hover, .nav-subitem.active {
            color: var(--primary);
            background: var(--primary-light);
            font-weight: 500;
        }

        /* Main */
        .main {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .main-header {
            height: var(--header-height);
            padding: 0 28px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 5;
            gap: 12px;
            flex-shrink: 0;
        }
        .main-header h1 {
            font-size: 1.1rem;
            font-weight: 700;
            letter-spacing: -0.01em;
        }
        .main-header .badge {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
            background: var(--primary-light);
            color: var(--primary);
        }
        .breadcrumb {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }
        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
        }
        .breadcrumb a:hover { text-decoration: underline; }
        .content-area {
            flex: 1;
            padding: 20px 28px;
            overflow-y: auto;
            max-width: 960px;
        }

        /* Cards */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 20px 22px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            transition: var(--transition);
        }
        .card:hover { box-shadow: var(--shadow); }
        .card h3 {
            font-size: 0.95rem;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .card p, .card li {
            font-size: 0.82rem;
            color: var(--text-secondary);
            line-height: 1.7;
        }
        .card ul { padding-left: 20px; }

        /* Module navigation grid */
        .module-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 12px;
            margin: 10px 0;
        }
        .module-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 16px;
            text-decoration: none;
            color: var(--text);
            transition: var(--transition);
            box-shadow: var(--shadow-sm);
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .module-card:hover {
            box-shadow: var(--shadow);
            border-color: var(--primary);
            transform: translateY(-1px);
        }
        .module-card .module-icon { font-size: 1.6rem; }
        .module-card .module-title {
            font-weight: 700;
            font-size: 0.9rem;
        }
        .module-card .module-desc {
            font-size: 0.76rem;
            color: var(--text-secondary);
        }

        /* Tags */
        .tag {
            display: inline-block;
            font-size: 0.66rem;
            padding: 2px 8px;
            border-radius: 12px;
            font-weight: 500;
            margin-right: 4px;
            margin-bottom: 4px;
        }
        .tag-primary { background: var(--primary-light); color: var(--primary); }
        .tag-accent { background: var(--accent-light); color: var(--accent); }

        /* Highlight box */
        .highlight-box {
            background: var(--primary-light);
            border: 1px solid #c7d6f7;
            border-radius: var(--radius-sm);
            padding: 12px 16px;
            margin: 10px 0;
            font-size: 0.82rem;
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #d0d4db; border-radius: 10px; }

        @media (max-width: 700px) {
            .sidebar { width: 240px; }
            :root { --sidebar-width: 240px; }
        }
    </style>
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-header">
            <h2>📡 第四章：电磁波的传播</h2>
            <div class="subtitle">经典电动力学 · 刘川</div>
        </div>
        <nav class="sidebar-nav">
            <div class="nav-section">
                <a class="nav-section-header" href="index.html">
                    <span class="icon">🏠</span>
                    <span style="flex:1;">返回电动力学首页</span>
                </a>
            </div>
            <div class="nav-section open">
                <div class="nav-section-header" onclick="toggleSection(this)">
                    <span class="icon">📖</span>
                    <span style="flex:1;">本章内容</span>
                    <span class="arrow">▶</span>
                </div>
                <div class="nav-subitems">
                    <a class="nav-subitem active" href="ch4-knowledge.html">知识清单</a>
                    <a class="nav-subitem" href="ch4-test.html">章节测试</a>
                </div>
            </div>
            <div class="nav-section">
                <a class="nav-section-header" href="ch5.html">
                    <span class="icon">📡</span>
                    <span style="flex:1;">第五章：辐射和散射</span>
                    <span style="font-size:0.65rem;opacity:0.5;">→</span>
                </a>
            </div>
            <div class="nav-section">
                <a class="nav-section-header" href="ch6.html">
                    <span class="icon">📡</span>
                    <span style="flex:1;">第六章：运动电荷辐射</span>
                    <span style="font-size:0.65rem;opacity:0.5;">→</span>
                </a>
            </div>
        </nav>
    </aside>

    <!-- Main Content -->
    <div class="main">
        <div class="main-header">
            <span class="breadcrumb"><a href="index.html">电动力学首页</a> › 第四章</span>
            <span class="badge">核心章节</span>
        </div>
        <div class="content-area">

            <div class="card">
                <h3>📡 第四章：电磁波的传播</h3>
                <p>本章涵盖均匀平面电磁波的基本性质、电磁波在介质表面的折射与反射、导电介质中的传播、介质色散的经典模型、电磁信号在色散介质中的传播、各向异性晶体中的电磁波传播、波导与谐振腔等内容。</p>
            </div>

            <div class="card" id="knowledge">
                <h3>📝 知识清单</h3>
                <p>点击下方按钮查看本章完整知识清单：</p>
                <div class="module-grid" style="margin-top:12px;">
                    <a href="ch4-knowledge.html" class="module-card">
                        <div class="module-icon">📝</div>
                        <div class="module-title">知识清单</div>
                        <div class="module-desc">核心知识点梳理</div>
                    </a>
                </div>
            </div>

            <div class="card" id="test">
                <h3>✏️ 章节测试</h3>
                <p>点击下方按钮进入本章交互式测试：</p>
                <div class="module-grid" style="margin-top:12px;">
                    <a href="ch4-test.html" class="module-card">
                        <div class="module-icon">✏️</div>
                        <div class="module-title">章节测试</div>
                        <div class="module-desc">交互式测试练习</div>
                    </a>
                </div>
            </div>

        </div>
    </div>

    <script>
        function toggleSection(header) {
            header.parentElement.classList.toggle('open');
        }

        function scrollToSection(id) {
            const el = document.getElementById(id);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
            document.querySelectorAll('.nav-subitem').forEach(item => item.classList.remove('active'));
            const activeItem = document.querySelector(`.nav-subitem[onclick*="${id}"]`);
            if (activeItem) activeItem.classList.add('active');
        }

        const sections = ['knowledge', 'test'];
        const mainArea = document.querySelector('.content-area');
        mainArea.addEventListener('scroll', () => {
            let current = '';
            sections.forEach(id => {
                const el = document.getElementById(id);
                if (el && el.getBoundingClientRect().top <= 150) current = id;
            });
            document.querySelectorAll('.nav-subitem').forEach(item => item.classList.remove('active'));
            const activeItem = document.querySelector(`.nav-subitem[onclick*="${current}"]`);
            if (activeItem) activeItem.classList.add('active');
        });
    </script>
</body>
</html>
