/* === ExamPass Shared Styles === */
/* Paper-like warm background, clean typography, responsive */

:root {
  --paper: #fdf6e3;

  --divider: #d6c8a8;
  --card-bg: #fef9ef;
  --card-border: #e8dcc8;
  --correct: #22c55e;
  --correct-bg: #f0fdf4;
  --wrong: #ef4444;
  --wrong-bg: #fef2f2;
  --tag-bg: #fef3c7;
  --tag-text: #92400e;
  --radius: 6px;
}

* { box-sizing: border-box; }

body {
  font-family: "Microsoft YaHei", "Noto Sans SC", "SimSun", sans-serif;
  font-size: 12pt; line-height: 1.75; color: var(--ink);

}

@media print {
  body { font-size: 10.5pt; background: #fff; }
  .no-print { display: none !important; }
  h1, h2, h3 { page-break-after: avoid; }
}

/* ── Header ── */
#exampass-header {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 6px 0; margin-bottom: 0;
}
.header-brand { font-size: 1.2em; font-weight: 700; color: #1a1a2e; letter-spacing: 0.3px; }
.header-url  { font-size: 0.78em; color: #999; }
.header-divider { border: none; border-top: 2px solid var(--divider); margin: 4px 0 20px 0; }

/* ── Typography ── */
h1 { font-size: 1.55em; text-align: center; border-bottom: 2px solid var(--divider); padding-bottom: 8px; margin-top: 0; }
h2 { font-size: 1.25em; border-bottom: 1px solid var(--divider); padding-bottom: 4px; margin-top: 28px; }
h3 { font-size: 1.08em; margin-top: 20px; color: var(--ink); }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Tables ── */
table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 0.95em; }
td, th { border: 1px solid var(--card-border); padding: 5px 9px; text-align: left; }
th { background: var(--paper-dark); font-weight: 700; }

/* ── Knowledge point vs explanation ── */
.kp { font-weight: 700; color: var(--ink); }           /* key point: bold dark */
.exp { font-weight: 400; color: var(--ink-light); }    /* explanation: lighter */
.exp em, .exp strong { color: var(--ink); }             /* emphasis inside explanation */

/* ── Block elements ── */
blockquote {
  border-left: 3px solid #c0392b; background: #fef9ef;
  padding: 6px 14px; margin: 10px 0; font-size: 0.95em;
}
code { background: #f0ede0; padding: 2px 5px; border-radius: 3px; font-size: 0.92em; }
pre { background: #f0ede0; padding: 10px; border-radius: var(--radius); overflow-x: auto; }

/* ── TOC ── */
div.toc {
  background: var(--card-bg); padding: 14px 18px;
  border: 1px solid var(--card-border); border-radius: var(--radius); margin-bottom: 22px;
}
div.toc ul { padding-left: 18px; }
div.toc li { margin: 3px 0; font-size: 0.95em; }

/* ── Priority tags ── */
.tag-must   { background: #fee2e2; color: #991b1b; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }
.tag-key    { background: #fef3c7; color: #92400e; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }

.tag-info   { background: #f0fdf4; color: #166534; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }

/* === Interactive Test Styles === */

/* ── Score box ── */
#score-box {
  display: none; background: var(--paper-dark); color: var(--ink);
  padding: 16px 20px; border-radius: var(--radius); margin: 14px 0;
  text-align: center; border: 1px solid var(--card-border);
}
#score-box .score-num { font-size: 2.2em; font-weight: 700; }
#score-box .score-label { font-size: 0.85em; color: var(--ink-light); }

/* ── Question card ── */
.q-card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 12px 14px; margin: 10px 0;

.q-text { margin-bottom: 8px; font-size: 0.98em; }

/* ── Options (compact) ── */
.option {
  display: block; padding: 4px 10px; margin: 3px 0;
  border: 1px solid var(--card-border); border-radius: 4px;
  cursor: pointer; transition: all 0.12s; font-size: 0.93em;
  background: #fefcf5;
}
.option:hover            { background: #f0ede0; }
.option input            { margin-right: 6px; }
.option.selected         { border-color: var(--accent); background: #eff6ff; }
.option.correct-answer   { border-color: var(--correct); background: var(--correct-bg); }
.option.wrong-answer     { border-color: var(--wrong); background: var(--wrong-bg); }

/* ── Textareas (compact) ── */
.q-textarea {
  width: 100%; min-height: 56px; border: 1px solid var(--card-border);
  border-radius: 4px; padding: 6px 10px; font-family: inherit;
  font-size: 0.93em; background: #fefcf5; resize: vertical;
}
.q-textarea:focus { outline: none; border-color: var(--accent); }
.q-code {
  font-family: "Consolas", "Monaco", "Courier New", monospace;
  font-size: 0.88em; line-height: 1.5; background: #1e1e2e; color: #e0e0e0;
  tab-size: 4; white-space: pre;
}
.q-code:focus { border-color: var(--accent); }

/* ── Partial-credit badge ── */
.badge-partial { background: #fef3c7; color: #92400e; }
.q-card.partial { border-color: #f59e0b; }

/* ── Result after grading ── */
.result {
  display: none; margin-top: 8px; padding: 8px 12px;
  background: #fefcf5; border: 1px solid var(--card-border);
  border-radius: 4px; font-size: 0.9em; line-height: 1.6;
}
.result .badge {
  display: inline-block; padding: 1px 9px; border-radius: 3px;
  font-weight: 700; font-size: 0.82em; margin-right: 6px;
}
.badge-ok  { background: var(--correct-bg); color: #166534; }
.badge-no  { background: var(--wrong-bg); color: #991b1b; }
.badge-ref { background: #dbeafe; color: #1e40af; }

.result .explanation { margin-top: 4px; color: var(--ink); }
.result .pitfall { color: #b45309; margin-top: 3px; font-size: 0.9em; }

/* ── Grading button ── */
.grading-bar { text-align: center; margin: 20px 0; }
.grading-bar button {
  font-size: 1em; padding: 8px 32px; background: var(--accent);
  color: #fff; border: none; border-radius: var(--radius);
  cursor: pointer; font-weight: 600; letter-spacing: 0.3px;
}
.grading-bar button:hover     { background: var(--accent-hover); }
.grading-bar button:disabled  { background: #bbb; cursor: not-allowed; }

</style>

<script>
var Q = [{"kc_id": "kc10.1", "cognitive_level": "understand", "difficulty": "medium", "type": "choice", "points": 4, "question": "根据分析哲学的传统定义，知识是得到辩护的真信念（JTB）。以下哪个条件不属于JTB定义的三个必要条件？", "options": ["信念（Belief）：主体S相信命题P", "真（Truth）：命题P为真", "得到辩护（Justification）：S有充分的理由相信P", "确定性（Certainty）：S对P毫不怀疑"], "answer": 3, "explanation": "JTB定义只要求三个条件：信念、真、得到辩护。确定性不是必要条件——一个人可以有充分理由相信某事（得到辩护），但仍然不是绝对确定的。", "pitfall": "易错：误将'确定性'等同于'得到辩护'。得到辩护只需要充分理由，不要求绝对确定。"}, {"kc_id": "kc10.1", "cognitive_level": "remember", "difficulty": "basic", "type": "tf", "points": 2, "question": "在JTB分析中，'得到辩护'意味着主体必须有充分的理由或证据来支持其信念。", "options": [], "answer": 0, "explanation": "正确。JTB定义中的'得到辩护'要求主体有充分的理由或证据来支持其信念，这是知识区别于单纯猜测的关键。", "pitfall": "无"}, {"kc_id": "kc10.2", "cognitive_level": "analyze", "difficulty": "hard", "type": "choice", "points": 5, "question": "盖梯尔（Gettier）的反例挑战了JTB定义。以下哪个场景是典型的盖梯尔案例？", "options": ["小明相信今天是晴天，因为窗外阳光明媚。今天确实是晴天。", "小李看到同事穿着John的衣服，相信那是John。但那其实是另一个人穿着John的衣服，而John本人就在隔壁房间。", "小王通过计算得出2+2=4，并且他确实进行了正确的计算。", "小张相信地球是圆的，因为他读过很多科学书籍。地球确实是圆的。"], "answer": 1, "explanation": "小李有一个得到辩护的真信念——他看到同事穿着John的衣服，有充分理由相信那是John。但信念为假（不是John）。然而如果John恰好在隔壁，这个信念碰巧为'真'（John确实在附近），这就是典型的盖梯尔案例。", "pitfall": "易错：选A。A是正常的JTB案例，不是盖梯尔反例。盖梯尔案例的关键是：信念得到辩护、碰巧为真，但辩护与真理之间没有正确联系。"}, {"kc_id": "kc10.2", "cognitive_level": "remember", "difficulty": "medium", "type": "fill", "points": 4, "question": "盖梯尔在1963年发表的论文《Is Justified True Belief Knowledge?》中提出了____个反例，挑战了JTB定义。这些反例的特点是：主体有得到辩护的____信念，但该信念为____的原因与主体的辩护没有正确联系。", "options": [], "answer": "两；真；真", "explanation": "盖梯尔提出了两个经典反例。这些反例的共同结构是：主体有充分理由相信某事（得到辩护），该命题碰巧为真（真），但主体相信它的理由与它为真的是两件不同的事（缺乏正确联系）。", "pitfall": "无"}, {"kc_id": "kc10.3", "cognitive_level": "apply", "difficulty": "hard", "type": "choice", "points": 5, "question": "针对盖梯尔反例，'可靠主义（Reliabilism）'主张在JTB基础上增加一个条件：信念必须是通过什么过程产生的？", "options": ["可靠的认知过程（如感知、记忆、推理）", "不可靠但幸运的过程", "社会认可的过程", "情感驱动的过程"], "answer": 0, "explanation": "可靠主义认为，知识需要信念是通过可靠的认知过程（如正常的感知、记忆、有效的推理）产生的。盖梯尔案例中的信念虽然得到辩护，但不是通过可靠过程产生的，所以不算知识。", "pitfall": "易错：误以为可靠主义要求信念必须被社会认可。可靠主义关注的是认知过程的可靠性，而非社会认可。"}, {"kc_id": "kc10.4", "cognitive_level": "understand", "difficulty": "medium", "type": "choice", "points": 4, "question": "笛卡尔在《第一哲学沉思集》中提出了'恶魔假设'（evil demon hypothesis）。这个思想实验的主要目的是什么？", "options": ["证明上帝的存在", "展示彻底怀疑的方法，寻找不可怀疑的知识基础", "论证物质世界的实在性", "支持经验主义的认识论"], "answer": 1, "explanation": "笛卡尔的恶魔假设是一个思想实验：如果有一个全能的恶魔在系统性地欺骗我，我如何能确定任何事物的真实性？目的是通过彻底怀疑找到不可怀疑的确定知识基础（我思故我在）。", "pitfall": "无"}, {"kc_id": "kc10.4", "cognitive_level": "analyze", "difficulty": "hard", "type": "short", "points": 6, "question": "简述笛卡尔'我思故我在'（Cogito, ergo sum）的论证结构，并解释为什么他认为这是不可怀疑的。", "options": [], "answer": -1, "explanation": "论证结构：1）我在怀疑一切；2）怀疑是一种思维活动；3）如果我在思维，我就必须存在；4）因此，'我存在'是不可怀疑的确定性。笛卡尔认为，即使恶魔在欺骗我，'我在思维'这件事本身证明了'我存在'——因为思维需要思维者。这是彻底怀疑后唯一不可怀疑的起点。", "pitfall": "易错：误以为'我思故我在'是一个三段论推理。笛卡尔强调这是一种直接的直觉认识，不是从前提推导出结论的三段论。"}, {"kc_id": "kc10.5", "cognitive_level": "apply", "difficulty": "medium", "type": "choice", "points": 4, "question": "柏拉图在《泰阿泰德篇》中探讨了知识与意见的区别。根据柏拉图的观点，知识与意见的根本区别是什么？", "options": ["知识是正确的，意见是错误的", "知识是得到辩护的真信念，意见是未经辩护的信念", "知识具有确定性，意见不具有确定性", "知识是关于理念的，意见是关于现象的"], "answer": 2, "explanation": "柏拉图认为，知识与意见的根本区别在于确定性。知识具有确定性，是永恒不变的；而意见是暂时的、可变的。这是柏拉图理念论的核心观点之一。", "pitfall": "易错：选B。B是现代JTB分析的定义，不是柏拉图的观点。柏拉图关注的是确定性问题。"}, {"kc_id": "kc10.5", "cognitive_level": "remember", "difficulty": "basic", "type": "tf", "points": 2, "question": "根据柏拉图的观点，知识是'得到辩护的真信念'（Justified True Belief）。", "options": [], "answer": 0, "explanation": "正确。柏拉图在《泰阿泰德篇》中首次提出了知识的JTB定义，即知识是得到辩护的真信念。这个定义影响了20世纪分析哲学对知识的分析。", "pitfall": "无"}, {"kc_id": "kc10.1", "cognitive_level": "apply", "difficulty": "hard", "type": "essay", "points": 10, "question": "JTB定义是知识分析的经典理论。请解释JTB定义的三个条件，并说明为什么盖梯尔反例能够挑战这个定义。在你的回答中，请举一个原创的盖梯尔式反例。", "options": [], "answer": -1, "explanation": "JTB三条件：1）信念条件：S相信P；2）真条件：P为真；3）辩护条件：S有充分理由相信P。盖梯尔反例挑战的是：即使三个条件都满足，也可能不算知识。因为主体的辩护与P为真之间可能没有正确联系。原创反例示例：小王看到时钟显示3点，相信现在是3点。时钟坏了，但碰巧就是3点。小王有充分理由（看到时钟）相信现在是3点，且为真，但这个信念的辩护（时钟显示）与为真（碰巧）没有正确联系。", "pitfall": "无"}, {"kc_id": "kc10.2", "cognitive_level": "apply", "difficulty": "medium", "type": "choice", "points": 4, "question": "以下哪个不是对JTB定义的常见补充或修改方案？", "options": ["增加'社会认可'条件（信念被社会大多数人接受）", "增加'可靠性'条件（信念通过可靠过程产生）", "增加'因果联系'条件（信念与事实之间有因果联系）", "增加'无 defeaters'条件（没有击败者）"], "answer": 0, "explanation": "社会认可不是JTB定义的常见补充方案。知识论中常见的补充包括：无击败者条件、可靠性条件、因果联系条件、敏感性条件等。社会认可（多数人接受）不能保证知识的真理性——历史上很多被广泛接受的信念后来被证明是错误的。", "pitfall": "易错：误以为社会认可是知识的一个条件。知识的真理性不取决于社会认可程度。"}, {"kc_id": "kc10.3", "cognitive_level": "understand", "difficulty": "medium", "type": "choice", "points": 4, "question": "诺齐克（Nozick）的'敏感性条件'（sensitivity condition）要求：如果P是假的，S就不会相信P。这个条件主要是为了解决什么问题？", "options": ["解决信念的定义问题", "解决怀疑论的问题", "解决盖梯尔反例的问题", "解决真理的定义问题"], "answer": 2, "explanation": "诺齐克的敏感性条件是针对盖梯尔反例提出的。盖梯尔案例中，主体的信念是'碰巧为真'的——即使P是假的，主体仍然会相信P。敏感性条件排除了这种'碰巧为真'的情况，要求信念必须对事实敏感。", "pitfall": "无"}, {"kc_id": "kc10.4", "cognitive_level": "analyze", "difficulty": "hard", "type": "choice", "points": 5, "question": "普廷格（Plantinga）的'恰当功能论'（Proper Functionalism）认为知识需要认知器官在恰当环境中正常运作。这个观点最接近以下哪种立场？", "options": ["后现代主义认识论", "社会认识论", "女性主义认识论", "自然化的认识论"], "answer": 3, "explanation": "普廷格的恰当功能论是自然化认识论的代表。它试图用自然主义的术语（认知器官的正常功能）来定义知识，而不是用传统的规范性术语（辩护、理由）。", "pitfall": "无"}, {"kc_id": "kc10.5", "cognitive_level": "understand", "difficulty": "basic", "type": "choice", "points": 3, "question": "根据现代知识论，'先验知识'（a priori knowledge）是指不依赖于什么而获得的知识？", "options": ["经验观察", "社会共识", "直觉", "逻辑推理"], "answer": 1, "explanation": "先验知识是指不依赖于经验观察而获得的知识。例如数学和逻辑被认为是先验知识的典型例子。与之相对的是'后验知识'（a posteriori knowledge），它依赖于经验观察。", "pitfall": "无"}, {"kc_id": "kc10.1", "cognitive_level": "evaluate", "difficulty": "hard", "type": "comprehensive", "points": 15, "question": "综合题：知识论的核心问题是'什么是知识？'请比较分析以下三种知识理论的主要观点、优势和困难：（1）经典的JTB分析；（2）可靠主义（Reliabilism）；3）诺齐克的追踪真理理论（Truth-Tracking Theory）。你认为哪一种理论最能解释知识的本质？请给出你的论证。", "options": [], "answer": -1, "explanation": "（1）JTB分析：知识是得到辩护的真信念。优势：直观、清晰。困难：盖梯尔反例。（2）可靠主义：知识是通过可靠认知过程产生的真信念。优势：自然化、排除盖梯尔案例。困难：难以定义什么是'可靠过程'。（3）诺齐克：知识需要敏感性条件（如果P假，S不信P）和适应性条件（如果P真，S相信P）。优势：处理了更多反例。困难：过于复杂、有反例。学生需要提出自己的立场并论证。", "pitfall": "无"}];
var LABELS = {"page_title": "章节测试", "section": {"choice": "一、选择题", "multi": "二、多选题", "tf": "三、判断题", "fill": "四、填空题", "short": "五、简答题", "calc": "六、计算题", "code": "七、代码题", "essay": "八、问答题", "comprehensive": "九、综合题"}, "section_order": ["choice", "multi", "tf", "fill", "short", "calc", "code", "essay", "comprehensive"], "points_suffix": "分", "true_label": "正确", "false_label": "错误", "placeholder": "在此作答...", "code_placeholder": "在此编写代码...", "pitfall_prefix": "易错提醒：", "correct_label": "正确", "wrong_label": "错误", "partial_label": "部分正确", "answer_prefix": "正确答案：", "reference_label": "参考答案", "graded_label": "已批改", "grade_button": "提交批改", "score_label": "总分", "duration_prefix": "满分 100 分 | 建议 ", "duration_suffix": " 分钟 | 选择答案后点击提交批改"};

// ─── Answer normalization (robust to how the JSON was authored) ──────
// tf / choice answers may arrive as int index, boolean, letter ("A"),
// or label string ("正确"/"错误"/"对"/"错"). All are coerced to an
// option index so grading never silently fails on a type mismatch.

function tfAnswerIndex(ans) {
  // option 0 = true_label (正确), option 1 = false_label (错误)
  if (typeof ans === 'boolean') return ans ? 0 : 1;
  if (typeof ans === 'number') return ans === 0 ? 0 : 1;
  var s = ('' + ans).trim().toLowerCase();
  var truthy = ['0', 't', 'true', '正确', '对', '是', 'yes', 'y', '√', '✓'];
  var falsy  = ['1', 'f', 'false', '错误', '错', '否', 'no', 'n', '×', 'x'];
  if (truthy.indexOf(s) !== -1) return 0;
  if (falsy.indexOf(s) !== -1) return 1;
  return ans ? 0 : 1;
}

function choiceAnswerIndex(ans, options) {
  if (typeof ans === 'number') return ans;
  var s = ('' + ans).trim();
  if (/^[A-Za-z]$/.test(s)) return s.toUpperCase().charCodeAt(0) - 65;
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  if (options) {
    for (var i = 0; i < options.length; i++) {
      if (('' + options[i]).trim() === s) return i;
    }
  }
  return parseInt(s, 10);
}

function multiAnswerSet(ans, options) {
  var arr = Array.isArray(ans) ? ans : [ans];
  var set = {};
  for (var i = 0; i < arr.length; i++) {
    set[choiceAnswerIndex(arr[i], options)] = true;
  }
  return set;
}

// Normalize free text for fill-in-the-blank comparison: trim, lowercase,
// drop surrounding whitespace and common punctuation, unify full/half width.
function normText(s) {
  s = ('' + s).trim().toLowerCase();
  s = s.replace(/[\s　]+/g, '');
  s = s.replace(/[.,;:!?。，、；：！？“”"'（）()【】\[\]<>《》]/g, '');
  // full-width ASCII -> half-width
  s = s.replace(/[！-～]/g, function (c) {
    return String.fromCharCode(c.charCodeAt(0) - 0xfee0);
  });
  return s;
}

// How many blanks does a fill question have? Count underscore / ＿ runs.
function fillBlankCount(question) {
  var m = ('' + question).match(/(_{2,}|＿+)/g);
  return m ? m.length : 0;
}

// Coerce a fill `answer` into an array (one entry per blank) of accepted
// answer lists. Handles: string, [synonyms], [[blank1 syns],[blank2 syns]].
function fillBlankAnswers(ans, nBlanks) {
  if (nBlanks < 1) nBlanks = 1;
  if (!Array.isArray(ans)) return padBlanks([[ans]], nBlanks);
  if (ans.length && Array.isArray(ans[0])) return padBlanks(ans, nBlanks);
  // flat array of strings
  if (nBlanks === 1) return [ans];                 // synonyms for one blank
  if (ans.length === nBlanks) {                    // one answer per blank
    return ans.map(function (a) { return [a]; });
  }
  return padBlanks([ans], nBlanks);                // ambiguous -> all on blank 1
}

function padBlanks(arr, n) {
  var out = arr.slice(0, n);
  while (out.length < n) out.push(['']);
  return out;
}

// ─── Build ───────────────────────────────────────────────────────────

function build() {
  var container = document.getElementById('questions-container');
  if (!container) { console.error('ExamPass: questions-container not found'); return; }

  // Stable-sort questions by section order so headings group correctly
  // regardless of input order.
  var order = LABELS.section_order || [];
  Q.forEach(function (q, i) { q._i = i; });
  Q.sort(function (a, b) {
    var oa = order.indexOf(a.type); if (oa === -1) oa = 99;
    var ob = order.indexOf(b.type); if (ob === -1) ob = 99;
    return oa - ob || a._i - b._i;
  });

  var h = '';
  var sec = '';
  var titles = LABELS.section;

  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    if (q.type !== sec) {
      sec = q.type;
      if (titles[q.type]) h += '<h3>' + titles[q.type] + '</h3>';
    }

    var qid = 'q' + i;
    h += '<div class="q-card" id="card-' + qid + '">';
    h += '<div class="q-num">' + (i + 1) + '. (' + q.points + ' ' + LABELS.points_suffix + ')</div>';

    if (q.type === 'fill') {
      h += '<div class="q-text">' + renderFill(q, qid) + '</div>';
    } else {
      h += '<div class="q-text">' + q.question + '</div>';
    }

    if (q.type === 'choice') {
      var opts = q.options || [];
      for (var j = 0; j < opts.length; j++) {
        h += '<label class="option" id="opt-' + qid + '-' + j + '" onclick="sel(\'' + qid + '\',' + j + ')">';
        h += '<input type="radio" name="' + qid + '" value="' + j + '">' + String.fromCharCode(65 + j) + '. ' + opts[j] + '</label>';
      }
    } else if (q.type === 'multi') {
      var mopts = q.options || [];
      for (var k = 0; k < mopts.length; k++) {
        h += '<label class="option" id="opt-' + qid + '-' + k + '" onclick="toggle(\'' + qid + '\',' + k + ')">';
        h += '<input type="checkbox" name="' + qid + '" value="' + k + '">' + String.fromCharCode(65 + k) + '. ' + mopts[k] + '</label>';
      }
    } else if (q.type === 'tf') {
      h += '<label class="option" id="opt-' + qid + '-0" onclick="sel(\'' + qid + '\',0)">';
      h += '<input type="radio" name="' + qid + '" value="0">' + LABELS.true_label + '</label>';
      h += '<label class="option" id="opt-' + qid + '-1" onclick="sel(\'' + qid + '\',1)">';
      h += '<input type="radio" name="' + qid + '" value="1">' + LABELS.false_label + '</label>';
    } else if (q.type === 'fill') {
      // inputs already rendered inline inside q-text
    } else if (q.type === 'code') {
      h += '<textarea class="q-textarea q-code" id="text-' + qid + '" placeholder="' + (LABELS.code_placeholder || LABELS.placeholder) + '" rows="8" spellcheck="false"></textarea>';
    } else {
      h += '<textarea class="q-textarea" id="text-' + qid + '" placeholder="' + LABELS.placeholder + '" rows="3"></textarea>';
    }

    h += '<div class="result" id="result-' + qid + '">';
    h += '<span class="badge" id="badge-' + qid + '"></span><span id="correct-' + qid + '"></span>';
    h += '<div class="explanation">' + (q.explanation || '') + '</div>';
    if (q.pitfall) {
      h += '<div class="pitfall">' + LABELS.pitfall_prefix + q.pitfall + '</div>';
    }
    h += '</div></div>';
  }

  container.innerHTML = h;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]).catch(function (err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

// Render fill question text with inline <input> boxes replacing blanks.
function renderFill(q, qid) {
  var nBlanks = fillBlankCount(q.question);
  var k = 0;
  var html = ('' + q.question).replace(/(_{2,}|＿+)/g, function () {
    var inp = '<input type="text" class="fill-input" id="fill-' + qid + '-' + k + '" autocomplete="off" spellcheck="false">';
    k++;
    return inp;
  });
  if (k === 0) {
    // No markers in text -> append boxes based on answer shape
    var n = fillBlankAnswers(q.answer, 1).length;
    var ans = q.answer;
    if (Array.isArray(ans)) n = Array.isArray(ans[0]) ? ans.length : (ans.length || 1);
    if (n < 1) n = 1;
    html += '<div class="fill-row">';
    for (var b = 0; b < n; b++) {
      if (n > 1) html += '<span class="fill-tag">' + (b + 1) + '.</span>';
      html += '<input type="text" class="fill-input" id="fill-' + qid + '-' + b + '" autocomplete="off" spellcheck="false">';
    }
    html += '</div>';
  }
  return html;
}

document.addEventListener('DOMContentLoaded', build);
if (document.readyState === 'interactive' || document.readyState === 'complete') {
  build();
}

// ─── Selection handlers ──────────────────────────────────────────────

function sel(qid, idx) {
  var prefix = 'opt-' + qid + '-';
  var all = document.querySelectorAll('[id^="' + prefix + '"]');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('selected');
  var target = document.getElementById('opt-' + qid + '-' + idx);
  if (target) target.classList.add('selected');
  var radio = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  if (radio) radio.checked = true;
}

function toggle(qid, idx) {
  var box = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  var label = document.getElementById('opt-' + qid + '-' + idx);
  if (!box) return;
  box.checked = !box.checked;
  if (label) label.classList.toggle('selected', box.checked);
}

// ─── Grading ─────────────────────────────────────────────────────────

function gradeAll() {
  var score = 0;
  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    var qid = 'q' + i;
    var card = document.getElementById('card-' + qid);
    var result = document.getElementById('result-' + qid);
    var badge = document.getElementById('badge-' + qid);
    var correctEl = document.getElementById('correct-' + qid);
    if (!card || !result) continue;

    result.style.display = 'block';

    if (q.type === 'choice' || q.type === 'tf') {
      score += gradeSingle(q, qid, card, badge, correctEl);
    } else if (q.type === 'multi') {
      score += gradeMulti(q, qid, card, badge, correctEl);
    } else if (q.type === 'fill') {
      score += gradeFill(q, qid, card, badge, correctEl);
    } else {
      card.classList.add('correct');
      badge.className = 'badge badge-ref';
      badge.textContent = LABELS.reference_label;
    }
  }

  var sb = document.getElementById('score-box');
  if (sb) {
    sb.style.display = 'block';
    document.getElementById('score-num').textContent = roundScore(score);
    sb.scrollIntoView({ behavior: 'smooth' });
  }

  var opts = document.querySelectorAll('.option');
  for (var a = 0; a < opts.length; a++) opts[a].style.pointerEvents = 'none';
  var tas = document.querySelectorAll('.q-textarea');
  for (var b = 0; b < tas.length; b++) tas[b].disabled = true;
  var fis = document.querySelectorAll('.fill-input');
  for (var c = 0; c < fis.length; c++) fis[c].disabled = true;

  var btn = document.getElementById('grade-btn');
  if (btn) { btn.disabled = true; btn.textContent = LABELS.graded_label; }

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(function (err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

function roundScore(s) {
  return Math.round(s * 10) / 10;
}

function gradeSingle(q, qid, card, badge, correctEl) {
  var ansIdx = q.type === 'tf' ? tfAnswerIndex(q.answer) : choiceAnswerIndex(q.answer, q.options);
  var radio = document.querySelector('input[name="' + qid + '"]:checked');
  if (radio && parseInt(radio.value, 10) === ansIdx) {
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
    correctEl.innerHTML = '';
    var ok = document.getElementById('opt-' + qid + '-' + ansIdx);
    if (ok) ok.classList.add('correct-answer');
    return q.points;
  }
  card.classList.add('wrong');
  badge.className = 'badge badge-no';
  badge.textContent = LABELS.wrong_label;
  var ansText = q.type === 'choice'
    ? String.fromCharCode(65 + ansIdx) + '. ' + (q.options ? q.options[ansIdx] : '')
    : (ansIdx === 0 ? LABELS.true_label : LABELS.false_label);
  correctEl.innerHTML = LABELS.answer_prefix + ansText;
  if (radio) {
    var wrongOpt = document.getElementById('opt-' + qid + '-' + radio.value);
    if (wrongOpt) wrongOpt.classList.add('wrong-answer');
  }
  var corr = document.getElementById('opt-' + qid + '-' + ansIdx);
  if (corr) corr.classList.add('correct-answer');
  return 0;
}

function gradeMulti(q, qid, card, badge, correctEl) {
  var want = multiAnswerSet(q.answer, q.options);
  var wantKeys = Object.keys(want).map(Number);
  var checked = document.querySelectorAll('input[name="' + qid + '"]:checked');
  var picked = [];
  for (var i = 0; i < checked.length; i++) picked.push(parseInt(checked[i].value, 10));

  var anyWrong = false, hitCorrect = 0;
  for (var p = 0; p < picked.length; p++) {
    if (want[picked[p]]) hitCorrect++;
    else anyWrong = true;
  }

  // reveal correct / wrong option markers
  var mopts = q.options || [];
  for (var j = 0; j < mopts.length; j++) {
    var el = document.getElementById('opt-' + qid + '-' + j);
    if (!el) continue;
    if (want[j]) el.classList.add('correct-answer');
    else if (picked.indexOf(j) !== -1) el.classList.add('wrong-answer');
  }

  var earned;
  if (!anyWrong && hitCorrect === wantKeys.length && picked.length === wantKeys.length) {
    earned = q.points;
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
    correctEl.innerHTML = '';
  } else if (!anyWrong && hitCorrect > 0) {
    // 少选不错选 -> partial credit
    earned = roundScore(q.points * hitCorrect / wantKeys.length);
    card.classList.add('partial');
    badge.className = 'badge badge-partial';
    badge.textContent = LABELS.partial_label;
    correctEl.innerHTML = LABELS.answer_prefix + multiAnswerText(wantKeys, mopts);
  } else {
    earned = 0;
    card.classList.add('wrong');
    badge.className = 'badge badge-no';
    badge.textContent = LABELS.wrong_label;
    correctEl.innerHTML = LABELS.answer_prefix + multiAnswerText(wantKeys, mopts);
  }
  return earned;
}

function multiAnswerText(keys, options) {
  return keys.sort(function (a, b) { return a - b; }).map(function (k) {
    return String.fromCharCode(65 + k) + '. ' + (options ? options[k] : '');
  }).join('  ');
}

function gradeFill(q, qid, card, badge, correctEl) {
  var nBlanks = fillBlankCount(q.question);
  var blanks = fillBlankAnswers(q.answer, nBlanks);
  var n = blanks.length;
  var hit = 0;
  var displays = [];

  for (var b = 0; b < n; b++) {
    var inp = document.getElementById('fill-' + qid + '-' + b);
    var accepted = blanks[b] || [''];
    var user = inp ? normText(inp.value) : '';
    var ok = false;
    for (var a = 0; a < accepted.length; a++) {
      if (accepted[a] !== '' && normText(accepted[a]) === user && user !== '') { ok = true; break; }
    }
    if (inp) inp.classList.add(ok ? 'fill-ok' : 'fill-no');
    if (ok) hit++;
    displays.push((n > 1 ? (b + 1) + '. ' : '') + accepted.filter(function (x) { return x !== ''; }).join(' / '));
  }

  var earned = roundScore(q.points * hit / n);
  correctEl.innerHTML = LABELS.answer_prefix + displays.join('   ');

  if (hit === n) {
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
  } else if (hit > 0) {
    card.classList.add('partial');
    badge.className = 'badge badge-partial';
    badge.textContent = LABELS.partial_label;
  } else {
    card.classList.add('wrong');
    badge.className = 'badge badge-no';
    badge.textContent = LABELS.wrong_label;
  }
  return earned;
}
