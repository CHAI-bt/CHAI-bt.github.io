/* ── Result after grading ── */

<script>
var Q = [{"kc_id": "kc3.1", "cognitive_level": "理解", "difficulty": 0.55, "type": "choice", "question": "根据Williamson的观点，哲学与自然科学的关系最准确地体现在以下哪项中？", "options": ["哲学是自然科学的一个分支，其方法论与物理学、化学等学科完全相同", "哲学虽然不同于自然科学，但在知识体系中与自然科学具有连续性，共同构成整体科学事业", "哲学是完全独立于自然科学的人文学科，两者在方法和目标上没有任何重叠", "哲学是自然科学的前身，随着科学发展，哲学将逐渐被具体科学取代"], "answer": "B", "explanation": "Williamson在《What Philosophy Is》中提出：'Philosophy is a non-natural science'，同时强调'…seamlessly…fits into the intellectual landscape of total science'和'Science and philosophy are products of the same natural pursuit of knowledge'。这表明哲学虽然是非自然科学（non-natural science），但在知识体系中与自然科学连续衔接，共同构成整体科学事业。选项A错误地将哲学等同于自然科学分支；选项C割裂了哲学与自然科学的联系，与Williamson的'无缝衔接'观点相悖；选项D是科学主义的立场，与Williamson对哲学价值的肯定不符。", "pitfall": "选A：将'非自然科学'误解为'不属于科学'，未理解Williamson强调的'整体科学图景'（total science）概念；选C：将'非自然'等同于'完全独立'，忽略了'同源'（same natural pursuit）和'无缝衔接'的论述；选D：将哲学的历史渊源误解为可被取代的前科学阶段，未理解Williamson对哲学持续进步的强调。"}, {"kc_id": "kc3.2", "cognitive_level": "记忆", "difficulty": 0.45, "type": "choice", "question": "Williamson在《What Philosophy Is》中提出的关于哲学本性的核心主张是什么？", "options": ["哲学是一种非自然科学，采用系统、批判、证据为基础的探究方式", "哲学是一种艺术创造活动，其价值在于审美体验而非真理追求", "哲学是一种语言分析活动，其任务是消解而非解决问题", "哲学是一种直觉反思活动，其方法类似于文学批评"], "answer": "A", "explanation": "Williamson的核心主张明确表述为：'Philosophy is a non-natural science'和'It is a kind of systematic, critical, evidence-based inquiry'。这表明哲学虽然不是自然科学（如物理、化学），但同样采用系统、批判、证据为基础的探究方式，属于广义的科学事业。选项A将哲学艺术化，与Williamson的'科学'定位不符；选项C是早期分析哲学的某些观点，但Williamby强调哲学能够回答问题而非仅消解问题；选项D将哲学等同于文学批评，与'证据为基础'的立场相悖。", "pitfall": "选A：将题目中'art or science'的表面对比误认为Williamson主张哲学是艺术，未把握其核心论题；选C：将后期维特根斯坦的'治疗性哲学'观点误归Williamson，未区分两种哲学观；选D：将哲学反思的某些特征误认为方法上的文学性，未理解'evidence-based inquiry'的严格要求。"}, {"kc_id": "kc3.3", "cognitive_level": "理解", "difficulty": 0.6, "type": "choice", "question": "Williamson为哲学的进步性提出了多重论证。以下哪项最准确地概括了他关于'逻辑进步'的论证结构？", "options": ["逻辑学是哲学的分支，逻辑学取得了重大进步，因此哲学整体上取得了重大进步", "逻辑学已经发展出形式系统，这证明哲学已经超越了单纯的思辨阶段", "逻辑进步是哲学进步的唯一可靠标准，其他领域无法评估", "逻辑学的进步表明哲学最终可以完全形式化，消除所有模糊性"], "answer": "A", "explanation": "Williamson的Argument 1结构清晰：P1逻辑学是哲学的分支；P2逻辑学取得了重大进步；C哲学取得了重大进步。这是一个有效的演绎推理：如果某学科的一个分支取得了进步，那么该学科整体上也取得了进步。选项B虽然描述了逻辑学的发展状态，但'超越了单纯的思辨阶段'并非Williamson原论证的结论；选项C将逻辑进步的充分性误述为唯一性，Williamson并未排斥其他进步标准；选项D将逻辑学的潜力误述为哲学完全形式化的目标，这并非Williamson的论证重点。", "pitfall": "选B：描述了逻辑学发展的某些特征，但未抓住Williamson论证的逻辑结构（分支→整体的推理）；选C：将'逻辑作为证据之一'误解为'唯一标准'，未理解Williamson的多重论证策略；选D：将形式化的可能性误认为哲学的目标，未区分'进步的工具'与'进步的方向'。"}, {"kc_id": "kc3.4", "cognitive_level": "分析", "difficulty": 0.65, "type": "choice", "question": "Williamson批评'只问不答'的哲学观时，采用了以下哪种论证结构？", "options": ["如果哲学问题无法被回答，那么提问就是徒劳的；哲学问题确实无法被回答；因此哲学的价值不在于提问", "通常提问是为了得到回答；如果哲学问题没有回答的可能，提问就是徒劳的；因此哲学的价值不在于单纯的提问", "如果哲学只是提问，那么哲学就与怀疑论无异；哲学不等于怀疑论；因此哲学不只是提问", "只有回答问题才能产生知识；哲学不回答问题；因此哲学不产生知识"], "answer": "B", "explanation": "Williamson的论证结构是：P1通常提问是为了得到回答（Normally, when asking questions, we want answers）；P2如果哲学问题没有回答的可能，提问就是徒劳的（If we have no chance of answering phil. questions, asking them must be idle）；C哲学的价值不在于提问。选项B准确重建了这一论证。选项A的错误在于小前提'哲学问题确实无法被回答'是一个有争议的断言，而Williamby的论证是条件式的（如果无法回答）；选项C引入了'怀疑论'这一无关概念；选项D的大前提'只有回答问题才能产生知识'过于绝对，不是Williamby的出发点。", "pitfall": "选A：将条件式论证误述为定言判断，未区分'如果无法回答'与'确实无法回答'的逻辑差异；选C：引入无关的怀疑论概念，未识别Williamby论证的核心是对'提问行为'的反思；选D：将'哲学价值'的问题转化为'知识产生'的问题，转移了论题。"}, {"kc_id": "kc3.5", "cognitive_level": "理解", "difficulty": 0.5, "type": "choice", "question": "Williamson认为哲学与自然科学具有'同源性'（same natural pursuit of knowledge），这意味着以下哪项最准确？", "options": ["哲学和自然科学使用完全相同的方法论，仅在研究对象上有所不同", "哲学最终可以还原为自然科学，两者的差异只是暂时的", "哲学和自然科学源于人类相同的认知追求，都是对知识的系统性探索", "自然科学的进步依赖于哲学的先行发展，哲学是自然科学的基础"], "answer": "C", "explanation": "Williamson提出'Science and philosophy are products of the same natural pursuit of knowledge'，强调两者源于人类相同的认知追求（natural pursuit），都是对知识的系统性探索。这种'同源性'是指目标和动力的连续性，而非方法论的完全相同。选项A将'同源'误解为'方法相同'，与'哲学是非自然科学'的论点矛盾；选项C是还原论立场，与Williamby对哲学独立性的强调相悖；选项D将哲学与科学的关系理解为基础与应用，这不是Williamby的'同源性'概念。", "pitfall": "选A：将'同源'误解为'方法相同'，未区分认知目标与方法论工具的层次差异；选C：将'同源'误解为'可还原'，未理解Williamby对哲学独特性的坚持；选D：将哲学与科学的关系单向化，未把握'同源'的平行关系而非从属关系。"}, {"kc_id": "kc3.6", "cognitive_level": "记忆", "difficulty": 0.35, "type": "choice", "question": "爱因斯坦在致Robert Thornton的信中，认为哲学对科学家的价值主要体现在以下哪项中？", "options": ["哲学可以提供具体的科学方法论指导，直接解决科学问题", "哲学训练可以提高科学家的逻辑推理能力，避免科学错误", "哲学的洞察使科学家能够摆脱其时代的偏见，成为真正的真理追求者", "哲学可以帮助科学家获得更多的科研经费和社会支持"], "answer": "C", "explanation": "爱因斯坦在1944年12月7日致Robert Thornton的信中明确指出：'A knowledge of the historic and philosophical background gives that kind of independence from prejudices of his generation from which most scientists are suffering. This independence created by philosophical insight is—in my opinion—the mark of distinction between a mere artisan or specialist and a real seeker after truth.' 即：哲学的洞察使科学家能够摆脱其时代的偏见，这是区分'单纯工匠或专家'与'真正的真理追求者'的标志。选项A将哲学的作用具体化为'直接解决科学问题'，与爱因斯坦强调的'独立性'不符；选项C将哲学价值窄化为逻辑训练，忽略了'历史背景'和'独立性'的核心含义；选项D完全偏离了爱因斯坦的论述。", "pitfall": "选A：将哲学的间接价值（独立性）误解为直接的方法论指导，未区分'解放思维'与'提供工具'；选C：将哲学的一个方面（逻辑）过度推广为全部价值，忽略了爱因斯坦强调的'历史与哲学背景'的整体作用；选D：将哲学的社会功能误认为其核心价值，完全脱离了爱因斯坦的文本。"}, {"kc_id": "kc3.1", "cognitive_level": "理解", "difficulty": 0.55, "type": "tf", "question": "Williamby认为哲学与自然科学之间存在明确的分界线，哲学应当被排除在科学之外。", "options": null, "answer": "否", "explanation": "Williamby明确指出：'Both…to draw a neat line around philosophy and the denial that [it] is part of science stand out as futile and ill-motivated'——在哲学与科学之间划一条清晰的界线，并否认哲学是科学的一部分，这种想法是'徒劳且动机不明的'。Williamby认为哲学虽然是非自然科学，但在知识体系中与自然科学连续衔接，共同构成整体科学事业，两者之间不应有明确的界线。", "pitfall": "误答为'是'：正确理解了Williamby对'哲学是非自然科学'的论述，但将'非自然'误解为'在科学之外'，忽略了'整体科学图景'和'无缝衔接'的论述。"}, {"kc_id": "kc3.2", "cognitive_level": "应用", "difficulty": 0.6, "type": "tf", "question": "根据Williamby的观点，哲学的价值在于提出问题本身，即使这些问题永远无法得到回答。", "options": null, "answer": "否", "explanation": "Williamby明确批评了'只问不答'（asking-without-answering）的哲学观，指出'Those who offer the asking-without-answering model of philosophy have not thought hard enough about what it is to ask a question'。他认为，如果一个问题没有回答的可能，那么提问就是徒劳的（idle），因此哲学的价值不在于单纯的提问。这表明Williamby认为哲学应当追求答案，而非仅满足于提问。", "pitfall": "误答为'是'：将'哲学提问的重要性'误解为'提问本身即有价值'，未区分'提出好问题'与'只问不答'的哲学观差异。"}, {"kc_id": "kc3.3", "cognitive_level": "应用", "difficulty": 0.65, "type": "tf", "question": "Williamby认为，哲学进步的一个重要表现是'发展出更好的模型'（development of better models），这与自然科学的进步方式具有相似性。", "options": null, "answer": "是", "explanation": "Williamby指出：'Much scientific [and philos.] progress consists in the development of better models'——许多科学（和哲学）进步都包含在'发展出更好的模型'中。这表明Williamby认为哲学的进步方式与自然科学有相似之处：两者都通过发展更好的理论模型来推进认识。他还提出Argument 2，强调批评者未认识到'发展更好的模型'本身就是一种进步，而许多哲学领域已经在很大程度上做到了这一点。", "pitfall": "误答为'否'：将哲学的独特性误解为与自然科学完全不同的进步方式，未理解Williamby对'模型发展'这一共通进步模式的强调。"}, {"kc_id": "kc3.4", "cognitive_level": "理解", "difficulty": 0.5, "type": "fill", "question": "Williamby批评'只问不答'哲学观时论证如下：通常情况下，提问是为了得到回答；如果哲学问题没有______的可能，那么提问就是______的；因此哲学的价值不在于单纯的提问。", "options": null, "answer": "回答；徒劳", "explanation": "Williamby的论证结构是：P1通常提问是为了得到回答（Normally, when asking questions, we want answers）；P2如果哲学问题没有回答的可能，提问就是徒劳的（If we have no chance of answering phil. questions, asking them must be idle）；C哲学的价值不在于提问。这一论证表明，提问行为的价值在于获得回答的可能性，如果这种可能性不存在，提问就失去了其认知价值。", "pitfall": "填入'解决'代替'回答'：虽然'解决'也可以搭配问题，但Williamby的原文是'answering'，强调的是对问题的'回答'而非'解决'。填入'无意义'代替'徒劳'：虽然'无意义'也是合理的负面评价，但Williamby使用的是'idle'（徒劳），强调的是提问行为的无效性而非意义缺失。"}, {"kc_id": "kc3.5", "cognitive_level": "记忆", "difficulty": 0.45, "type": "fill", "question": "Williamby认为，哲学与自然科学是'同一自然知识追求'（same natural ______ of knowledge）的产物，两者在知识体系中______衔接。", "options": null, "answer": "pursuit；无缝（或seamlessly）", "explanation": "Williamby提出'Science and philosophy are products of the same natural pursuit of knowledge'（哲学与自然科学是同一自然知识追求的产物）和'…seamlessly…fits into the intellectual landscape of total science'（在整体科学图景中无缝衔接）。这表明哲学与自然科学在认知追求上具有连续性，共同构成完整的知识体系。", "pitfall": "填入'探索'代替'pursuit'：虽然'探索'在中文中也可以，但'pursuit'更强调主动的、持续的'追求'，与'自然'（natural）搭配更贴切。填入'紧密'代替'无缝'：'紧密'虽然也表示连接，但'无缝'（seamlessly）更准确地传达了没有断裂、没有界线的含义。"}, {"kc_id": "kc3.6", "cognitive_level": "应用", "difficulty": 0.55, "type": "fill", "question": "爱因斯坦认为，哲学的洞察能够使科学家获得对其时代______的独立性，这是区分'单纯的工匠或专家'与'真正的______'的标志。", "options": null, "answer": "偏见（prejudices）；真理追求者（seeker after truth）", "explanation": "爱因斯坦在致Robert Thornton的信中指出：'A knowledge of the historic and philosophical background gives that kind of independence from prejudices of his generation... This independence created by philosophical insight is—in my opinion—the mark of distinction between a mere artisan or specialist and a real seeker after truth.' 即：哲学的洞察使科学家能够摆脱其时代的偏见，这是区分'单纯工匠或专家'与'真正的真理追求者'的标志。", "pitfall": "填入'观念'代替'偏见'：虽然'观念'是中性的，但爱因斯坦使用的是'prejudices'（偏见），强调的是需要克服的消极认知倾向。填入'学者'代替'真理追求者'：虽然'学者'也是合理的，但爱因斯坦明确使用的是'seeker after truth'（真理追求者），强调的是对真理的追求而非学术身份。"}, {"kc_id": "kc3.3", "cognitive_level": "分析", "difficulty": 0.7, "type": "short", "question": "Williamby为哲学的进步性提出了三个论证，请简要概括这三个论证的核心逻辑。", "options": null, "answer": "Argument 1: 逻辑学是哲学的分支，逻辑学取得了重大进步，因此哲学整体上取得了重大进步。Argument 2: 批评者未认识到'发展更好的模型'本身就是一种进步，而许多哲学领域已经在很大程度上做到了这一点。Argument 3: 批评者未认识到哲学与其他学科的重叠领域有多少进展，这些重叠领域已经取得了重大进步。", "explanation": "Williamby通过三个并列论证来反驳'哲学没有进步'的观点：(1) 逻辑进步论证：逻辑学作为哲学分支的进步证明了哲学整体的进步；(2) 模型发展论证：许多哲学领域已经发展出更好的理论模型，这本身就是进步；(3) 学科重叠论证：哲学与其他学科的重叠领域已经取得了重大进步，这些进步也是哲学的进步。这三个论证从不同角度论证了哲学的进步性。", "pitfall": "混淆Argument 1和Argument 3：将逻辑学的进步误认为是学科重叠的进步，未区分'分支'与'重叠领域'的逻辑差异。将Argument 2的'模型'等同于具体科学模型：未理解哲学模型的独特性和抽象性。"}, {"kc_id": "kc3.1", "cognitive_level": "分析", "difficulty": 0.75, "type": "essay", "question": "Williamby认为哲学是'非自然科学'，但同时强调哲学与自然科学的连续性和同源性。请分析这两个观点如何能够同时成立，并评价这一立场的哲学意义。", "options": null, "answer": "Williamby的立场可以同时成立，因为'非自然科学'强调的是哲学方法的独特性（不依赖实验、观察等自然科学方法），而'连续性和同源性'强调的是哲学与自然科学在认知目标上的共同性（都是对知识的系统性追求）。这两个观点并不矛盾：在方法论上，哲学不同于自然科学；在认知追求上，哲学与自然科学同属整体科学事业。这一立场的哲学意义在于：既维护了哲学的独立性，又避免了将哲学与人文学科等同的倾向；既承认科学方法的特殊性，又避免了科学主义的还原论；为哲学的进步性提供了理论基础（哲学可以按照自身方式进步，同时与科学保持联系）。", "explanation": "Williamby的哲学观具有辩证性：一方面，哲学不是自然科学（non-natural science），不采用实验、观察等自然科学方法；另一方面，哲学与自然科学是'同一自然知识追求'的产物，在整体科学图景中'无缝衔接'。这种立场既避免了将哲学还原为自然科学的科学主义倾向，又避免了将哲学艺术化的人本主义倾向，为哲学的独特价值和进步性提供了理论基础。", "pitfall": "将'非自然科学'理解为'反科学'：未区分方法论差异与目标对立，误以为Williamby将哲学置于科学的对立面。将'同源性'理解为'方法论相同'：未区分'认知追求'与'具体方法'的层次差异，误以为Williamby取消了哲学的独特性。"}, {"kc_id": "kc3.4", "cognitive_level": "分析", "difficulty": 0.72, "type": "short", "question": "Williamby对'只问不答'哲学观的批评基于什么前提？这一批评对哲学研究的方法论有何启示？", "options": null, "answer": "Williamby的批评基于前提：提问行为的价值在于获得回答的可能性（通常情况下，提问是为了得到回答）。如果一个问题没有回答的可能，那么提问就是徒劳的。这一批评的启示是：哲学研究不应满足于提出问题，而应当致力于构建能够获得答案的理论框架；哲学问题的价值在于其可解性，而非仅仅在于问题的深刻性。", "explanation": "Williamby批评'只问不答'哲学观的核心在于：提问行为本身并非目的，而是获取回答的手段。如果一个问题原则上无法被回答，那么持续提问就失去了认知价值。这一批评要求哲学研究不仅要提出好问题，还要发展出能够回答这些问题的方法论工具，从而推动哲学的实际进步。", "pitfall": "将批评理解为'所有问题都必须有现成答案'：未区分'原则上可解'与'立即可解'，误以为Williamby要求所有哲学问题都有确定的答案。将批评理解为'不应提出困难问题'：未理解Williamby强调的是提问与回答的平衡，而非回避困难问题。"}, {"kc_id": "kc3.5", "cognitive_level": "理解", "difficulty": 0.6, "type": "tf", "question": "Williamby认为哲学与其他学科的重叠领域没有取得任何进展，因此不能作为哲学进步的证据。", "options": null, "answer": "否", "explanation": "Williamby在Argument 3中明确指出：'The critic does not realise how much philosophy overlaps other disciplines. There has been significant progress in these overlap areas.' 这表明Williamby认为哲学与其他学科的重叠领域已经取得了重大进展，这些进展可以作为哲学进步的证据。Williamby批评的是'批评者未认识到'这些重叠领域的进展，而非否认这些进展的存在。", "pitfall": "误答为'是'：将Williamby对批评者的批评误解为对哲学自身进展的否认，未区分'批评者的观点'与'Williamby自己的观点'。"}, {"kc_id": "kc3.6", "cognitive_level": "理解", "difficulty": 0.45, "type": "tf", "question": "爱因斯坦认为，只有专业哲学家才需要学习哲学，普通科学家不需要哲学训练。", "options": null, "answer": "否", "explanation": "爱因斯坦在致Robert Thornton的信中明确指出：'So many people today—and even professional scientists—seem to me like somebody who has seen thousands of trees but has never seen a forest.' 这表明爱因斯坦认为即使是专业科学家（professional scientists）也需要哲学的洞察，否则他们只能看到具体的'树木'（细节），而无法看到'森林'（整体）。爱因斯坦强调哲学对科学家的价值是普遍的，而非仅限于专业哲学家。", "pitfall": "误答为'是'：将爱因斯坦对'专业科学家'的特别提醒误解为'只有哲学家需要哲学'，未理解'even professional scientists'这一强调的普遍性意义。"}, {"kc_id": "kc3.3", "cognitive_level": "理解", "difficulty": 0.55, "type": "fill", "question": "Williamby认为，哲学进步的一个重要表现是'发展出更好的______'（development of better ______），这与自然科学的进步方式具有相似性。", "options": null, "answer": "模型（models）", "explanation": "Williamby明确指出：'Much scientific [and philos.] progress consists in the development of better models'——许多科学（和哲学）进步都包含在'发展出更好的模型'中。这表明Williamby认为哲学的进步方式与自然科学有相似之处：两者都通过发展更好的理论模型来推进认识。", "pitfall": "填入'理论'代替'模型'：虽然'理论'也是合理的，但Williamby明确使用的是'models'（模型），强调的是对现象的概念化表征体系，而非泛指的理论。填入'方法'代替'模型'：未区分'进步的工具'（方法）与'进步的表现'（模型），Williamby强调的是'更好的模型'作为进步的标志。"}, {"kc_id": "kc3.4", "cognitive_level": "应用", "difficulty": 0.65, "type": "fill", "question": "Williamby批评'只问不答'哲学观时指出，那些提出这一观点的人'对提问是什么还没有______思考'（have not thought hard enough about what it is to ask a ______）。", "options": null, "answer": "充分（hard enough）；问题（question）", "explanation": "Williamby的原话是：'Those who offer the asking-without-answering model of philosophy have not thought hard enough about what it is to ask a question.' 这表明Williamby认为'只问不答'的哲学观持有者对'提问'这一行为的本质缺乏深入的思考。提问不仅仅是提出疑问，更是对回答的期待和追求。", "pitfall": "填入'深入'代替'充分'：虽然'深入'也可以，但Williamby使用的是'hard enough'（足够努力/充分），强调的是思考的充分性而非深度。填入'哲学问题'代替'问题'：Williamby使用的是'a question'（问题），泛指一般性的提问行为，而非特指哲学问题。"}];
var LABELS = {"page_title": "章节测试", "section": {"choice": "一、选择题", "multi": "二、多选题", "tf": "三、判断题", "fill": "四、填空题", "short": "五、简答题", "calc": "六、计算题", "code": "七、代码题", "essay": "八、问答题", "comprehensive": "九、综合题"}, "section_order": ["choice", "multi", "tf", "fill", "short", "calc", "code", "essay", "comprehensive"], "points_suffix": "分", "true_label": "正确", "false_label": "错误", "placeholder": "在此作答...", "code_placeholder": "在此编写代码...", "pitfall_prefix": "易错提醒：", "correct_label": "正确", "wrong_label": "错误", "partial_label": "部分正确", "answer_prefix": "正确答案：", "reference_label": "参考答案", "graded_label": "已批改", "grade_button": "提交批改", "score_label": "总分", "duration_prefix": "满分 100 分 | 建议 ", "duration_suffix": " 分钟 | 选择答案后点击提交批改"};

// ─── Answer normalization (robust to how the JSON was authored) ──────
// tf / choice answers may arrive as int index, boolean, letter ("A"),
// or label string ("正确"/"错误"/"对"/"错"). All are coerced to an
// option index so grading never silently fails on a type mismatch.

function tfAnswerIndex(ans) {
  // option 0 = true_label (正确), option 1 = false_label (错误)
  if (typeof ans === 'boolean') return ans ? 0 : 1;
  if (typeof ans === 'number') return ans === 0 ? 0 : 1;
  var s = ('' + ans).trim().toLowerCase();
  var truthy = ['0', 't', 'true', '正确', '对', '是', 'yes', 'y', '√', '✓'];
  var falsy  = ['1', 'f', 'false', '错误', '错', '否', 'no', 'n', '×', 'x'];
  if (truthy.indexOf(s) !== -1) return 0;
  if (falsy.indexOf(s) !== -1) return 1;
  return ans ? 0 : 1;
}

function choiceAnswerIndex(ans, options) {
  if (typeof ans === 'number') return ans;
  var s = ('' + ans).trim();
  if (/^[A-Za-z]$/.test(s)) return s.toUpperCase().charCodeAt(0) - 65;
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  if (options) {
    for (var i = 0; i < options.length; i++) {
      if (('' + options[i]).trim() === s) return i;
    }
  }
  return parseInt(s, 10);
}

function multiAnswerSet(ans, options) {
  var arr = Array.isArray(ans) ? ans : [ans];
  var set = {};
  for (var i = 0; i < arr.length; i++) {
    set[choiceAnswerIndex(arr[i], options)] = true;
  }
  return set;
}

// Normalize free text for fill-in-the-blank comparison: trim, lowercase,
// drop surrounding whitespace and common punctuation, unify full/half width.
function normText(s) {
  s = ('' + s).trim().toLowerCase();
  s = s.replace(/[\s　]+/g, '');
  s = s.replace(/[.,;:!?。，、；：！？“”"'（）()【】\[\]<>《》]/g, '');
  // full-width ASCII -> half-width
  s = s.replace(/[！-～]/g, function (c) {
    return String.fromCharCode(c.charCodeAt(0) - 0xfee0);
  });
  return s;
}

// How many blanks does a fill question have? Count underscore / ＿ runs.
function fillBlankCount(question) {
  var m = ('' + question).match(/(_{2,}|＿+)/g);
  return m ? m.length : 0;
}

// Coerce a fill `answer` into an array (one entry per blank) of accepted
// answer lists. Handles: string, [synonyms], [[blank1 syns],[blank2 syns]].
function fillBlankAnswers(ans, nBlanks) {
  if (nBlanks < 1) nBlanks = 1;
  if (!Array.isArray(ans)) return padBlanks([[ans]], nBlanks);
  if (ans.length && Array.isArray(ans[0])) return padBlanks(ans, nBlanks);
  // flat array of strings
  if (nBlanks === 1) return [ans];                 // synonyms for one blank
  if (ans.length === nBlanks) {                    // one answer per blank
    return ans.map(function (a) { return [a]; });
  }
  return padBlanks([ans], nBlanks);                // ambiguous -> all on blank 1
}

function padBlanks(arr, n) {
  var out = arr.slice(0, n);
  while (out.length < n) out.push(['']);
  return out;
}

// ─── Build ───────────────────────────────────────────────────────────

function build() {
  var container = document.getElementById('questions-container');
  if (!container) { console.error('ExamPass: questions-container not found'); return; }

  // Stable-sort questions by section order so headings group correctly
  // regardless of input order.
  var order = LABELS.section_order || [];
  Q.forEach(function (q, i) { q._i = i; });
  Q.sort(function (a, b) {
    var oa = order.indexOf(a.type); if (oa === -1) oa = 99;
    var ob = order.indexOf(b.type); if (ob === -1) ob = 99;
    return oa - ob || a._i - b._i;
  });

  var h = '';
  var sec = '';
  var titles = LABELS.section;

  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    if (q.type !== sec) {
      sec = q.type;
      if (titles[q.type]) h += '<h3>' + titles[q.type] + '</h3>';
    }

    var qid = 'q' + i;
    h += '<div class="q-card" id="card-' + qid + '">';
    h += '<div class="q-num">' + (i + 1) + '. (' + q.points + ' ' + LABELS.points_suffix + ')</div>';

    if (q.type === 'fill') {
      h += '<div class="q-text">' + renderFill(q, qid) + '</div>';
    } else {
      h += '<div class="q-text">' + q.question + '</div>';
    }

    if (q.type === 'choice') {
      var opts = q.options || [];
      for (var j = 0; j < opts.length; j++) {
        h += '<label class="option" id="opt-' + qid + '-' + j + '" onclick="sel(\'' + qid + '\',' + j + ')">';
        h += '<input type="radio" name="' + qid + '" value="' + j + '">' + String.fromCharCode(65 + j) + '. ' + opts[j] + '</label>';
      }
    } else if (q.type === 'multi') {
      var mopts = q.options || [];
      for (var k = 0; k < mopts.length; k++) {
        h += '<label class="option" id="opt-' + qid + '-' + k + '" onclick="toggle(\'' + qid + '\',' + k + ')">';
        h += '<input type="checkbox" name="' + qid + '" value="' + k + '">' + String.fromCharCode(65 + k) + '. ' + mopts[k] + '</label>';
      }
    } else if (q.type === 'tf') {
      h += '<label class="option" id="opt-' + qid + '-0" onclick="sel(\'' + qid + '\',0)">';
      h += '<input type="radio" name="' + qid + '" value="0">' + LABELS.true_label + '</label>';
      h += '<label class="option" id="opt-' + qid + '-1" onclick="sel(\'' + qid + '\',1)">';
      h += '<input type="radio" name="' + qid + '" value="1">' + LABELS.false_label + '</label>';
    } else if (q.type === 'fill') {
      // inputs already rendered inline inside q-text
    } else if (q.type === 'code') {
      h += '<textarea class="q-textarea q-code" id="text-' + qid + '" placeholder="' + (LABELS.code_placeholder || LABELS.placeholder) + '" rows="8" spellcheck="false"></textarea>';
    } else {
      h += '<textarea class="q-textarea" id="text-' + qid + '" placeholder="' + LABELS.placeholder + '" rows="3"></textarea>';
    }

    h += '<div class="result" id="result-' + qid + '">';
    h += '<span class="badge" id="badge-' + qid + '"></span><span id="correct-' + qid + '"></span>';
    h += '<div class="explanation">' + (q.explanation || '') + '</div>';
    if (q.pitfall) {
      h += '<div class="pitfall">' + LABELS.pitfall_prefix + q.pitfall + '</div>';
    }
    h += '</div></div>';
  }

  container.innerHTML = h;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]).catch(function (err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

// Render fill question text with inline <input> boxes replacing blanks.
function renderFill(q, qid) {
  var nBlanks = fillBlankCount(q.question);
  var k = 0;
  var html = ('' + q.question).replace(/(_{2,}|＿+)/g, function () {
    var inp = '<input type="text" class="fill-input" id="fill-' + qid + '-' + k + '" autocomplete="off" spellcheck="false">';
    k++;
    return inp;
  });
  if (k === 0) {
    // No markers in text -> append boxes based on answer shape
    var n = fillBlankAnswers(q.answer, 1).length;
    var ans = q.answer;
    if (Array.isArray(ans)) n = Array.isArray(ans[0]) ? ans.length : (ans.length || 1);
    if (n < 1) n = 1;
    html += '<div class="fill-row">';
    for (var b = 0; b < n; b++) {
      if (n > 1) html += '<span class="fill-tag">' + (b + 1) + '.</span>';
      html += '<input type="text" class="fill-input" id="fill-' + qid + '-' + b + '" autocomplete="off" spellcheck="false">';
    }
    html += '</div>';
  }
  return html;
}

document.addEventListener('DOMContentLoaded', build);
if (document.readyState === 'interactive' || document.readyState === 'complete') {
  build();
}

// ─── Selection handlers ──────────────────────────────────────────────

function sel(qid, idx) {
  var prefix = 'opt-' + qid + '-';
  var all = document.querySelectorAll('[id^="' + prefix + '"]');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('selected');
  var target = document.getElementById('opt-' + qid + '-' + idx);
  if (target) target.classList.add('selected');
  var radio = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  if (radio) radio.checked = true;
}

function toggle(qid, idx) {
  var box = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  var label = document.getElementById('opt-' + qid + '-' + idx);
  if (!box) return;
  box.checked = !box.checked;
  if (label) label.classList.toggle('selected', box.checked);
}

// ─── Grading ─────────────────────────────────────────────────────────

function gradeAll() {
  var score = 0;
  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    var qid = 'q' + i;
    var card = document.getElementById('card-' + qid);
    var result = document.getElementById('result-' + qid);
    var badge = document.getElementById('badge-' + qid);
    var correctEl = document.getElementById('correct-' + qid);
    if (!card || !result) continue;

    result.style.display = 'block';

    if (q.type === 'choice' || q.type === 'tf') {
      score += gradeSingle(q, qid, card, badge, correctEl);
    } else if (q.type === 'multi') {
      score += gradeMulti(q, qid, card, badge, correctEl);
    } else if (q.type === 'fill') {
      score += gradeFill(q, qid, card, badge, correctEl);
    } else {
      card.classList.add('correct');
      badge.className = 'badge badge-ref';
      badge.textContent = LABELS.reference_label;
    }
  }

  var sb = document.getElementById('score-box');
  if (sb) {
    sb.style.display = 'block';
    document.getElementById('score-num').textContent = roundScore(score);
    sb.scrollIntoView({ behavior: 'smooth' });
  }

  var opts = document.querySelectorAll('.option');
  for (var a = 0; a < opts.length; a++) opts[a].style.pointerEvents = 'none';
  var tas = document.querySelectorAll('.q-textarea');
  for (var b = 0; b < tas.length; b++) tas[b].disabled = true;
  var fis = document.querySelectorAll('.fill-input');
  for (var c = 0; c < fis.length; c++) fis[c].disabled = true;

  var btn = document.getElementById('grade-btn');
  if (btn) { btn.disabled = true; btn.textContent = LABELS.graded_label; }

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(function (err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

function roundScore(s) {
  return Math.round(s * 10) / 10;
}

function gradeSingle(q, qid, card, badge, correctEl) {
  var ansIdx = q.type === 'tf' ? tfAnswerIndex(q.answer) : choiceAnswerIndex(q.answer, q.options);
  var radio = document.querySelector('input[name="' + qid + '"]:checked');
  if (radio && parseInt(radio.value, 10) === ansIdx) {
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
    correctEl.innerHTML = '';
    var ok = document.getElementById('opt-' + qid + '-' + ansIdx);
    if (ok) ok.classList.add('correct-answer');
    return q.points;
  }
  card.classList.add('wrong');
  badge.className = 'badge badge-no';
  badge.textContent = LABELS.wrong_label;
  var ansText = q.type === 'choice'
    ? String.fromCharCode(65 + ansIdx) + '. ' + (q.options ? q.options[ansIdx] : '')
    : (ansIdx === 0 ? LABELS.true_label : LABELS.false_label);
  correctEl.innerHTML = LABELS.answer_prefix + ansText;
  if (radio) {
    var wrongOpt = document.getElementById('opt-' + qid + '-' + radio.value);
    if (wrongOpt) wrongOpt.classList.add('wrong-answer');
  }
  var corr = document.getElementById('opt-' + qid + '-' + ansIdx);
  if (corr) corr.classList.add('correct-answer');
  return 0;
}

function gradeMulti(q, qid, card, badge, correctEl) {
  var want = multiAnswerSet(q.answer, q.options);
  var wantKeys = Object.keys(want).map(Number);
  var checked = document.querySelectorAll('input[name="' + qid + '"]:checked');
  var picked = [];
  for (var i = 0; i < checked.length; i++) picked.push(parseInt(checked[i].value, 10));

  var anyWrong = false, hitCorrect = 0;
  for (var p = 0; p < picked.length; p++) {
    if (want[picked[p]]) hitCorrect++;
    else anyWrong = true;
  }

  // reveal correct / wrong option markers
  var mopts = q.options || [];
  for (var j = 0; j < mopts.length; j++) {
    var el = document.getElementById('opt-' + qid + '-' + j);
    if (!el) continue;
    if (want[j]) el.classList.add('correct-answer');
    else if (picked.indexOf(j) !== -1) el.classList.add('wrong-answer');
  }

  var earned;
  if (!anyWrong && hitCorrect === wantKeys.length && picked.length === wantKeys.length) {
    earned = q.points;
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
    correctEl.innerHTML = '';
  } else if (!anyWrong && hitCorrect > 0) {
    // 少选不错选 -> partial credit
    earned = roundScore(q.points * hitCorrect / wantKeys.length);
    card.classList.add('partial');
    badge.className = 'badge badge-partial';
    badge.textContent = LABELS.partial_label;
    correctEl.innerHTML = LABELS.answer_prefix + multiAnswerText(wantKeys, mopts);
  } else {
    earned = 0;
    card.classList.add('wrong');
    badge.className = 'badge badge-no';
    badge.textContent = LABELS.wrong_label;
    correctEl.innerHTML = LABELS.answer_prefix + multiAnswerText(wantKeys, mopts);
  }
  return earned;
}

function multiAnswerText(keys, options) {
  return keys.sort(function (a, b) { return a - b; }).map(function (k) {
    return String.fromCharCode(65 + k) + '. ' + (options ? options[k] : '');
  }).join('  ');
}

function gradeFill(q, qid, card, badge, correctEl) {
  var nBlanks = fillBlankCount(q.question);
  var blanks = fillBlankAnswers(q.answer, nBlanks);
  var n = blanks.length;
  var hit = 0;
  var displays = [];

  for (var b = 0; b < n; b++) {
    var inp = document.getElementById('fill-' + qid + '-' + b);
    var accepted = blanks[b] || [''];
    var user = inp ? normText(inp.value) : '';
    var ok = false;
    for (var a = 0; a < accepted.length; a++) {
      if (accepted[a] !== '' && normText(accepted[a]) === user && user !== '') { ok = true; break; }
    }
    if (inp) inp.classList.add(ok ? 'fill-ok' : 'fill-no');
    if (ok) hit++;
    displays.push((n > 1 ? (b + 1) + '. ' : '') + accepted.filter(function (x) { return x !== ''; }).join(' / '));
  }

  var earned = roundScore(q.points * hit / n);
  correctEl.innerHTML = LABELS.answer_prefix + displays.join('   ');

  if (hit === n) {
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
  } else if (hit > 0) {
    card.classList.add('partial');
    badge.className = 'badge badge-partial';
    badge.textContent = LABELS.partial_label;
  } else {
    card.classList.add('wrong');
    badge.className = 'badge badge-no';
    badge.textContent = LABELS.wrong_label;
  }
  return earned;
}
