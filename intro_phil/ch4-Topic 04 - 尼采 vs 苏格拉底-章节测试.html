var Q = [{"kc_id": "kc4.1", "cognitive_level": "记忆", "difficulty": 0.35, "type": "choice", "question": "苏格拉底在哲学史上具有独特地位，以下哪项最准确地描述了他的哲学活动特征？", "options": ["他不撰写任何著作，完全通过街头对话与他人探讨哲学问题，最终以饮鸩而死", "他在雅典学园中系统授课，建立了完整的哲学对话体系", "他主要通过书面对话录的形式与后世的哲学家进行思想交流", "他创立了逻辑学体系，将哲学论证形式化以追求确定性"], "answer": "A", "explanation": "苏格拉底（约公元前470–399年）是西方哲学史上最具标志性的哲学家之一，其独特之处在于他完全通过口头对话（在街头、市场、体育馆等公共场所）与他人探讨哲学问题，没有留下任何书面著作。我们对他的思想了解主要来自其学生柏拉图、色诺芬以及同时代喜剧作家阿里斯托芬的记载。公元前399年，苏格拉底被雅典法庭以'不敬神'和'腐蚀青年'的罪名判处饮毒酒而死。选项B描述的是柏拉图（在雅典学园授课），而非苏格拉底；选项C混淆了苏格拉底本人与其学生柏拉图的贡献——是柏拉图以苏格拉底为主角撰写了对话录；选项D将亚里士多德（逻辑学体系的建立者）的贡献误归于苏格拉底。", "pitfall": "选B：混淆了苏格拉底与其学生柏拉图——苏格拉底没有建立任何学园或系统授课机构，这一事业是柏拉图完成的；选C：被'对话录'这一文体误导，误以为苏格拉底本人撰写了对话录，未区分思想主角与文本作者；选D：将亚里士多德的形式逻辑贡献误归苏格拉底，未掌握哲学史的基本时间线。"}, {"kc_id": "kc4.3", "cognitive_level": "理解", "difficulty": 0.5, "type": "choice", "question": "苏格拉底方法（elenchus）的核心特征是什么？", "options": ["通过系统的概念定义来建立知识体系", "通过归纳观察实例来概括普遍规律", "通过不断追问来揭示对话者信念中的不一致或未经理性审视的预设", "通过逻辑演绎来证明哲学命题的必然性"], "answer": "C", "explanation": "苏格拉底方法（elenchus，即'诘问法'或'产婆术'）的核心特征是通过不断追问来揭示对话者信念中的不一致或未经理性审视的预设。根据教材，苏格拉底方法的特征包括：专注于对话者的陈述与信念、不断询问对方是否能跟上推理、不断澄清对方的意义、旨在揭示不合理的预设（uncover incoherent presumptions）。这一方法不是通过建立定义体系（选项A）、归纳观察（选项B）或演绎证明（选项D）来推进，而是通过对话来检验对话者已有的信念是否经得起理性审视。选项A描述的是亚里士多德式的系统性定义方法；选项B描述的是经验归纳法；选项D描述的是几何学式的演绎方法。", "pitfall": "选A：将苏格拉底方法误解为一种建构性的定义方法，未理解其'检验性'而非'建构性'的本质——苏格拉底并不直接给出定义，而是检验他人给出的定义；选B：混淆了苏格拉底方法与经验科学方法，未理解哲学对话与经验观察之间的根本区别；选D：将苏格拉底方法误解为形式逻辑的演绎系统，未理解其'对话-检验'而非'公理-推导'的结构。"}, {"kc_id": "kc4.2", "cognitive_level": "理解", "difficulty": 0.55, "type": "choice", "question": "在柏拉图的《欧绪弗洛篇》中，欧绪弗洛提出'虔诚就是所有神都爱的事物'。苏格拉底对此提出的核心质疑是什么？", "options": ["不同神之间对同一事物可能存在分歧，因此无法确定什么能被所有神共同喜爱", "这一说法只给出了虔诚的外在标志（被神爱），而没有揭示虔诚本身的本质或本性", "这一说法预设了神存在，但苏格拉底本人并不相信奥林匹亚诸神", "这一说法过于宽泛，因为被神爱的事物不一定是虔诚的"], "answer": "B", "explanation": "在《欧绪弗洛篇》中，苏格拉底区分了'是什么'（本质/本性）与'有什么属性/标志'。欧绪弗洛的回答'虔诚就是所有神都爱的事物'只给出了虔诚的一个外在标志（被神爱），而没有回答'虔诚本身是什么'——即其本质或本性（ousia）。苏格拉底明确指出：这一回答最多给出了虔诚的'影响或品质'（affect or quality），而非其'本性'（nature）。选项A是苏格拉底对欧绪弗洛第一个定义（'虔诚就是神爱的事物'）的质疑，而非第三个定义；选项C与文本内容不符——苏格拉底在对话中并未表达个人对神的怀疑；选项D的'过于宽泛'并非苏格拉底在此处的核心质疑方向。", "pitfall": "选A：混淆了欧绪弗洛的三个不同定义——选项A的质疑针对的是第一个定义（'神爱的事物'），而非第三个定义（'所有神都爱的事物'）；选C：将苏格拉底的哲学立场与对话中的论证混淆——苏格拉底在对话中并未表达个人信仰，只是以对话者身份追问定义；选D：将后来的哲学批评（如摩尔的开放问题论证）误植于此，未准确理解苏格拉底在此处的具体论证。"}, {"kc_id": "kc4.4", "cognitive_level": "分析", "difficulty": 0.7, "type": "choice", "question": "尼采对苏格拉底的批判核心是什么？", "options": ["苏格拉底过于关注个人道德修养，忽视了社会正义问题", "苏格拉底的方法论存在逻辑缺陷，其诘问法无法真正达到确定知识", "苏格拉底的政治立场有问题，他支持民主制度而忽视了贵族政治的优越性", "苏格拉底通过理性主义哲学压制了生命本能，将理性置于生命之上，是一种颓废的表现"], "answer": "D", "explanation": "尼采对苏格拉底的批判核心在于：苏格拉底是'理论人'（theoretical man）的典型代表，他通过理性主义哲学将理性、逻辑、知识置于生命本能之上，压抑了人的生命冲动（life-instinct），这种对理性的崇拜在尼采看来是一种颓废（decadence）的表现。尼采在《悲剧的诞生》等著作中指出，苏格拉底标志着希腊文化从悲剧精神（肯定生命中的痛苦与毁灭）向理论乐观主义（相信理性可以解释和解决一切问题）的转变，这一转变是对生命本身的否定。选项A将尼采的批判窄化为社会正义问题，未触及尼采对理性主义本身的批判；选项B将批判聚焦于方法论的'逻辑缺陷'，而非尼采所批判的理性主义对生命的压抑；选项C将批判误植于政治立场，尼采对苏格拉底的批判主要是文化和哲学层面的，而非具体的政治立场之争。", "pitfall": "选A：将尼采的批判窄化为社会正义议题，未理解尼采批判的核心是对理性主义压抑生命本能这一文化和哲学诊断；选B：从分析哲学的角度批评苏格拉底方法论的'逻辑缺陷'，但尼采的批判不是逻辑层面的，而是文化和生命哲学层面的；选C：将批判误植于政治立场之争，未理解尼采对苏格拉底的批判是根本性的文化诊断，而非具体的政策分歧。"}, {"kc_id": "kc4.5", "cognitive_level": "理解", "difficulty": 0.6, "type": "choice", "question": "尼采在《快乐的科学》中提出的'永恒回归'（eternal recurrence）思想实验的核心含义是什么？", "options": ["假设你将要无数次重复完全相同的一生，问题是你会诅咒这个想法还是将其视为最神圣的肯定——这检验了你对生命的根本态度", "宇宙在时间上是循环的，一切事件都会无限重复，因此历史没有真正的进步", "个体灵魂在死后会不断转世，因此死亡不是生命的终结", "时间是相对的，过去、现在、未来在某种意义上是同时存在的"], "answer": "A", "explanation": "尼采在《快乐的科学》中提出的'永恒回归'思想实验是：假设一个恶魔告诉你，你将要无数次重复完全相同的一生——每一个快乐、每一个痛苦、每一个无聊的时刻都将无限重复。问题是你会诅咒这个想法（表明你对生命不满），还是将其视为最神圣的肯定（表明你对生命完全肯定）？这一思想实验的核心是检验一个人对生命的根本态度：是否能够'成为你自己'，热爱命运（amor fati），对生命说'是'。选项B将永恒回归误解为宇宙论命题，但尼采的重点不是宇宙论而是生命态度；选项C将永恒回归误解为灵魂转世说，这是对尼采的误读；选项D将永恒回归与时间的相对性混淆，未理解尼采的'回归'是同一性的重复而非同时性。", "pitfall": "选B：将永恒回归误解为关于宇宙循环的宇宙论命题，但尼采的重点不是宇宙论而是对生命态度的检验——这是哲学思想教条化（literalization）的典型错误；选C：将永恒回归与东方宗教的灵魂转世说混淆，未理解尼采的'回归'是同一生命（而非不同生命）的重复；选D：将永恒回归与物理学的时间相对性混淆，未理解尼采的'回归'是同一性（identity）问题而非同时性（simultaneity）问题。"}, {"kc_id": "kc4.6", "cognitive_level": "分析", "difficulty": 0.65, "type": "choice", "question": "尼采对传统哲学中'真理'和'知识'概念的态度最准确地体现在以下哪项中？", "options": ["他认为真理是客观存在的，但人类永远无法完全认识它", "他认为传统哲学对真理的追求是一种权力意志的表现，'真理'本身可能只是某种特定的生命形式的产物", "他认为真理和知识是虚幻的，人类应该完全放弃对真理的追求", "他认为传统哲学对真理的追求方向正确，但方法有误，需要更严格的逻辑工具"], "answer": "B", "explanation": "尼采对传统哲学中'真理'和'知识'概念的批判性态度是：传统哲学对'真理'的追求本身可能是一种权力意志（will to power）的表现，'真理'并非客观中立的发现，而是某种特定的生命形式（如禁欲主义、理性主义）的产物。尼采质疑：为什么我们追求真理？追求真理背后隐藏着什么样的生命需要？这种批判不是简单地否定真理（选项C），也不是肯定真理追求的方向（选项D），更不是认为真理客观存在但不可知（选项A），而是追问真理追求背后的生命动机和价值取向。选项C是对尼采的过度简化——尼采并非简单地否定真理，而是追问真理追求背后的动机；选项D将尼采的批判误解为方法论层面的修正，未触及尼采对真理概念本身的质疑；选项A将尼采的立场误解为康德的不可知论，未理解尼采不是认为'真理存在但不可知'，而是质疑'真理'这一概念本身。", "pitfall": "选A：将尼采的立场误解为康德的不可知论，未理解尼采不是认为'真理存在但不可知'，而是质疑'真理'这一概念本身；选C：将尼采的批判过度简化为'否定真理'，未理解尼采的批判是追问真理追求背后的动机而非简单地放弃真理追求；选D：将尼采的批判误解为方法论层面的修正，未触及尼采对'真理'概念本身的激进质疑。"}, {"kc_id": "kc4.1", "cognitive_level": "理解", "difficulty": 0.45, "type": "tf", "question": "苏格拉底之死标志着哲学与政治权力之间的根本张力：苏格拉底被雅典民主法庭判处死刑，但他拒绝逃亡，选择饮毒酒而死。这一事件表明苏格拉底认为哲学家应当坚守自己的信念，即使面对死亡也不放弃对真理的追求。", "answer": true, "explanation": "苏格拉底之死是西方哲学史上最具象征意义的事件之一。公元前399年，苏格拉底被雅典法庭以'不敬神'和'腐蚀青年'的罪名判处死刑。据柏拉图的《克里托篇》记载，苏格拉底在狱中拒绝了朋友克里托的逃亡建议，认为即使判决不公正，他也不能因此违反法律、伤害城邦。苏格拉底选择饮毒酒而死，这一行为体现了他对哲学信念的坚守：哲学家应当追求真理和美德，即使面对死亡也不放弃。这一事件也揭示了哲学与政治权力之间的根本张力——哲学追问可能挑战城邦的既有信念和权威。", "pitfall": "误判为False：可能认为苏格拉底'应该逃亡'或'判决是正义的'，但题干的核心是苏格拉底'选择坚守信念'这一事实判断，而非对判决正义性的评价。"}, {"kc_id": "kc4.3", "cognitive_level": "应用", "difficulty": 0.55, "type": "fill", "question": "根据教材中对苏格拉底方法（elenchus）的描述，苏格拉底在对话中通常遵循以下步骤：首先，他对对话者的关切表现出（　　）兴趣；其次，他将对话者作为一个人来（　　）；第三，他专注于对话者的（　　）；第四，他避免表达自己的（　　）；第五，他不断询问对话者是否能（　　）；第六，他积极澄清对话者的（　　）；第七，他不断询问对话者的（　　）；第八，他的目标是揭示对话者信念中（　　）的预设。", "answer": "真诚/诚实；认真对待；陈述与信念；观点/意见；跟上/理解；意义/含义；意思/含义；不合理/不一致/未经理性审视", "explanation": "根据教材中对苏格拉底方法的描述（参见Topic 04 slides 08-09），苏格拉底方法的八个特征是：(a) 对对话者的关切表现出真诚兴趣；(b) 将对话者作为一个人来认真对待；(c) 专注于对话者的陈述与信念；(d) 避免表达自己的观点；(e) 不断询问对话者是否能跟上；(f) 积极澄清对话者的意义；(g) 不断询问对话者的意思；(h) 目标是揭示对话者信念中不合理的预设。这些特征体现了苏格拉底方法的核心精神：通过对话来检验对话者已有的信念，而非直接传授知识。", "pitfall": "将苏格拉底方法误解为'直接传授知识'或'给出正确定义'的方法，未理解其'检验性'而非'建构性'的本质。"}, {"kc_id": "kc4.4", "cognitive_level": "分析", "difficulty": 0.72, "type": "short", "question": "尼采为什么将苏格拉底称为'理论人'（theoretical man）的典型代表？请简要说明尼采对苏格拉底的核心批判。", "answer": "尼采将苏格拉底称为'理论人'的典型代表，是因为苏格拉底将理性、逻辑、知识置于生命本能之上，相信理性可以解释和解决一切问题。尼采认为，苏格拉底的理性主义哲学压抑了人的生命冲动（life-instinct），将抽象的理性概念（如真理、美德、知识）置于具体的生命体验之上，这种对理性的崇拜在尼采看来是一种颓废（decadence）的表现。苏格拉底标志着希腊文化从悲剧精神（肯定生命中的痛苦与毁灭）向理论乐观主义的转变，这一转变是对生命本身的否定。", "explanation": "尼采对苏格拉底的批判核心在于：苏格拉底是理性主义的奠基者，他通过哲学追问将理性、逻辑、知识置于生命本能之上，压抑了人的生命冲动。尼采在《悲剧的诞生》等著作中指出，苏格拉底标志着希腊文化从悲剧精神（肯定生命中的痛苦与毁灭）向理论乐观主义（相信理性可以解释和解决一切问题）的转变。这种对理性的崇拜在尼采看来是一种颓废的表现，因为它否定了生命的本能和创造性。", "pitfall": "将尼采的批判简化为'苏格拉底重视理性'这一表面判断，未深入理解尼采批判的核心是理性主义对生命本能的压抑这一文化和哲学诊断。"}, {"kc_id": "kc4.5", "cognitive_level": "评价", "difficulty": 0.8, "type": "essay", "question": "比较苏格拉底与尼采对'哲学应当如何对待生命'这一问题的不同回答。苏格拉底认为哲学应当通过理性追问来认识美德和真理，即使面对死亡也不放弃对善的追求；尼采则认为传统哲学（以苏格拉底为代表）通过理性主义压抑了生命本能，真正的哲学应当肯定生命本身，包括其中的痛苦与毁灭。请结合'永恒回归'思想实验，分析这两种哲学立场的根本分歧。", "answer": "苏格拉底与尼采对'哲学应当如何对待生命'这一问题的回答代表了西方哲学传统中两种根本不同的取向。苏格拉底认为哲学应当通过理性追问来认识美德和真理，其核心信念是：美德即知识，人作恶是因为无知，通过理性追问可以达到对善的认识。苏格拉底之死体现了他对哲学信念的坚守——即使面对死亡，也不放弃对真理和善的追求。苏格拉底的哲学立场是理性主义的：理性可以认识善，理性应当指导生命。尼采则对苏格拉底的理性主义提出了根本性的批判。尼采认为，苏格拉底将理性置于生命本能之上，压抑了人的生命冲动，这种对理性的崇拜是一种颓废的表现。尼采在《悲剧的诞生》中指出，苏格拉底标志着希腊文化从悲剧精神（肯定生命中的痛苦与毁灭）向理论乐观主义的转变，这一转变是对生命本身的否定。尼采的'永恒回归'思想实验进一步深化了这一批判：假设你将要无数次重复完全相同的一生，问题是你会诅咒这个想法还是将其视为最神圣的肯定？这一思想实验的核心是检验一个人对生命的根本态度：是否能够'成为你自己'，热爱命运（amor fati），对生命说'是'。尼采认为，真正的哲学应当肯定生命本身，包括其中的痛苦与毁灭，而不是通过理性来逃避或否定生命。两种哲学立场的根本分歧在于：苏格拉底认为理性可以认识善，理性应当指导生命；尼采则认为理性可能压抑生命，真正的哲学应当肯定生命本身。这一分歧反映了西方哲学传统中理性主义与生命哲学之间的根本张力。", "explanation": "本题要求学生比较苏格拉底与尼采对'哲学应当如何对待生命'这一问题的不同回答，并结合'永恒回归'思想实验分析两种哲学立场的根本分歧。苏格拉底的哲学立场是理性主义的：理性可以认识善，理性应当指导生命。尼采的哲学立场是生命哲学的：理性可能压抑生命，真正的哲学应当肯定生命本身。'永恒回归'思想实验进一步深化了这一批判：它检验的是一个人对生命的根本态度，而非对生命的外在认识。", "pitfall": "将两种哲学立场的差异简化为'理性vs非理性'的二元对立，未深入理解尼采批判的核心是理性主义对生命本能的压抑这一文化和哲学诊断；或将'永恒回归'误解为宇宙论命题，未理解其作为生命态度检验工具的本质。"}];

// ─── Answer normalization (robust to how the JSON was authored) ──────
// tf / choice answers may arrive as int index, boolean, letter ("A"),
// or label string ("正确"/"错误"/"对"/"错"). All are coerced to an
// option index so grading never silently fails on a type mismatch.

function tfAnswerIndex(ans) {
  // option 0 = true_label (正确), option 1 = false_label (错误)
  if (typeof ans === 'boolean') return ans ? 0 : 1;
  if (typeof ans === 'number') return ans === 0 ? 0 : 1;
  var s = ('' + ans).trim().toLowerCase();
  var truthy = ['0', 't', 'true', '正确', '对', '是', 'yes', 'y', '√', '✓'];
  var falsy  = ['1', 'f', 'false', '错误', '错', '否', 'no', 'n', '×', 'x'];
  if (truthy.indexOf(s) !== -1) return 0;
  if (falsy.indexOf(s) !== -1) return 1;
  return ans ? 0 : 1;
}

function choiceAnswerIndex(ans, options) {
  if (typeof ans === 'number') return ans;
  var s = ('' + ans).trim();
  if (/^[A-Za-z]$/.test(s)) return s.toUpperCase().charCodeAt(0) - 65;
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  if (options) {
    for (var i = 0; i < options.length; i++) {
      if (('' + options[i]).trim() === s) return i;
    }
  }
  return parseInt(s, 10);
}

function multiAnswerSet(ans, options) {
  var arr = Array.isArray(ans) ? ans : [ans];
  var set = {};
  for (var i = 0; i < arr.length; i++) {
    set[choiceAnswerIndex(arr[i], options)] = true;
  }
  return set;
}

// Normalize free text for fill-in-the-blank comparison: trim, lowercase,
// drop surrounding whitespace and common punctuation, unify full/half width.
function normText(s) {
  s = ('' + s).trim().toLowerCase();
  s = s.replace(/[\s　]+/g, '');
  s = s.replace(/[.,;:!?。，、；：！？“”"'（）()【】\[\]<>《》]/g, '');
  // full-width ASCII -> half-width
  s = s.replace(/[！-～]/g, function (c) {
    return String.fromCharCode(c.charCodeAt(0) - 0xfee0);
  });
  return s;
}

// How many blanks does a fill question have? Count underscore / ＿ runs.
function fillBlankCount(question) {
  var m = ('' + question).match(/(_{2,}|＿+)/g);
  return m ? m.length : 0;
}

// Coerce a fill `answer` into an array (one entry per blank) of accepted
// answer lists. Handles: string, [synonyms], [[blank1 syns],[blank2 syns]].
function fillBlankAnswers(ans, nBlanks) {
  if (nBlanks < 1) nBlanks = 1;
  if (!Array.isArray(ans)) return padBlanks([[ans]], nBlanks);
  if (ans.length && Array.isArray(ans[0])) return padBlanks(ans, nBlanks);
  // flat array of strings
  if (nBlanks === 1) return [ans];                 // synonyms for one blank
  if (ans.length === nBlanks) {                    // one answer per blank
    return ans.map(function (a) { return [a]; });
  }
  return padBlanks([ans], nBlanks);                // ambiguous -> all on blank 1
}

function padBlanks(arr, n) {
  var out = arr.slice(0, n);
  while (out.length < n) out.push(['']);
  return out;
}

  var container = document.getElementById('questions-container');
  if (!container) { console.error('ExamPass: questions-container not found'); return; }

  // Stable-sort questions by section order so headings group correctly
  // regardless of input order.
  var order = LABELS.section_order || [];
  Q.forEach(function (q, i) { q._i = i; });
  Q.sort(function (a, b) {
    var oa = order.indexOf(a.type); if (oa === -1) oa = 99;
    var ob = order.indexOf(b.type); if (ob === -1) ob = 99;
    return oa - ob || a._i - b._i;
  });

  var h = '';
  var sec = '';
  var titles = LABELS.section;

  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    if (q.type !== sec) {
      sec = q.type;
      if (titles[q.type]) h += '<h3>' + titles[q.type] + '</h3>';
    }

    var qid = 'q' + i;
    h += '<div class="q-card" id="card-' + qid + '">';
    h += '<div class="q-num">' + (i + 1) + '. (' + q.points + ' ' + LABELS.points_suffix + ')</div>';

    if (q.type === 'fill') {
      h += '<div class="q-text">' + renderFill(q, qid) + '</div>';
    } else {
      h += '<div class="q-text">' + q.question + '</div>';
    }

    if (q.type === 'choice') {
      var opts = q.options || [];
      for (var j = 0; j < opts.length; j++) {
        h += '<label class="option" id="opt-' + qid + '-' + j + '" onclick="sel(\'' + qid + '\',' + j + ')">';
        h += '<input type="radio" name="' + qid + '" value="' + j + '">' + String.fromCharCode(65 + j) + '. ' + opts[j] + '</label>';
      }
    } else if (q.type === 'multi') {
      var mopts = q.options || [];
      for (var k = 0; k < mopts.length; k++) {
        h += '<label class="option" id="opt-' + qid + '-' + k + '" onclick="toggle(\'' + qid + '\',' + k + ')">';
        h += '<input type="checkbox" name="' + qid + '" value="' + k + '">' + String.fromCharCode(65 + k) + '. ' + mopts[k] + '</label>';
      }
    } else if (q.type === 'tf') {
      h += '<label class="option" id="opt-' + qid + '-0" onclick="sel(\'' + qid + '\',0)">';
      h += '<input type="radio" name="' + qid + '" value="0">' + LABELS.true_label + '</label>';
      h += '<label class="option" id="opt-' + qid + '-1" onclick="sel(\'' + qid + '\',1)">';
      h += '<input type="radio" name="' + qid + '" value="1">' + LABELS.false_label + '</label>';
    } else if (q.type === 'fill') {
      // inputs already rendered inline inside q-text
    } else if (q.type === 'code') {
      h += '<textarea class="q-textarea q-code" id="text-' + qid + '" placeholder="' + (LABELS.code_placeholder || LABELS.placeholder) + '" rows="8" spellcheck="false"></textarea>';
    } else {
      h += '<textarea class="q-textarea" id="text-' + qid + '" placeholder="' + LABELS.placeholder + '" rows="3"></textarea>';
    }

    h += '<div class="result" id="result-' + qid + '">';
    h += '<span class="badge" id="badge-' + qid + '"></span><span id="correct-' + qid + '"></span>';
    h += '<div class="explanation">' + (q.explanation || '') + '</div>';
    if (q.pitfall) {
      h += '<div class="pitfall">' + LABELS.pitfall_prefix + q.pitfall + '</div>';
    }
    h += '</div></div>';
  }

  container.innerHTML = h;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]).catch(function (err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

// Render fill question text with inline <input> boxes replacing blanks.
function renderFill(q, qid) {
  var nBlanks = fillBlankCount(q.question);
  var k = 0;
  var html = ('' + q.question).replace(/(_{2,}|＿+)/g, function () {
    var inp = '<input type="text" class="fill-input" id="fill-' + qid + '-' + k + '" autocomplete="off" spellcheck="false">';
    k++;
    return inp;
  });
  if (k === 0) {
    // No markers in text -> append boxes based on answer shape
    var n = fillBlankAnswers(q.answer, 1).length;
    var ans = q.answer;
    if (Array.isArray(ans)) n = Array.isArray(ans[0]) ? ans.length : (ans.length || 1);
    if (n < 1) n = 1;
    html += '<div class="fill-row">';
    for (var b = 0; b < n; b++) {
      if (n > 1) html += '<span class="fill-tag">' + (b + 1) + '.</span>';
      html += '<input type="text" class="fill-input" id="fill-' + qid + '-' + b + '" autocomplete="off" spellcheck="false">';
    }
    html += '</div>';
  }
  return html;
}

document.addEventListener('DOMContentLoaded', build);
if (document.readyState === 'interactive' || document.readyState === 'complete') {
  build();
}

// ─── Selection handlers ──────────────────────────────────────────────

function sel(qid, idx) {
  var prefix = 'opt-' + qid + '-';
  var all = document.querySelectorAll('[id^="' + prefix + '"]');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('selected');
  var target = document.getElementById('opt-' + qid + '-' + idx);
  if (target) target.classList.add('selected');
  var radio = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  if (radio) radio.checked = true;
}

function toggle(qid, idx) {
  var box = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  var label = document.getElementById('opt-' + qid + '-' + idx);
  if (!box) return;
  box.checked = !box.checked;
  if (label) label.classList.toggle('selected', box.checked);
}

// ─── Grading ─────────────────────────────────────────────────────────

function gradeAll() {
  var score = 0;
  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    var qid = 'q' + i;
    var card = document.getElementById('card-' + qid);
    var result = document.getElementById('result-' + qid);
    var badge = document.getElementById('badge-' + qid);
    var correctEl = document.getElementById('correct-' + qid);
    if (!card || !result) continue;

    result.style.display = 'block';

    if (q.type === 'choice' || q.type === 'tf') {
      score += gradeSingle(q, qid, card, badge, correctEl);
    } else if (q.type === 'multi') {
      score += gradeMulti(q, qid, card, badge, correctEl);
    } else if (q.type === 'fill') {
      score += gradeFill(q, qid, card, badge, correctEl);
    } else {
      card.classList.add('correct');
      badge.className = 'badge badge-ref';
      badge.textContent = LABELS.reference_label;
    }
  }

  var sb = document.getElementById('score-box');
  if (sb) {
    sb.style.display = 'block';
    document.getElementById('score-num').textContent = roundScore(score);
    sb.scrollIntoView({ behavior: 'smooth' });
  }

  var opts = document.querySelectorAll('.option');
  for (var a = 0; a < opts.length; a++) opts[a].style.pointerEvents = 'none';
  var tas = document.querySelectorAll('.q-textarea');
  for (var b = 0; b < tas.length; b++) tas[b].disabled = true;
  var fis = document.querySelectorAll('.fill-input');
  for (var c = 0; c < fis.length; c++) fis[c].disabled = true;

  var btn = document.getElementById('grade-btn');
  if (btn) { btn.disabled = true; btn.textContent = LABELS.graded_label; }

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(function (err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

function roundScore(s) {
  return Math.round(s * 10) / 10;
}

function gradeSingle(q, qid, card, badge, correctEl) {
  var ansIdx = q.type === 'tf' ? tfAnswerIndex(q.answer) : choiceAnswerIndex(q.answer, q.options);
  var radio = document.querySelector('input[name="' + qid + '"]:checked');
  if (radio && parseInt(radio.value, 10) === ansIdx) {
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
    correctEl.innerHTML = '';
    var ok = document.getElementById('opt-' + qid + '-' + ansIdx);
    if (ok) ok.classList.add('correct-answer');
    return q.points;
  }
  card.classList.add('wrong');
  badge.className = 'badge badge-no';
  badge.textContent = LABELS.wrong_label;
  var ansText = q.type === 'choice'
    ? String.fromCharCode(65 + ansIdx) + '. ' + (q.options ? q.options[ansIdx] : '')
    : (ansIdx === 0 ? LABELS.true_label : LABELS.false_label);
  correctEl.innerHTML = LABELS.answer_prefix + ansText;
  if (radio) {
    var wrongOpt = document.getElementById('opt-' + qid + '-' + radio.value);
    if (wrongOpt) wrongOpt.classList.add('wrong-answer');
  }
  var corr = document.getElementById('opt-' + qid + '-' + ansIdx);
  if (corr) corr.classList.add('correct-answer');
  return 0;
}

function gradeMulti(q, qid, card, badge, correctEl) {
  var want = multiAnswerSet(q.answer, q.options);
  var wantKeys = Object.keys(want).map(Number);
  var checked = document.querySelectorAll('input[name="' + qid + '"]:checked');
  var picked = [];
  for (var i = 0; i < checked.length; i++) picked.push(parseInt(checked[i].value, 10));

  var anyWrong = false, hitCorrect = 0;
  for (var p = 0; p < picked.length; p++) {
    if (want[picked[p]]) hitCorrect++;
    else anyWrong = true;
  }

  // reveal correct / wrong option markers
  var mopts = q.options || [];
  for (var j = 0; j < mopts.length; j++) {
    var el = document.getElementById('opt-' + qid + '-' + j);
    if (!el) continue;
    if (want[j]) el.classList.add('correct-answer');
    else if (picked.indexOf(j) !== -1) el.classList.add('wrong-answer');
  }

  var earned;
  if (!anyWrong && hitCorrect === wantKeys.length && picked.length === wantKeys.length) {
    earned = q.points;
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
    correctEl.innerHTML = '';
  } else if (!anyWrong && hitCorrect > 0) {
    // 少选不错选 -> partial credit
    earned = roundScore(q.points * hitCorrect / wantKeys.length);
    card.classList.add('partial');
    badge.className = 'badge badge-partial';
    badge.textContent = LABELS.partial_label;
    correctEl.innerHTML = LABELS.answer_prefix + multiAnswerText(wantKeys, mopts);
  } else {
    earned = 0;
    card.classList.add('wrong');
    badge.className = 'badge badge-no';
    badge.textContent = LABELS.wrong_label;
    correctEl.innerHTML = LABELS.answer_prefix + multiAnswerText(wantKeys, mopts);
  }
  return earned;
}

function multiAnswerText(keys, options) {
  return keys.sort(function (a, b) { return a - b; }).map(function (k) {
    return String.fromCharCode(65 + k) + '. ' + (options ? options[k] : '');
  }).join('  ');
}

function gradeFill(q, qid, card, badge, correctEl) {
  var nBlanks = fillBlankCount(q.question);
  var blanks = fillBlankAnswers(q.answer, nBlanks);
  var n = blanks.length;
  var hit = 0;
  var displays = [];

  for (var b = 0; b < n; b++) {
    var inp = document.getElementById('fill-' + qid + '-' + b);
    var accepted = blanks[b] || [''];
    var user = inp ? normText(inp.value) : '';
    var ok = false;
    for (var a = 0; a < accepted.length; a++) {
      if (accepted[a] !== '' && normText(accepted[a]) === user && user !== '') { ok = true; break; }
    }
    if (inp) inp.classList.add(ok ? 'fill-ok' : 'fill-no');
    if (ok) hit++;
    displays.push((n > 1 ? (b + 1) + '. ' : '') + accepted.filter(function (x) { return x !== ''; }).join(' / '));
  }

  var earned = roundScore(q.points * hit / n);
  correctEl.innerHTML = LABELS.answer_prefix + displays.join('   ');

  if (hit === n) {
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
  } else if (hit > 0) {
    card.classList.add('partial');
    badge.className = 'badge badge-partial';
    badge.textContent = LABELS.partial_label;
  } else {
    card.classList.add('wrong');
    badge.className = 'badge badge-no';
    badge.textContent = LABELS.wrong_label;
  }
  return earned;
}
