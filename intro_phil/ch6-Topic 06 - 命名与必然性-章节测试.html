<script>
var Q = [{"kc_id": "kc6.1", "cognitive_level": "记忆", "difficulty": 0.3, "type": "choice", "question": "伯特兰·罗素在《逻辑原子主义哲学》中提出的关于日常专名的核心主张是什么？", "options": ["日常专名如苏格拉底实际上是缩略摹状词，逻辑上真正的专名只有这或那这样的指示词", "所有专名都是严格指示词，它们在所有可能世界中都指称同一个对象", "专名的意义取决于说话者当前的感知内容，与历史传递链条无关", "专名没有指称对象，其功能仅仅是在语句中充当语法主词"], "answer": "A", "explanation": "罗素（Russell 1918, The Philosophy of Logical Atomism, p. 523）原文：The names that we commonly use, like Socrates, are really abbreviations for descriptions. The only words one does use as names in the logical sense are words like this or that. 即日常专名是缩略摹状词，只有这或那才是真正的逻辑专名。选项B是克里普克的观点，与罗素相反；选项C与因果-历史理论混淆；选项D混淆了罗素的理论与弗雷格关于概念词可能为空的论述。", "pitfall": "选B：将克里普克的严格指示词理论误归于罗素，两人对专名的看法正好相反；选C：将专名意义锚定在当下感知，与罗素强调摹状词的立场无关；选D：将专名的语法功能与本体论地位混淆。"}, {"kc_id": "kc6.2", "cognitive_level": "理解", "difficulty": 0.45, "type": "choice", "question": "弗雷格区分概念与对象时，对专名（proper name）给出的界定标准是：", "options": ["专名必须指称一个在时空中的具体存在物，抽象实体不能成为专名的指称对象", "专名是那些涵义（Sinn）不随认知主体变化的表达式，从而保证指称的客观性", "专名是任何作为对象记号的表达式，即其表达式不包含空位（empty place），指称对象不是函数", "专名是只能通过亲识（acquaintance）被直接把握的对象的名称，否则只是概念词"], "answer": "C", "explanation": "弗雷格（Frege 1892, On Concept and Object, p. 197）原文：I call anything a proper name if it is a sign for an object. An object is anything that is not a function [f(x)], so that an expression for it does not contain any empty place. 即：专名的标准是它作为对象的记号，而对象就是非函数——表达式中没有空位。选项A引入时空条件，这不是弗雷格的标准；选项B混淆了专名的标准与涵义的不变性；选项D引入了罗素的亲识概念。", "pitfall": "选A：将对象不当地限定为时空中的具体存在物，弗雷格的对象包括抽象对象（如数）；选B：将专名的标准与涵义的不变性混淆，此处讨论的是语法/逻辑区分，不是认识论条件；选D：引入了罗素的亲识概念，将其嫁接到弗雷格的定义上。"}, {"kc_id": "kc6.3", "cognitive_level": "理解", "difficulty": 0.5, "type": "tf", "question": "弗雷格提出Sinn（涵义）与Bedeutung（指称）的区分，是为了回应分析悖论（Paradox of Analysis）中同义性导致分析变得琐碎这一难局。", "options": ["正确", "错误"], "answer": "正确", "explanation": "分析悖论的结构是：对任意A = B，若A与B同义（meaning identical），则分析是琐碎的；若不同义，则分析是错误的。教材（slide 09）明确指出该悖论的前提假设是referentialism（指称论）：the meaning of a word is its referent。弗雷格通过引入Sinn（涵义/mode of presentation）打破这一假设：晨星=暮星的指称（Bedeutung）相同（都是金星），但涵义（Sinn）不同，因此该分析既有信息量又正确。", "pitfall": "误判为错误：可能只记住了Sinn vs Bedeutung是关于语词意义的区分，而未能将其与分析悖论的具体关联建立起来。"}, {"kc_id": "kc6.4", "cognitive_level": "理解", "difficulty": 0.5, "type": "choice", "question": "克里普克在《命名与必然性》中提出的传递链条（chain of communication）理论旨在说明：", "options": ["专名的指称由说话者当前的描述性信念决定，即使这些信念是错误的", "专名的指称通过社区内部的言语交流从一环传递到一环，最终回溯到最初的命名仪式", "专名的指称必须通过科学分析才能确定，日常使用者无法真正把握专名的指称", "专名的指称是固定的，因为所有专名在逻辑上等价于一个严格的摹状词"], "answer": "B", "explanation": "克里普克（Kripke 1980, p. 91）原文描述：专名的指称通过社区中从一环到一环的言语传递链条得以确定，回溯到最初的命名事件。选项A是描述理论的观点，正是克里普克所反对的；选项C将指称确定归于科学分析，与克里普克的日常传递链条理论相反；选项D是描述理论的立场，克里普克明确反对。", "pitfall": "选A：将描述理论误认为克里普克的观点；选C：将指称确定归于科学分析，与克里普克强调日常言语社区传递的观点相反；选D：将专名等同于严格摹状词，这是描述理论的立场。"}, {"kc_id": "kc6.5", "cognitive_level": "记忆", "difficulty": 0.45, "type": "fill", "question": "克里普克将严格指示词（rigid designator）定义为：在每一个该对象存在的可能世界中都________，并且在任何可能世界中都不________的表达式。", "options": [], "answer": "指称同一个对象；指称其他任何对象", "explanation": "教材（slide 13）原文定义：A rigid designator is anything that will designate the same object in every possible world where it exists (and nothing else in any possible world). 即：严格指示词在每一个该对象存在的可能世界中都指称同一个对象，并且在任何可能世界中都不指称其他任何对象。", "pitfall": "第一空填指称该对象而遗漏同一个：遗漏了严格指示词的核心——跨可能世界的同一性；第二空填指称任何对象而遗漏其他：遗漏了严格指示词的排他性。"}, {"kc_id": "kc6.6", "cognitive_level": "分析", "difficulty": 0.65, "type": "choice", "question": "克里普克认为水=H2O是一个后验必然命题。以下哪一项最准确地说明了自然类词（如水）的指称如何被固定？", "options": ["自然类词的指称由科学分析揭示的内在本质决定，一旦本质被揭示，该等式就成为先验可知的", "自然类词的意义由一组描述性特征（如无色液体、可饮用）定义，当这些特征与H2O吻合时，等式成为必然", "自然类词的指称由说话者当前的感知内容决定，科学发现只是修正了说话者对水的描述性信念", "自然类词在最初的命名仪式（baptism）中被指向具有特定外在特征的样本，名称随后通过社区传递链条传播，指称由样本的内在结构（而非描述性特征）确定"], "answer": "D", "explanation": "教材（slide 14）原文描述了克里普克的初始命名（baptism）机制：自然类词在命名仪式中被指向具有特定外在特征的样本，名称通过传递链条在社区中传播，但其指称由样本的内在结构（而非描述性特征）确定。因此水=H2O是后验的（需要科学发现）又是必然的（水在所有可能世界中都是H2O）。选项A错误地认为本质揭示使等式成为先验可知的；选项B是描述理论的立场；选项C混淆了克里普克与描述理论。", "pitfall": "选A：将后验必然误解为先验必然，未理解克里普克的核心洞见恰恰是存在后验必然命题；选B：将自然类词的意义归于描述性特征，这是描述理论的立场；选C：将指称锚定在说话者当下的感知内容，与克里普克的因果-历史传递链条理论相反。"}, {"kc_id": "kc6.7", "cognitive_level": "分析", "difficulty": 0.6, "type": "choice", "question": "克里普克关于严格指示词的论证如果成立，将对科学与形而上学的关系产生何种影响？", "options": ["科学发现可以揭示必然真理，从而科学与形而上学在内容上存在实质性重叠", "科学只处理经验问题，形而上学只处理先验问题，两者仍然完全独立", "形而上学的必然性命题最终都可以被还原为科学发现，形而上学将被科学取代", "科学发现只能提供偶然真理，必然真理仍然完全属于形而上学的先验领域"], "answer": "A", "explanation": "教材（slide 15）原文：If this is correct, science can discover necessary truths, e.g. water = H2O. If this is correct, science and metaphysics will have significant overlap. 克里普克的论证表明：如果自然类词是严格指示词，那么水=H2O这类命题是必然的（形而上学命题），但需要通过科学经验发现（后验），因此科学与形而上学存在实质性重叠。选项B与克里普克的结论直接相反；选项C过度推广；选项D与克里普克的后验必然概念直接矛盾。", "pitfall": "选B：记住了科学与形而上学的传统区分，但未理解克里普克的论证恰恰挑战了这一区分；选C：将重叠误解为还原，克里普克并未主张形而上学被科学取代；选D：将后验必然误解为先验必然。"}, {"kc_id": "kc6.3", "cognitive_level": "应用", "difficulty": 0.6, "type": "short", "question": "请举出弗雷格在《论涵义与指称》中用来说明Sinn（涵义）不同但Bedeutung（指称）相同的一个经典例子，并简要说明该例子如何体现涵义与指称的区分。", "options": [], "answer": "经典例子：晨星（Morning Star）= 暮星（Evening Star）。两者指称（Bedeutung）相同——都是金星（Venus），但涵义（Sinn）不同——晨星呈现为清晨天空中的亮星，暮星呈现为傍晚天空中的亮星。该例子说明：两个表达式可以指称同一对象，但由于呈现方式（mode of presentation）不同，它们承载不同的认知价值（cognitive value），因此晨星=暮星这一分析既非琐碎（因为涵义不同）也非错误（因为指称相同）。", "explanation": "弗雷格在《论涵义与指称》（1892）中提出该经典例子，旨在说明：语词的意义不能仅仅等于其指称（否则晨星=暮星就会像晨星=晨星一样琐碎），还必须包括涵义——即对象的呈现方式（mode of presentation）。教材（slide 09）明确列出该例子作为Sinn vs Bedeutung区分的示例。", "pitfall": "举5=2+3为例但仅说明数值相等：需明确指出5与2+3的呈现方式不同；举水=H2O为例但误以为这是弗雷格的例子：该例出自克里普克，不是弗雷格的原始例子。"}, {"kc_id": "kc6.5", "cognitive_level": "理解", "difficulty": 0.55, "type": "tf", "question": "根据克里普克的理论，所有专名都是严格指示词，但并非所有严格指示词都是专名。", "options": ["正确", "错误"], "answer": "正确", "explanation": "教材（slide 13）明确列出严格指示词的示例包括三类：(1) All proper names（所有专名）；(2) Some common names（如water、H2O、gold等自然类词）；(3) Some definite descriptions（如the element with atomic number 79、the successor of 2等）。因此，严格指示词的外延大于专名：所有专名都是严格指示词，但某些自然类词和某些限定摹状词也是严格指示词。", "pitfall": "误判为错误：可能将严格指示词等同于专名，未注意到教材明确将自然类词和某些限定摹状词也列为严格指示词的示例。"}, {"kc_id": "kc6.7", "cognitive_level": "应用", "difficulty": 0.7, "type": "choice", "question": "克里普克指出，gold（金）一词在日常使用中可能因初始样本的偏差而发展出不同的指称（如指向金-黄铁矿-黄铜矿-云母的混合物）。这一反思对自然类词是严格指示词的主张构成何种挑战？", "options": ["它表明自然类词根本不是严格指示词，因为它们的指称完全由科学定义决定", "它表明自然类词的指称固定不仅依赖初始命名仪式，还需要科学共同体在后续研究中不断修正和改进对样本本质的认识", "它表明所有自然类词的指称都是不确定的，因此水=H2O这类命题也是偶然的", "它表明严格指示词只适用于专名，自然类词永远不可能成为严格指示词"], "answer": "B", "explanation": "教材（slide 15）原文：Kripke notes that (e.g.) the word gold could have developed differently... Kripke writes: Scientific investigation generally discovers characteristics of gold which are far better than the original set (1980, p. 138). However, alternative histories show that more is required, esp. scientific society. 即：自然类词的指称固定不仅依赖初始命名仪式，还需要科学共同体在后续研究中不断修正和改进。选项A与克里普克的立场相反；选项C过度推广；选项D与教材明确列出的示例矛盾。", "pitfall": "选A：将克里普克的反思误解为对严格指示词地位的否定；选C：将可能发展不同过度推广为指称不确定；选D：将自然类词排除在严格指示词之外，与教材明确列出的示例直接矛盾。"}, {"kc_id": "kc6.1", "cognitive_level": "分析", "difficulty": 0.75, "type": "essay", "question": "罗素的摹状词理论与克里普克的因果-历史理论对专名如何确定指称给出了截然不同的回答。请比较这两种理论的核心主张，并说明克里普克的理论为何被认为是对描述理论的挑战。", "options": [], "answer": "罗素的摹状词理论认为：日常专名（如苏格拉底）是缩略摹状词，其指称由与该名称相关联的一组描述性特征决定——满足这些描述的对象就是该专名的指称。因此，专名的意义（meaning）等于其描述性内容，知道一个专名就是知道一组摹状词。\n\n克里普克的因果-历史理论认为：专名是严格指示词，其指称不是由描述性特征决定，而是通过一条因果-历史传递链条（chain of communication）从最初的命名仪式（baptism）传递到当前说话者。即使当前说话者对该对象的描述性信念是错误的，专名仍然指称同一个对象。\n\n克里普克的理论对描述理论的挑战体现在：(1) 描述理论无法解释专名在描述性信念错误时仍然保持指称；(2) 描述理论无法解释专名在所有可能世界中指称同一对象这一严格性特征；(3) 描述理论无法解释水=H2O这类后验必然命题——如果水的意义等于一组描述性特征，那么水=H2O就应该是先验的，但克里普克指出它是后验的。", "explanation": "罗素（1918）主张日常专名是缩略摹状词，指称由描述性特征决定。克里普克（1980）通过因果-历史传递链条理论挑战了这一观点，主张专名是严格指示词，指称由命名仪式和传递链条决定，不依赖于描述性信念。", "pitfall": "仅描述两种理论而未比较：需要明确指出两种理论在指称如何确定问题上的对立；将克里普克的理论简化为专名没有意义：克里普克并未否认专名有意义，只是认为意义不等于描述性内容；未提及严格指示词概念：这是克里普克理论的核心技术概念。"}, {"kc_id": "kc6.7", "cognitive_level": "综合", "difficulty": 0.8, "type": "comprehensive", "question": "克里普克的严格指示词理论对传统形而上学中必然/偶然与先验/后验的区分提出了深刻挑战。请结合水=H2O和热=分子运动这类例子，说明克里普克如何论证存在后验必然命题，并分析这一论证对科学与形而上学关系的影响。", "options": [], "answer": "克里普克的论证结构如下：\n\n(1) 严格指示词的定义：严格指示词在所有可能世界中都指称同一个对象（在该对象存在的可能世界中）。\n\n(2) 自然类词是严格指示词：水在所有可能世界中都指称具有相同内在结构（H2O）的物质，无论该物质在日常经验中呈现何种外在特征。\n\n(3) 后验必然命题的论证：水=H2O是必然的——因为水和H2O都是严格指示词，在所有可能世界中都指称同一对象，因此该等式在所有可能世界中为真。但它是后验的——我们只能通过科学经验发现水的内在结构是H2O，而非通过语言分析先验地知道。\n\n(4) 对科学与形而上学关系的影响：传统上，必然命题属于形而上学（先验领域），偶然命题属于科学（经验领域）。克里普克的论证打破了这一划分：科学可以发现必然命题（如水=H2O、热=分子运动），因此科学与形而上学存在实质性重叠。这意味着形而上学的某些核心问题（如必然性、本质）可以通过科学经验研究来回答，而非仅仅依赖先验思辨。", "explanation": "克里普克（1980）通过严格指示词理论论证了后验必然命题的存在，挑战了传统的必然=先验等式。教材（slide 15）明确指出：If this is correct, science can discover necessary truths, e.g. water = H2O. If this is correct, science and metaphysics will have significant overlap.", "pitfall": "将后验必然误解为先验必然：需要明确区分认识论维度（先验/后验）与形而上学维度（必然/偶然）；仅举水=H2O一个例子：应至少举两个例子以展示该论证的一般性；未分析对科学与形而上学关系的影响：这是克里普克论证的深层哲学意义。"}];

// ─── Answer normalization (robust to how the JSON was authored) ──────
// tf / choice answers may arrive as int index, boolean, letter ("A"),
// or label string ("正确"/"错误"/"对"/"错"). All are coerced to an
// option index so grading never silently fails on a type mismatch.

function tfAnswerIndex(ans) {
  // option 0 = true_label (正确), option 1 = false_label (错误)
  if (typeof ans === 'boolean') return ans ? 0 : 1;
  if (typeof ans === 'number') return ans === 0 ? 0 : 1;
  var s = ('' + ans).trim().toLowerCase();
  var truthy = ['0', 't', 'true', '正确', '对', '是', 'yes', 'y', '√', '✓'];
  var falsy  = ['1', 'f', 'false', '错误', '错', '否', 'no', 'n', '×', 'x'];
  if (truthy.indexOf(s) !== -1) return 0;
  if (falsy.indexOf(s) !== -1) return 1;
  return ans ? 0 : 1;
}

function choiceAnswerIndex(ans, options) {
  if (typeof ans === 'number') return ans;
  var s = ('' + ans).trim();
  if (/^[A-Za-z]$/.test(s)) return s.toUpperCase().charCodeAt(0) - 65;
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  if (options) {
    for (var i = 0; i < options.length; i++) {
      if (('' + options[i]).trim() === s) return i;
    }
  }
  return parseInt(s, 10);
}

function multiAnswerSet(ans, options) {
  var arr = Array.isArray(ans) ? ans : [ans];
  var set = {};
  for (var i = 0; i < arr.length; i++) {
    set[choiceAnswerIndex(arr[i], options)] = true;
  }
  return set;
}

// Normalize free text for fill-in-the-blank comparison: trim, lowercase,
// drop surrounding whitespace and common punctuation, unify full/half width.
function normText(s) {
  s = ('' + s).trim().toLowerCase();
  s = s.replace(/[\s　]+/g, '');
  s = s.replace(/[.,;:!?。，、；：！？“”"'（）()【】\[\]<>《》]/g, '');
  // full-width ASCII -> half-width
  s = s.replace(/[！-～]/g, function (c) {
    return String.fromCharCode(c.charCodeAt(0) - 0xfee0);
  });
  return s;
}

// How many blanks does a fill question have? Count underscore / ＿ runs.
function fillBlankCount(question) {
  var m = ('' + question).match(/(_{2,}|＿+)/g);
  return m ? m.length : 0;
}

// Coerce a fill `answer` into an array (one entry per blank) of accepted
// answer lists. Handles: string, [synonyms], [[blank1 syns],[blank2 syns]].
function fillBlankAnswers(ans, nBlanks) {
  if (nBlanks < 1) nBlanks = 1;
  if (!Array.isArray(ans)) return padBlanks([[ans]], nBlanks);
  if (ans.length && Array.isArray(ans[0])) return padBlanks(ans, nBlanks);
  // flat array of strings
  if (nBlanks === 1) return [ans];                 // synonyms for one blank
  if (ans.length === nBlanks) {                    // one answer per blank
    return ans.map(function (a) { return [a]; });
  }
  return padBlanks([ans], nBlanks);                // ambiguous -> all on blank 1
}

function padBlanks(arr, n) {
  var out = arr.slice(0, n);
  while (out.length < n) out.push(['']);
  return out;
}

function build() {
  var container = document.getElementById('questions-container');
  if (!container) { console.error('ExamPass: questions-container not found'); return; }

  // Stable-sort questions by section order so headings group correctly
  // regardless of input order.
  var order = LABELS.section_order || [];
  Q.forEach(function (q, i) { q._i = i; });
  Q.sort(function (a, b) {
    var oa = order.indexOf(a.type); if (oa === -1) oa = 99;
    var ob = order.indexOf(b.type); if (ob === -1) ob = 99;
    return oa - ob || a._i - b._i;
  });

  var h = '';
  var sec = '';
  var titles = LABELS.section;

  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    if (q.type !== sec) {
      sec = q.type;
      if (titles[q.type]) h += '<h3>' + titles[q.type] + '</h3>';
    }

    var qid = 'q' + i;
    h += '<div class="q-card" id="card-' + qid + '">';
    h += '<div class="q-num">' + (i + 1) + '. (' + q.points + ' ' + LABELS.points_suffix + ')</div>';

    if (q.type === 'fill') {
      h += '<div class="q-text">' + renderFill(q, qid) + '</div>';
    } else {
      h += '<div class="q-text">' + q.question + '</div>';
    }

    if (q.type === 'choice') {
      var opts = q.options || [];
      for (var j = 0; j < opts.length; j++) {
        h += '<label class="option" id="opt-' + qid + '-' + j + '" onclick="sel(\'' + qid + '\',' + j + ')">';
        h += '<input type="radio" name="' + qid + '" value="' + j + '">' + String.fromCharCode(65 + j) + '. ' + opts[j] + '</label>';
      }
    } else if (q.type === 'multi') {
      var mopts = q.options || [];
      for (var k = 0; k < mopts.length; k++) {
        h += '<label class="option" id="opt-' + qid + '-' + k + '" onclick="toggle(\'' + qid + '\',' + k + ')">';
        h += '<input type="checkbox" name="' + qid + '" value="' + k + '">' + String.fromCharCode(65 + k) + '. ' + mopts[k] + '</label>';
      }
    } else if (q.type === 'tf') {
      h += '<label class="option" id="opt-' + qid + '-0" onclick="sel(\'' + qid + '\',0)">';
      h += '<input type="radio" name="' + qid + '" value="0">' + LABELS.true_label + '</label>';
      h += '<label class="option" id="opt-' + qid + '-1" onclick="sel(\'' + qid + '\',1)">';
      h += '<input type="radio" name="' + qid + '" value="1">' + LABELS.false_label + '</label>';
    } else if (q.type === 'fill') {
      // inputs already rendered inline inside q-text
    } else if (q.type === 'code') {
      h += '<textarea class="q-textarea q-code" id="text-' + qid + '" placeholder="' + (LABELS.code_placeholder || LABELS.placeholder) + '" rows="8" spellcheck="false"></textarea>';
    } else {
      h += '<textarea class="q-textarea" id="text-' + qid + '" placeholder="' + LABELS.placeholder + '" rows="3"></textarea>';
    }

    h += '<div class="result" id="result-' + qid + '">';
    h += '<span class="badge" id="badge-' + qid + '"></span><span id="correct-' + qid + '"></span>';
    h += '<div class="explanation">' + (q.explanation || '') + '</div>';
    if (q.pitfall) {
      h += '<div class="pitfall">' + LABELS.pitfall_prefix + q.pitfall + '</div>';
    }
    h += '</div></div>';
  }

  container.innerHTML = h;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]).catch(function (err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

// Render fill question text with inline <input> boxes replacing blanks.
function renderFill(q, qid) {
  var nBlanks = fillBlankCount(q.question);
  var k = 0;
  var html = ('' + q.question).replace(/(_{2,}|＿+)/g, function () {
    var inp = '<input type="text" class="fill-input" id="fill-' + qid + '-' + k + '" autocomplete="off" spellcheck="false">';
    k++;
    return inp;
  });
  if (k === 0) {
    // No markers in text -> append boxes based on answer shape
    var n = fillBlankAnswers(q.answer, 1).length;
    var ans = q.answer;
    if (Array.isArray(ans)) n = Array.isArray(ans[0]) ? ans.length : (ans.length || 1);
    if (n < 1) n = 1;
    html += '<div class="fill-row">';
    for (var b = 0; b < n; b++) {
      if (n > 1) html += '<span class="fill-tag">' + (b + 1) + '.</span>';
      html += '<input type="text" class="fill-input" id="fill-' + qid + '-' + b + '" autocomplete="off" spellcheck="false">';
    }
    html += '</div>';
  }
  return html;
}

document.addEventListener('DOMContentLoaded', build);
if (document.readyState === 'interactive' || document.readyState === 'complete') {
  build();
}

// ─── Selection handlers ──────────────────────────────────────────────

function sel(qid, idx) {
  var prefix = 'opt-' + qid + '-';
  var all = document.querySelectorAll('[id^="' + prefix + '"]');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('selected');
  var target = document.getElementById('opt-' + qid + '-' + idx);
  if (target) target.classList.add('selected');
  var radio = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  if (radio) radio.checked = true;
}

function toggle(qid, idx) {
  var box = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  var label = document.getElementById('opt-' + qid + '-' + idx);
  if (!box) return;
  box.checked = !box.checked;
  if (label) label.classList.toggle('selected', box.checked);
}

// ─── Grading ─────────────────────────────────────────────────────────

function gradeAll() {
  var score = 0;
  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    var qid = 'q' + i;
    var card = document.getElementById('card-' + qid);
    var result = document.getElementById('result-' + qid);
    var badge = document.getElementById('badge-' + qid);
    var correctEl = document.getElementById('correct-' + qid);
    if (!card || !result) continue;

    result.style.display = 'block';

    if (q.type === 'choice' || q.type === 'tf') {
      score += gradeSingle(q, qid, card, badge, correctEl);
    } else if (q.type === 'multi') {
      score += gradeMulti(q, qid, card, badge, correctEl);
    } else if (q.type === 'fill') {
      score += gradeFill(q, qid, card, badge, correctEl);
    } else {
      card.classList.add('correct');
      badge.className = 'badge badge-ref';
      badge.textContent = LABELS.reference_label;
    }
  }

  var sb = document.getElementById('score-box');
  if (sb) {
    sb.style.display = 'block';
    document.getElementById('score-num').textContent = roundScore(score);
    sb.scrollIntoView({ behavior: 'smooth' });
  }

  var opts = document.querySelectorAll('.option');
  for (var a = 0; a < opts.length; a++) opts[a].style.pointerEvents = 'none';
  var tas = document.querySelectorAll('.q-textarea');
  for (var b = 0; b < tas.length; b++) tas[b].disabled = true;
  var fis = document.querySelectorAll('.fill-input');
  for (var c = 0; c < fis.length; c++) fis[c].disabled = true;

  var btn = document.getElementById('grade-btn');
  if (btn) { btn.disabled = true; btn.textContent = LABELS.graded_label; }

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(function (err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

function roundScore(s) {
  return Math.round(s * 10) / 10;
}

function gradeSingle(q, qid, card, badge, correctEl) {
  var ansIdx = q.type === 'tf' ? tfAnswerIndex(q.answer) : choiceAnswerIndex(q.answer, q.options);
  var radio = document.querySelector('input[name="' + qid + '"]:checked');
  if (radio && parseInt(radio.value, 10) === ansIdx) {
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
    correctEl.innerHTML = '';
    var ok = document.getElementById('opt-' + qid + '-' + ansIdx);
    if (ok) ok.classList.add('correct-answer');
    return q.points;
  }
  card.classList.add('wrong');
  badge.className = 'badge badge-no';
  badge.textContent = LABELS.wrong_label;
  var ansText = q.type === 'choice'
    ? String.fromCharCode(65 + ansIdx) + '. ' + (q.options ? q.options[ansIdx] : '')
    : (ansIdx === 0 ? LABELS.true_label : LABELS.false_label);
  correctEl.innerHTML = LABELS.answer_prefix + ansText;
  if (radio) {
    var wrongOpt = document.getElementById('opt-' + qid + '-' + radio.value);
    if (wrongOpt) wrongOpt.classList.add('wrong-answer');
  }
  var corr = document.getElementById('opt-' + qid + '-' + ansIdx);
  if (corr) corr.classList.add('correct-answer');
  return 0;
}

function gradeMulti(q, qid, card, badge, correctEl) {
  var want = multiAnswerSet(q.answer, q.options);
  var wantKeys = Object.keys(want).map(Number);
  var checked = document.querySelectorAll('input[name="' + qid + '"]:checked');
  var picked = [];
  for (var i = 0; i < checked.length; i++) picked.push(parseInt(checked[i].value, 10));

  var anyWrong = false, hitCorrect = 0;
  for (var p = 0; p < picked.length; p++) {
    if (want[picked[p]]) hitCorrect++;
    else anyWrong = true;
  }

  // reveal correct / wrong option markers
  var mopts = q.options || [];
  for (var j = 0; j < mopts.length; j++) {
    var el = document.getElementById('opt-' + qid + '-' + j);
    if (!el) continue;
    if (want[j]) el.classList.add('correct-answer');
    else if (picked.indexOf(j) !== -1) el.classList.add('wrong-answer');
  }

  var earned;
  if (!anyWrong && hitCorrect === wantKeys.length && picked.length === wantKeys.length) {
    earned = q.points;
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
    correctEl.innerHTML = '';
  } else if (!anyWrong && hitCorrect > 0) {
    // 少选不错选 -> partial credit
    earned = roundScore(q.points * hitCorrect / wantKeys.length);
    card.classList.add('partial');
    badge.className = 'badge badge-partial';
    badge.textContent = LABELS.partial_label;
    correctEl.innerHTML = LABELS.answer_prefix + multiAnswerText(wantKeys, mopts);
  } else {
    earned = 0;
    card.classList.add('wrong');
    badge.className = 'badge badge-no';
    badge.textContent = LABELS.wrong_label;
    correctEl.innerHTML = LABELS.answer_prefix + multiAnswerText(wantKeys, mopts);
  }
  return earned;
}

function multiAnswerText(keys, options) {
  return keys.sort(function (a, b) { return a - b; }).map(function (k) {
    return String.fromCharCode(65 + k) + '. ' + (options ? options[k] : '');
  }).join('  ');
}

function gradeFill(q, qid, card, badge, correctEl) {
  var nBlanks = fillBlankCount(q.question);
  var blanks = fillBlankAnswers(q.answer, nBlanks);
  var n = blanks.length;
  var hit = 0;
  var displays = [];

  for (var b = 0; b < n; b++) {
    var inp = document.getElementById('fill-' + qid + '-' + b);
    var accepted = blanks[b] || [''];
    var user = inp ? normText(inp.value) : '';
    var ok = false;
    for (var a = 0; a < accepted.length; a++) {
      if (accepted[a] !== '' && normText(accepted[a]) === user && user !== '') { ok = true; break; }
    }
    if (inp) inp.classList.add(ok ? 'fill-ok' : 'fill-no');
    if (ok) hit++;
    displays.push((n > 1 ? (b + 1) + '. ' : '') + accepted.filter(function (x) { return x !== ''; }).join(' / '));
  }

  var earned = roundScore(q.points * hit / n);
  correctEl.innerHTML = LABELS.answer_prefix + displays.join('   ');

  if (hit === n) {
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
  } else if (hit > 0) {
    card.classList.add('partial');
    badge.className = 'badge badge-partial';
    badge.textContent = LABELS.partial_label;
  } else {
    card.classList.add('wrong');
    badge.className = 'badge badge-no';
    badge.textContent = LABELS.wrong_label;
  }
  return earned;
}
