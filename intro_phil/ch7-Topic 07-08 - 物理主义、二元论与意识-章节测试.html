/* === ExamPass Shared Styles === */

/* ── Partial-credit badge ── */
.badge-partial { background: #fef3c7; color: #92400e; }
.q-card.partial { border-color: #f59e0b; }

/* ── Result after grading ── */
.result {
  display: none; margin-top: 8px; padding: 8px 12px;
  background: #fefcf5; border: 1px solid var(--card-border);
  border-radius: 4px; font-size: 0.9em; line-height: 1.6;

.result .badge {

var Q = {"chapter_id": "ch7", "chapter_label": "Topic 07-08 - 物理主义、二元论与意识", "questions": [{"kc_id": "kc7.1", "cognitive_level": "理解", "difficulty": "中等", "type": "choice", "question": "关于心物问题（mind-body problem），以下哪个表述最准确地概括了物理主义与二元论之间的核心分歧？", "options": ["A. 意识经验是否可以通过物理过程完全解释", "B. 心灵是否具有自由意志", "C. 人类是否有道德责任", "D. 语言是否决定思维方式"], "answer": "A", "explanation": "心物问题的核心在于：意识经验是否可以通过大脑的物理过程来完全解释。物理主义主张一切心理状态都可以还原为物理状态，而二元论认为心灵与物质是根本不同的实体或属性。", "pitfall": "选B混淆了心物问题与自由意志问题；选C将心灵哲学与伦理学混淆；选D将心物问题与语言哲学混淆。"}, {"kc_id": "kc7.2", "cognitive_level": "理解", "difficulty": "困难", "type": "choice", "question": "取消唯物主义（eliminative materialism）对日常心理概念（如信念、欲望）持何种立场？", "options": ["A. 这些概念指称真实的心理状态，但最终可还原为大脑状态", "B. 这些概念是暂时的理论术语，最终将被成熟的神经科学术语取代", "C. 这些概念指称非物质的心灵属性", "D. 这些概念是语言游戏的一部分，没有指称任何实在"], "answer": "B", "explanation": "取消唯物主义认为民间心理学术语是错误的理论框架，类似于已被抛弃的燃素概念。随着神经科学成熟，这些概念将被证明是空洞的，并被更科学的术语取代。", "pitfall": "选A描述的是还原物理主义；选C是二元论；选D更接近维特根斯坦立场。"}, {"kc_id": "kc7.3", "cognitive_level": "应用", "difficulty": "中等", "type": "choice", "question": "根据类型同一性理论（type identity theory），疼痛与C-纤维神经激活之间的关系是什么？", "options": ["A. 疼痛与C-纤维激活是偶然相关的两个不同现象", "B. 疼痛导致C-纤维激活，但两者可以分离存在", "C. 疼痛就是C-纤维激活，如同水就是H₂O", "D. 疼痛是C-纤维激活在更高层次上的实现"], "answer": "C", "explanation": "类型同一性理论主张心理类型与物理类型之间存在严格的同一性关系。如同水是H₂O是后天必然真理，疼痛就是C-纤维激活也是后天必然真理。", "pitfall": "选A是二元论；选B是笛卡尔二元论；选D是功能主义观点。"}, {"kc_id": "kc7.4", "cognitive_level": "理解", "difficulty": "中等", "type": "choice", "question": "功能主义（functionalism）如何定义心理状态？", "options": ["A. 心理状态由其内在的物理构成定义", "B. 心理状态是不可还原的主观现象", "C. 心理状态是副现象，没有因果效力", "D. 心理状态由其因果功能角色定义——即相对于行为和其他心理状态的关系"], "answer": "D", "explanation": "功能主义认为心理状态由因果功能角色决定，而非物理构成。这允许多重实现性：不同物理基底可以实现相同的心理状态。", "pitfall": "选A是类型同一性理论；选B是属性二元论；选C是副现象论。"}, {"kc_id": "kc7.5", "cognitive_level": "理解", "difficulty": "中等", "type": "choice", "question": "Chalmers提出的意识的困难问题（hard problem of consciousness）指的是什么？", "options": ["A. 为什么物理过程会伴随主观经验", "B. 大脑如何处理复杂信息并产生智能行为", "C. 意识如何帮助生物适应环境", "D. 大脑各区域如何协同工作产生统一意识"], "answer": "A", "explanation": "困难问题是：为什么任何物理过程会伴随主观经验？为什么成为某种东西是什么感觉？这被认为是物理科学难以解决的。", "pitfall": "选B、C、D都是关于意识功能的简单问题。困难问题特指主观经验的存在。"}, {"kc_id": "kc7.6", "cognitive_level": "理解", "difficulty": "简单", "type": "choice", "question": "在心灵哲学中，感受质（qualia）指的是什么？", "options": ["A. 心理状态的因果效力", "B. 意识经验的质感特征——如看到红色的感觉", "C. 大脑中信息处理的计算过程", "D. 信念和欲望的内容"], "answer": "B", "explanation": "感受质是指意识经验的质感特征，如看到红色的、被刺痛的痛感等主观经验。这是物理主义解释心智时的主要挑战。", "pitfall": "选A混淆了感受质与心理因果性；选C是功能主义视角；选D混淆了感受质与意向性。"}, {"kc_id": "kc7.7", "cognitive_level": "应用", "difficulty": "困难", "type": "choice", "question": "Nagel的蝙蝠论证（bat argument）旨在说明什么？", "options": ["A. 蝙蝠使用回声定位而非视觉来感知世界", "B. 不同物种具有不同形式的意识", "C. 物理知识无法完全捕捉主观经验的本质", "D. 意识是进化的适应性特征"], "answer": "C", "explanation": "Nagel说明：即使掌握关于蝙蝠的所有物理知识，我们仍然无法知道成为一只蝙蝠是什么感觉。这揭示了物理主义的根本局限。", "pitfall": "选A和B没有抓住论证的哲学要点；选D与Nagel论证无关。"}, {"kc_id": "kc7.8", "cognitive_level": "应用", "difficulty": "困难", "type": "choice", "question": "在Mary房间思想实验中，当Mary第一次看到红色时，她是否学到了新知识？这个论证旨在反驳什么观点？", "options": ["A. 没有学到新知识；反驳了颜色视觉的神经科学理论", "B. 没有学到新知识；反驳了意识的生物学基础理论", "C. 学到了新知识；反驳了知觉的因果理论", "D. 学到了新知识；反驳了一切知识都是物理知识的物理主义观点"], "answer": "D", "explanation": "Jackson认为Mary学到了看到红色是什么感觉，这表明物理知识不足以穷尽一切知识，存在非物理的事实，从而反驳物理主义。", "pitfall": "选A和B是物理主义者的回应；选C误解了论证的哲学目标。"}, {"kc_id": "kc7.9", "cognitive_level": "分析", "difficulty": "困难", "type": "choice", "question": "Searle的中文房间思想实验主要挑战的是什么观点？", "options": ["A. 运行程序本身就足以产生理解和意识", "B. 机器可以理解中文", "C. 人工智能不可能通过图灵测试", "D. 句法操作可以产生语义内容"], "answer": "A", "explanation": "Searle挑战的是强人工智能观点：运行适当程序本身就足以产生理解。中文房间中外部表现像理解中文，但实际上没有任何理解发生。", "pitfall": "选B过于表面化；选C与Searle论证相反；选D是Searle论证的结论而非挑战对象。"}, {"kc_id": "kc7.1", "cognitive_level": "理解", "difficulty": "简单", "type": "tf", "question": "心物问题（mind-body problem）关注的是心理状态与物理状态之间的关系问题。", "options": ["A. 正确", "B. 错误"], "answer": "A", "explanation": "心物问题是心灵哲学的核心问题，关注心理状态与物理状态之间的关系。", "pitfall": "心物问题不同于自由意志问题、知识论问题等其他哲学问题。"}, {"kc_id": "kc7.2", "cognitive_level": "理解", "difficulty": "简单", "type": "tf", "question": "取消唯物主义认为，日常心理概念（如信念、欲望）最终将被证明是空洞的，类似于已被抛弃的科学概念（如燃素）。", "options": ["A. 正确", "B. 错误"], "answer": "A", "explanation": "取消唯物主义认为民间心理学是错误的理论框架，如同燃素概念被证明是空洞的。", "pitfall": "取消唯物主义与还原物理主义不同：还原论认为概念可还原，取消论认为概念根本上是错误的。"}, {"kc_id": "kc7.3", "cognitive_level": "理解", "difficulty": "简单", "type": "tf", "question": "类型同一性理论认为，心理状态与大脑状态之间存在严格的同一性关系，如同水与H₂O的关系。", "options": ["A. 正确", "B. 错误"], "answer": "A", "explanation": "类型同一性理论主张心理类型与物理类型的同一性，如疼痛就是C-纤维激活，这是后天必然真理。", "pitfall": "区分类型同一性与个例同一性。"}, {"kc_id": "kc7.4", "cognitive_level": "理解", "difficulty": "简单", "type": "tf", "question": "功能主义允许心理状态的多重实现性（multiple realizability），即不同物理基底可以实现相同的心理状态。", "options": ["A. 正确", "B. 错误"], "answer": "A", "explanation": "功能主义认为心理状态由因果功能角色定义，而非物理构成，因此允许多重实现性。", "pitfall": "多重实现性论证是功能主义反对类型同一性理论的主要论据。"}, {"kc_id": "kc7.5", "cognitive_level": "理解", "difficulty": "简单", "type": "tf", "question": "Chalmers认为，意识的困难问题可以用标准的还原科学方法来解决。", "options": ["A. 正确", "B. 错误"], "answer": "B", "explanation": "Chalmers明确指出困难问题不能用还原方法解决，这是物理主义解释心智时的根本困难。", "pitfall": "Chalmers的论证正是要指出还原方法的局限。"}, {"kc_id": "kc7.6", "cognitive_level": "理解", "difficulty": "简单", "type": "tf", "question": "感受质（qualia）是指意识经验的质感特征，如看到红色的感觉或被刺痛的痛感。", "options": ["A. 正确", "B. 错误"], "answer": "A", "explanation": "感受质是意识经验的质感方面，是心物问题中的关键难题。", "pitfall": "感受质不同于心理状态的意向性。"}, {"kc_id": "kc7.7", "cognitive_level": "理解", "difficulty": "简单", "type": "tf", "question": "Nagel的蝙蝠论证表明，即使掌握了关于蝙蝠的所有物理知识，我们仍然无法知道成为一只蝙蝠是什么感觉。", "options": ["A. 正确", "B. 错误"], "answer": "A", "explanation": "Nagel指出物理知识是第三人称的，主观经验是第一人称的，两者之间存在解释鸿沟。", "pitfall": "论证不是关于蝙蝠的能力，而是关于物理知识与主观经验的鸿沟。"}, {"kc_id": "kc7.8", "cognitive_level": "理解", "difficulty": "简单", "type": "tf", "question": "Mary房间思想实验表明，物理知识不足以穷尽一切知识，因为存在关于主观经验的事实。", "options": ["A. 正确", "B. 错误"], "answer": "A", "explanation": "Jackson认为Mary学到了新知识，表明存在非物理的事实，反驳物理主义。", "pitfall": "注意Jackson后来撤回了这一结论。"}, {"kc_id": "kc7.9", "cognitive_level": "理解", "difficulty": "简单", "type": "tf", "question": "Searle的中文房间论证表明，纯粹的句法操作（如运行程序）不足以产生语义和理解。", "options": ["A. 正确", "B. 错误"], "answer": "A", "explanation": "Searle认为程序是纯形式化的，而理解需要语义和意向性。", "pitfall": "论证挑战的是强人工智能而非弱人工智能。"}, {"kc_id": "kc7.1", "cognitive_level": "理解", "difficulty": "中等", "type": "fill", "question": "心物问题是心灵哲学的核心问题，主要探讨______与______之间的关系。", "options": ["A. 心理状态；物理状态", "B. 意识；物质", "C. 主观；客观", "D. 形式；内容"], "answer": "A", "explanation": "心物问题特指心理状态与物理状态之间的关系问题。", "pitfall": "注意心物问题的精确含义，不是泛泛的意识与物质的关系。"}, {"kc_id": "kc7.3", "cognitive_level": "应用", "difficulty": "中等", "type": "fill", "question": "类型同一性理论认为，心理状态与大脑状态的关系如同水与H₂O的关系，这是一种______同一性。", "options": ["A. 后天必然", "B. 先天偶然", "C. 先天必然", "D. 后天偶然"], "answer": "A", "explanation": "如同水是H₂O是通过科学发现的必然真理，心理-物理同一性是后天必然的。", "pitfall": "这是克里普克阐述的重要区分。"}, {"kc_id": "kc7.4", "cognitive_level": "理解", "difficulty": "中等", "type": "fill", "question": "功能主义认为心理状态由其______定义，这使得心理状态具有______性。", "options": ["A. 物理构成；还原", "B. 因果功能角色；多重实现", "C. 内在属性；副现象", "D. 意向内容；宽内容"], "answer": "B", "explanation": "功能主义认为心理状态由因果功能角色定义，导致多重实现性。", "pitfall": "选项A是还原物理主义；选项C涉及副现象论。"}, {"kc_id": "kc7.5", "cognitive_level": "理解", "difficulty": "中等", "type": "fill", "question": "Chalmers区分了意识的问题和______问题。简单问题涉及意识的功能方面；困难问题涉及______的存在。", "options": ["A. 简单；主观经验", "B. 困难；物理过程", "C. 计算；意识", "D. 进化；适应性"], "answer": "A", "explanation": "简单问题涉及功能性方面，困难问题涉及主观经验。", "pitfall": "注意简单问题是相对困难问题而言可以用还原方法处理。"}, {"kc_id": "kc7.6", "cognitive_level": "理解", "difficulty": "中等", "type": "fill", "question": "感受质是意识经验的______特征，物理主义的主要困难是如何解释这些______的质感特征。", "options": ["A. 因果；客观", "B. 质感；主观", "C. 功能；可还原", "D. 意向；公共"], "answer": "B", "explanation": "感受质是主观的、私人的质感特征。", "pitfall": "感受质的主观性是其关键特征。"}, {"kc_id": "kc7.7", "cognitive_level": "应用", "difficulty": "中等", "type": "fill", "question": "Nagel的蝙蝠论证揭示了______知识与______经验之间的鸿沟。", "options": ["A. 科学；常识", "B. 第三人称；第一人称", "C. 客观；客观", "D. 理论；实践"], "answer": "B", "explanation": "物理知识是第三人称的，主观经验是第一人称的。", "pitfall": "核心是第一人称与第三人称的区分。"}, {"kc_id": "kc7.8", "cognitive_level": "应用", "difficulty": "中等", "type": "fill", "question": "在Mary房间思想实验中，Mary第一次看到红色时，Jackson认为她学到了关于______的新知识。", "options": ["A. 颜色视觉的神经机制", "B. 看到红色的主观经验", "C. 光波的物理性质", "D. 视觉系统的计算过程"], "answer": "B", "explanation": "Mary已经知道所有物理知识，学到的是关于主观经验的新知识。", "pitfall": "选项A、C、D都是Mary已经知道的物理知识。"}, {"kc_id": "kc7.9", "cognitive_level": "应用", "difficulty": "中等", "type": "fill", "question": "Searle的中文房间论证挑战的是______人工智能的观点，认为运行______本身不足以产生理解。", "options": ["A. 弱；程序", "B. 强；程序", "C. 弱；神经网络", "D. 强；神经网络"], "answer": "B", "explanation": "Searle挑战的是强人工智能：运行程序本身就足以产生理解。", "pitfall": "Searle不反对弱人工智能。"}, {"kc_id": "kc7.1", "cognitive_level": "分析", "difficulty": "困难", "type": "short", "question": "简要说明物理主义与二元论在心物问题上的主要分歧，并各举一个代表性立场。", "options": ["A. 物理主义认为心理状态可还原为物理状态，如类型同一性理论；二元论认为心灵与物质是不同实体，如笛卡尔的实体二元论", "B. 物理主义认为意识是幻觉；二元论认为意识是物质的", "C. 物理主义认为只有物质存在；二元论认为只有心灵存在", "D. 物理主义认为心理状态是功能状态；二元论认为心理状态是量子状态"], "answer": "A", "explanation": "物理主义主张心理状态可还原为物理状态，如类型同一性理论。二元论主张心灵与物质根本不同，如笛卡尔实体二元论。", "pitfall": "选项B错误地将物理主义等同于取消主义；选项C错误地将二元论等同于唯心主义。"}, {"kc_id": "kc7.3", "cognitive_level": "分析", "difficulty": "困难", "type": "short", "question": "类型同一性理论面临的主要反驳是什么？功能主义如何回应？", "options": ["A. 多重实现性论证：同一心理状态可以在不同物理系统中实现；功能主义通过强调功能角色而非物理构成来回应", "B. 感受质论证：主观经验无法还原；功能主义通过否认感受质存在来回应", "C. 自由意志论证：意识具有自由意志；功能主义通过接受副现象论来回应", "D. 意向性论证：心理状态具有语义内容；功能主义通过将语义还原为计算来回应"], "answer": "A", "explanation": "多重实现性论证是主要反驳；功能主义通过强调功能角色来回应。", "pitfall": "选项B涉及Chalmers的困难问题，不是针对类型同一性理论的主要反驳。"}, {"kc_id": "kc7.5", "cognitive_level": "分析", "difficulty": "困难", "type": "short", "question": "为什么Chalmers认为意识的困难问题不能用还原科学方法解决？", "options": ["A. 主观经验是第一人称的、私人的，物理知识是第三人称的、客观的，两者之间存在解释鸿沟", "B. 意识是量子现象，不能用经典物理学解释", "C. 意识是进化的副产品，没有功能解释", "D. 意识是计算过程，不能用生物学方法解释"], "answer": "A", "explanation": "还原方法只能解释结构和功能，但困难问题涉及主观经验，存在解释鸿沟。", "pitfall": "选项B是Penrose的观点，不是Chalmers的立场。"}, {"kc_id": "kc7.8", "cognitive_level": "评价", "difficulty": "困难", "type": "short", "question": "Mary房间思想实验对物理主义的挑战是否成功？请考虑Lewis的能力假设回应。", "options": ["A. 挑战成功，Mary确实学到了新知识；Lewis的回应失败", "B. 挑战不成功，Mary只是获得了新的能力；Lewis的能力假设提供了物理主义的回应", "C. 挑战成功，Mary的学习只能是关于非物理事实；Lewis的回应无关紧要", "D. 挑战不成功，Mary不可能知道一切物理知识；Lewis的回应基于错误假设"], "answer": "B", "explanation": "Lewis认为Mary没有学到新事实，只是获得了新的能力。这提供了物理主义的回应。", "pitfall": "选项A和C忽视了Lewis的有效回应；选项D误解了思想实验的设定。"}, {"kc_id": "kc7.1", "cognitive_level": "综合", "difficulty": "困难", "type": "essay", "question": "比较分析物理主义与二元论在解释意识问题上的优劣，并讨论物理主义是否足以完整地解释心智。", "options": ["A. 物理主义优于二元论，符合科学统一性，且相关论证都已被成功反驳", "B. 二元论优于物理主义，能更好地解释主观经验，且相关论证都支持二元论", "C. 物理主义在解释意识功能方面成功，但在解释主观经验方面面临困难；相关论证揭示了物理主义的解释鸿沟，但物理主义者也有回应策略", "D. 物理主义与二元论都失败了，需要第三种立场（如泛心论）来解释意识"], "answer": "C", "explanation": "物理主义在功能性方面成功，但在主观经验方面面临困难。相关论证揭示了鸿沟，但物理主义者也有回应策略。", "pitfall": "选项A忽视了物理主义面临的真实困难；选项B忽视了二元论自身的问题。"}, {"kc_id": "kc7.4", "cognitive_level": "综合", "difficulty": "困难", "type": "essay", "question": "功能主义如何应对类型同一性理论面临的多重实现性问题？结合中国脑思想实验进行讨论。", "options": ["A. 功能主义否认多重实现性的可能性，认为心理状态必须由特定物理基底实现", "B. 功能主义接受多重实现性，认为心理状态由功能角色定义，中国脑这样的思想实验表明整个国家也可以有心理状态", "C. 功能主义认为多重实现性只适用于简单心理状态，不适用于意识", "D. 功能主义接受多重实现性但否认中国脑这样的极端案例"], "answer": "B", "explanation": "功能主义接受多重实现性，中国脑思想实验表明如果整个国家的功能组织与人脑相同，那么国家也可以有心理状态。", "pitfall": "选项A与功能主义立场相反；选项C和D对功能主义的理解不完整。"}, {"kc_id": "kc7.5", "cognitive_level": "综合", "difficulty": "困难", "type": "essay", "question": "综合讨论Nagel的蝙蝠论证、Jackson的Mary房间和Chalmers的困难问题如何共同揭示了物理主义的局限。", "options": ["A. 这三个论证分别针对物理主义的不同方面：主观经验的不可还原性、物理知识的不完整性、解释鸿沟的存在", "B. 这三个论证都是错误的，因为它们都预设了二元论", "C. 这三个论证只对还原物理主义有效，对功能主义无效", "D. 这三个论证已经被物理学家彻底驳斥"], "answer": "A", "explanation": "三个论证从不同角度揭示物理主义局限：Nagel强调主观经验的私人性，Jackson强调物理知识的不完整性，Chalmers强调解释鸿沟。", "pitfall": "选项B预设了二元论是正确的；选项C不完全准确，这些论证也对功能主义构成挑战。"}, {"kc_id": "kc7.9", "cognitive_level": "综合", "difficulty": "困难", "type": "essay", "question": "结合Searle的中文房间和Chalmers的困难问题，讨论人工智能是否可能具有真正的意识和理解。", "options": ["A. 不可能，因为中文房间表明句法操作不足以产生语义，困难问题表明意识无法由物理过程产生", "B. 可能，因为中文房间论证有争议，困难问题尚未被证明不可解决", "C. 人工智能可能有功能等价于意识的系统，但是否有主观经验是另一个问题，这涉及困难问题和中文房间揭示的深层问题", "D. 人工智能已经具有意识，因为图灵测试是意识的充分条件"], "answer": "C", "explanation": "综合讨论表明：人工智能可能有功能等价系统，但是否有主观经验涉及 // ─── Answer normalization (robust to how the JSON was authored) ──────
// tf / choice answers may arrive as int index, boolean, letter ("A"),
// or label string ("正确"/"错误"/"对"/"错"). All are coerced to an
// option index so grading never silently fails on a type mismatch.

function tfAnswerIndex(ans) {
  // option 0 = true_label (正确), option 1 = false_label (错误)
  if (typeof ans === 'boolean') return ans ? 0 : 1;
  if (typeof ans === 'number') return ans === 0 ? 0 : 1;
  var s = ('' + ans).trim().toLowerCase();
  var truthy = ['0', 't', 'true', '正确', '对', '是', 'yes', 'y', '√', '✓'];
  var falsy  = ['1', 'f', 'false', '错误', '错', '否', 'no', 'n', '×', 'x'];
  if (truthy.indexOf(s) !== -1) return 0;
  if (falsy.indexOf(s) !== -1) return 1;
  return ans ? 0 : 1;
}

function choiceAnswerIndex(ans, options) {
  if (typeof ans === 'number') return ans;
  var s = ('' + ans).trim();
  if (/^[A-Za-z]$/.test(s)) return s.toUpperCase().charCodeAt(0) - 65;
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  if (options) {
    for (var i = 0; i < options.length; i++) {
      if (('' + options[i]).trim() === s) return i;
    }
  }
  return parseInt(s, 10);
}

function multiAnswerSet(ans, options) {
  var arr = Array.isArray(ans) ? ans : [ans];
  var set = {};
  for (var i = 0; i < arr.length; i++) {
    set[choiceAnswerIndex(arr[i], options)] = true;
  }
  return set;
}

// Normalize free text for fill-in-the-blank comparison: trim, lowercase,
// drop surrounding whitespace and common punctuation, unify full/half width.
function normText(s) {
  s = ('' + s).trim().toLowerCase();
  s = s.replace(/[\s　]+/g, '');
  s = s.replace(/[.,;:!?。，、；：！？“”"'（）()【】\[\]<>《》]/g, '');
  // full-width ASCII -> half-width
  s = s.replace(/[！-～]/g, function (c) {
    return String.fromCharCode(c.charCodeAt(0) - 0xfee0);
  });
  return s;
}

// How many blanks does a fill question have? Count underscore / ＿ runs.
function fillBlankCount(question) {
  var m = ('' + question).match(/(_{2,}|＿+)/g);
  return m ? m.length : 0;
}

// Coerce a fill `answer` into an array (one entry per blank) of accepted
// answer lists. Handles: string, [synonyms], [[blank1 syns],[blank2 syns]].
function fillBlankAnswers(ans, nBlanks) {
  if (nBlanks < 1) nBlanks = 1;
  if (!Array.isArray(ans)) return padBlanks([[ans]], nBlanks);
  if (ans.length && Array.isArray(ans[0])) return padBlanks(ans, nBlanks);
  // flat array of strings
  if (nBlanks === 1) return [ans];                 // synonyms for one blank
  if (ans.length === nBlanks) {                    // one answer per blank
    return ans.map(function (a) { return [a]; });
  }
  return padBlanks([ans], nBlanks);                // ambiguous -> all on blank 1
}

function padBlanks(arr, n) {
  var out = arr.slice(0, n);
  while (out.length < n) out.push(['']);
  return out;
}

function build() {
  var container = document.getElementById('questions-container');
  if (!container) { console.error('ExamPass: questions-container not found'); return; }

  // Stable-sort questions by section order so headings group correctly
  // regardless of input order.
  var order = LABELS.section_order || [];
  Q.forEach(function (q, i) { q._i = i; });
  Q.sort(function (a, b) {
    var oa = order.indexOf(a.type); if (oa === -1) oa = 99;
    var ob = order.indexOf(b.type); if (ob === -1) ob = 99;
    return oa - ob || a._i - b._i;
  });

  var h = '';
  var sec = '';
  var titles = LABELS.section;

  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    if (q.type !== sec) {
      sec = q.type;
      if (titles[q.type]) h += '<h3>' + titles[q.type] + '</h3>';
    }

    var qid = 'q' + i;
    h += '<div class="q-card" id="card-' + qid + '">';
    h += '<div class="q-num">' + (i + 1) + '. (' + q.points + ' ' + LABELS.points_suffix + ')</div>';

    if (q.type === 'fill') {
      h += '<div class="q-text">' + renderFill(q, qid) + '</div>';
    } else {
      h += '<div class="q-text">' + q.question + '</div>';
    }

    if (q.type === 'choice') {
      var opts = q.options || [];
      for (var j = 0; j < opts.length; j++) {
        h += '<label class="option" id="opt-' + qid + '-' + j + '" onclick="sel(\'' + qid + '\',' + j + ')">';
        h += '<input type="radio" name="' + qid + '" value="' + j + '">' + String.fromCharCode(65 + j) + '. ' + opts[j] + '</label>';
      }
    } else if (q.type === 'multi') {
      var mopts = q.options || [];
      for (var k = 0; k < mopts.length; k++) {
        h += '<label class="option" id="opt-' + qid + '-' + k + '" onclick="toggle(\'' + qid + '\',' + k + ')">';
        h += '<input type="checkbox" name="' + qid + '" value="' + k + '">' + String.fromCharCode(65 + k) + '. ' + mopts[k] + '</label>';
      }
    } else if (q.type === 'tf') {
      h += '<label class="option" id="opt-' + qid + '-0" onclick="sel(\'' + qid + '\',0)">';
      h += '<input type="radio" name="' + qid + '" value="0">' + LABELS.true_label + '</label>';
      h += '<label class="option" id="opt-' + qid + '-1" onclick="sel(\'' + qid + '\',1)">';
      h += '<input type="radio" name="' + qid + '" value="1">' + LABELS.false_label + '</label>';
    } else if (q.type === 'fill') {
      // inputs already rendered inline inside q-text
    } else if (q.type === 'code') {
      h += '<textarea class="q-textarea q-code" id="text-' + qid + '" placeholder="' + (LABELS.code_placeholder || LABELS.placeholder) + '" rows="8" spellcheck="false"></textarea>';
    } else {
      h += '<textarea class="q-textarea" id="text-' + qid + '" placeholder="' + LABELS.placeholder + '" rows="3"></textarea>';
    }

    h += '<div class="result" id="result-' + qid + '">';
    h += '<span class="badge" id="badge-' + qid + '"></span><span id="correct-' + qid + '"></span>';
    h += '<div class="explanation">' + (q.explanation || '') + '</div>';
    if (q.pitfall) {
      h += '<div class="pitfall">' + LABELS.pitfall_prefix + q.pitfall + '</div>';
    }
    h += '</div></div>';
  }

  container.innerHTML = h;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]).catch(function (err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

// Render fill question text with inline <input> boxes replacing blanks.
function renderFill(q, qid) {
  var nBlanks = fillBlankCount(q.question);
  var k = 0;
  var html = ('' + q.question).replace(/(_{2,}|＿+)/g, function () {
    var inp = '<input type="text" class="fill-input" id="fill-' + qid + '-' + k + '" autocomplete="off" spellcheck="false">';
    k++;
    return inp;
  });
  if (k === 0) {
    // No markers in text -> append boxes based on answer shape
    var n = fillBlankAnswers(q.answer, 1).length;
    var ans = q.answer;
    if (Array.isArray(ans)) n = Array.isArray(ans[0]) ? ans.length : (ans.length || 1);
    if (n < 1) n = 1;
    html += '<div class="fill-row">';
    for (var b = 0; b < n; b++) {
      if (n > 1) html += '<span class="fill-tag">' + (b + 1) + '.</span>';
      html += '<input type="text" class="fill-input" id="fill-' + qid + '-' + b + '" autocomplete="off" spellcheck="false">';
    }
    html += '</div>';
  }
  return html;
}

document.addEventListener('DOMContentLoaded', build);
if (document.readyState === 'interactive' || document.readyState === 'complete') {
  build();
}

// ─── Selection handlers ──────────────────────────────────────────────

function sel(qid, idx) {
  var prefix = 'opt-' + qid + '-';
  var all = document.querySelectorAll('[id^="' + prefix + '"]');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('selected');
  var target = document.getElementById('opt-' + qid + '-' + idx);
  if (target) target.classList.add('selected');
  var radio = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  if (radio) radio.checked = true;
}

function toggle(qid, idx) {
  var box = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  var label = document.getElementById('opt-' + qid + '-' + idx);
  if (!box) return;
  box.checked = !box.checked;
  if (label) label.classList.toggle('selected', box.checked);
}

// ─── Grading ─────────────────────────────────────────────────────────

function gradeAll() {
  var score = 0;
  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    var qid = 'q' + i;
    var card = document.getElementById('card-' + qid);
    var result = document.getElementById('result-' + qid);
    var badge = document.getElementById('badge-' + qid);
    var correctEl = document.getElementById('correct-' + qid);
    if (!card || !result) continue;

    result.style.display = 'block';

    if (q.type === 'choice' || q.type === 'tf') {
      score += gradeSingle(q, qid, card, badge, correctEl);
    } else if (q.type === 'multi') {
      score += gradeMulti(q, qid, card, badge, correctEl);
    } else if (q.type === 'fill') {
      score += gradeFill(q, qid, card, badge, correctEl);
    } else {
      card.classList.add('correct');
      badge.className = 'badge badge-ref';
      badge.textContent = LABELS.reference_label;
    }
  }

  var sb = document.getElementById('score-box');
  if (sb) {
    sb.style.display = 'block';
    document.getElementById('score-num').textContent = roundScore(score);
    sb.scrollIntoView({ behavior: 'smooth' });
  }

  var opts = document.querySelectorAll('.option');
  for (var a = 0; a < opts.length; a++) opts[a].style.pointerEvents = 'none';
  var tas = document.querySelectorAll('.q-textarea');
  for (var b = 0; b < tas.length; b++) tas[b].disabled = true;
  var fis = document.querySelectorAll('.fill-input');
  for (var c = 0; c < fis.length; c++) fis[c].disabled = true;

  var btn = document.getElementById('grade-btn');
  if (btn) { btn.disabled = true; btn.textContent = LABELS.graded_label; }

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(function (err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

function roundScore(s) {
  return Math.round(s * 10) / 10;
}

function gradeSingle(q, qid, card, badge, correctEl) {
  var ansIdx = q.type === 'tf' ? tfAnswerIndex(q.answer) : choiceAnswerIndex(q.answer, q.options);
  var radio = document.querySelector('input[name="' + qid + '"]:checked');
  if (radio && parseInt(radio.value, 10) === ansIdx) {
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
    correctEl.innerHTML = '';
    var ok = document.getElementById('opt-' + qid + '-' + ansIdx);
    if (ok) ok.classList.add('correct-answer');
    return q.points;
  }
  card.classList.add('wrong');
  badge.className = 'badge badge-no';
  badge.textContent = LABELS.wrong_label;
  var ansText = q.type === 'choice'
    ? String.fromCharCode(65 + ansIdx) + '. ' + (q.options ? q.options[ansIdx] : '')
    : (ansIdx === 0 ? LABELS.true_label : LABELS.false_label);
  correctEl.innerHTML = LABELS.answer_prefix + ansText;
  if (radio) {
    var wrongOpt = document.getElementById('opt-' + qid + '-' + radio.value);
    if (wrongOpt) wrongOpt.classList.add('wrong-answer');
  }
  var corr = document.getElementById('opt-' + qid + '-' + ansIdx);
  if (corr) corr.classList.add('correct-answer');
  return 0;
}

function gradeMulti(q, qid, card, badge, correctEl) {
  var want = multiAnswerSet(q.answer, q.options);
  var wantKeys = Object.keys(want).map(Number);
  var checked = document.querySelectorAll('input[name="' + qid + '"]:checked');
  var picked = [];
  for (var i = 0; i < checked.length; i++) picked.push(parseInt(checked[i].value, 10));

  var anyWrong = false, hitCorrect = 0;
  for (var p = 0; p < picked.length; p++) {
    if (want[picked[p]]) hitCorrect++;
    else anyWrong = true;
  }

  // reveal correct / wrong option markers
  var mopts = q.options || [];
  for (var j = 0; j < mopts.length; j++) {
    var el = document.getElementById('opt-' + qid + '-' + j);
    if (!el) continue;
    if (want[j]) el.classList.add('correct-answer');
    else if (picked.indexOf(j) !== -1) el.classList.add('wrong-answer');
  }

  var earned;
  if (!anyWrong && hitCorrect === wantKeys.length && picked.length === wantKeys.length) {
    earned = q.points;
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
    correctEl.innerHTML = '';
  } else if (!anyWrong && hitCorrect > 0) {
    // 少选不错选 -> partial credit
    earned = roundScore(q.points * hitCorrect / wantKeys.length);
    card.classList.add('partial');
    badge.className = 'badge badge-partial';
    badge.textContent = LABELS.partial_label;
    correctEl.innerHTML = LABELS.answer_prefix + multiAnswerText(wantKeys, mopts);
  } else {
    earned = 0;
    card.classList.add('wrong');
    badge.className = 'badge badge-no';
    badge.textContent = LABELS.wrong_label;
    correctEl.innerHTML = LABELS.answer_prefix + multiAnswerText(wantKeys, mopts);
  }
  return earned;
}

function multiAnswerText(keys, options) {
  return keys.sort(function (a, b) { return a - b; }).map(function (k) {
    return String.fromCharCode(65 + k) + '. ' + (options ? options[k] : '');
  }).join('  ');
}

function gradeFill(q, qid, card, badge, correctEl) {
  var nBlanks = fillBlankCount(q.question);
  var blanks = fillBlankAnswers(q.answer, nBlanks);
  var n = blanks.length;
  var hit = 0;
  var displays = [];

  for (var b = 0; b < n; b++) {
    var inp = document.getElementById('fill-' + qid + '-' + b);
    var accepted = blanks[b] || [''];
    var user = inp ? normText(inp.value) : '';
    var ok = false;
    for (var a = 0; a < accepted.length; a++) {
      if (accepted[a] !== '' && normText(accepted[a]) === user && user !== '') { ok = true; break; }
    }
    if (inp) inp.classList.add(ok ? 'fill-ok' : 'fill-no');
    if (ok) hit++;
    displays.push((n > 1 ? (b + 1) + '. ' : '') + accepted.filter(function (x) { return x !== ''; }).join(' / '));
  }

  var earned = roundScore(q.points * hit / n);
  correctEl.innerHTML = LABELS.answer_prefix + displays.join('   ');

  if (hit === n) {
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
  } else if (hit > 0) {
    card.classList.add('partial');
    badge.className = 'badge badge-partial';
    badge.textContent = LABELS.partial_label;
  } else {
    card.classList.add('wrong');
    badge.className = 'badge badge-no';
    badge.textContent = LABELS.wrong_label;
  }
  return earned;
}
