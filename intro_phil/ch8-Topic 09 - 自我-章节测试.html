<style>
/* === ExamPass Shared Styles === */
/* Paper-like warm background, clean typography, responsive */

:root {
  --paper: #fdf6e3;
  --paper-dark: #f5ecd7;
  --ink: #2c2c2c;
  --ink-light: #555;
  --accent: #2563eb;
  --accent-hover: #1d4ed8;
  --divider: #d6c8a8;
  --card-bg: #fef9ef;
  --card-border: #e8dcc8;
  --correct: #22c55e;
  --correct-bg: #f0fdf4;
  --wrong: #ef4444;
  --wrong-bg: #fef2f2;
  --tag-bg: #fef3c7;
  --tag-text: #92400e;
  --radius: 6px;
}

* { box-sizing: border-box; }

body {
  font-family: "Microsoft YaHei", "Noto Sans SC", "SimSun", sans-serif;
  font-size: 12pt; line-height: 1.75; color: var(--ink);
  max-width: 860px; margin: auto; padding: 24px 20px 60px;
  background: var(--paper);
}

@media print {
  body { font-size: 10.5pt; background: #fff; }
  .no-print { display: none !important; }
  h1, h2, h3 { page-break-after: avoid; }
}

/* ── Header ── */
#exampass-header {
  display: flex; justify-content: space-between; align-items: baseline;
  padding: 6px 0; margin-bottom: 0;
}
.header-brand { font-size: 1.2em; font-weight: 700; color: #1a1a2e; letter-spacing: 0.3px; }
.header-url  { font-size: 0.78em; color: #999; }
.header-divider { border: none; border-top: 2px solid var(--divider); margin: 4px 0 20px 0; }

/* ── Typography ── */
h1 { font-size: 1.55em; text-align: center; border-bottom: 2px solid var(--divider); padding-bottom: 8px; margin-top: 0; }
h2 { font-size: 1.25em; border-bottom: 1px solid var(--divider); padding-bottom: 4px; margin-top: 28px; }
h3 { font-size: 1.08em; margin-top: 20px; color: var(--ink); }
a { color: var(--accent); text-decoration: none; }
a:hover { text-decoration: underline; }

/* ── Tables ── */
table { border-collapse: collapse; width: 100%; margin: 10px 0; font-size: 0.95em; }
td, th { border: 1px solid var(--card-border); padding: 5px 9px; text-align: left; }
th { background: var(--paper-dark); font-weight: 700; }

/* ── Knowledge point vs explanation ── */
.kp { font-weight: 700; color: var(--ink); }           /* key point: bold dark */
.exp { font-weight: 400; color: var(--ink-light); }    /* explanation: lighter */
.exp em, .exp strong { color: var(--ink); }             /* emphasis inside explanation */

/* ── Block elements ── */
blockquote {
  border-left: 3px solid #c0392b; background: #fef9ef;
  padding: 6px 14px; margin: 10px 0; font-size: 0.95em;
}
code { background: #f0ede0; padding: 2px 5px; border-radius: 3px; font-size: 0.92em; }
pre { background: #f0ede0; padding: 10px; border-radius: var(--radius); overflow-x: auto; }

/* ── TOC ── */
div.toc {
  background: var(--card-bg); padding: 14px 18px;
  border: 1px solid var(--card-border); border-radius: var(--radius); margin-bottom: 22px;
}
div.toc ul { padding-left: 18px; }
div.toc li { margin: 3px 0; font-size: 0.95em; }

/* ── Priority tags ── */
.tag-must   { background: #fee2e2; color: #991b1b; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }
.tag-key    { background: #fef3c7; color: #92400e; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }
.tag-freq   { background: #dbeafe; color: #1e40af; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }
.tag-info   { background: #f0fdf4; color: #166534; padding: 1px 6px; border-radius: 3px; font-size: 0.82em; font-weight: 600; }

/* === Interactive Test Styles === */

/* ── Score box ── */
#score-box {
  display: none; background: var(--paper-dark); color: var(--ink);
  padding: 16px 20px; border-radius: var(--radius); margin: 14px 0;
  text-align: center; border: 1px solid var(--card-border);
}
#score-box .score-num { font-size: 2.2em; font-weight: 700; }
#score-box .score-label { font-size: 0.85em; color: var(--ink-light); }

/* ── Question card ── */
.q-card {
  background: var(--card-bg); border: 1px solid var(--card-border);
  border-radius: var(--radius); padding: 12px 14px; margin: 10px 0;
  transition: all 0.15s;
}
.q-card.correct { border-left: 3px solid var(--correct); background: #f7fdf4; }
.q-card.wrong   { border-left: 3px solid var(--wrong); background: #fef9f9; }

.q-num  { font-weight: 700; font-size: 0.98em; margin-bottom: 4px; }
.q-text { margin-bottom: 8px; font-size: 0.98em; }

/* ── Options (compact) ── */
.option {
  display: block; padding: 4px 10px; margin: 3px 0;
  border: 1px solid var(--card-border); border-radius: 4px;
  cursor: pointer; transition: all 0.12s; font-size: 0.93em;
  background: #fefcf5;
}
.option:hover            { background: #f0ede0; }
.option input            { margin-right: 6px; }
.option.selected         { border-color: var(--accent); background: #eff6ff; }
.option.correct-answer   { border-color: var(--correct); background: var(--correct-bg); }
.option.wrong-answer     { border-color: var(--wrong); background: var(--wrong-bg); }

/* ── Textareas (compact) ── */
.q-textarea {
  width: 100%; min-height: 56px; border: 1px solid var(--card-border);
  border-radius: 4px; padding: 6px 10px; font-family: inherit;
  font-size: 0.93em; background: #fefcf5; resize: vertical;
}
.q-textarea:focus { outline: none; border-color: var(--accent); }
.q-code {
  font-family: "Consolas", "Monaco", "Courier New", monospace;
  font-size: 0.88em; line-height: 1.5; background: #1e1e2e; color: #e0e0e0;
  tab-size: 4; white-space: pre;
}
.q-code:focus { border-color: var(--accent); }

/* ── Partial-credit badge ── */
.badge-partial { background: #fef3c7; color: #92400e; }
.q-card.partial { border-color: #f59e0b; }

/* ── Result after grading ── */
.result {
  display: none; margin-top: 8px; padding: 8px 12px;
  background: #fefcf5; border: 1px solid var(--card-border);
  border-radius: 4px; font-size: 0.9em; line-height: 1.6;
}
.result .badge {
  display: inline-block; padding: 1px 9px; border-radius: 3px;
  font-weight: 700; font-size: 0.82em; margin-right: 6px;
}
.badge-ok  { background: var(--correct-bg); color: #166534; }
.badge-no  { background: var(--wrong-bg); color: #991b1b; }
.badge-ref { background: #dbeafe; color: #1e40af; }

.result .explanation { margin-top: 4px; color: var(--ink); }
.result .pitfall { color: #b45309; margin-top: 3px; font-size: 0.9em; }

/* ── Grading button ── */
.grading-bar { text-align: center; margin: 20px 0; }
.grading-bar button {
  font-size: 1em; padding: 8px 32px; background: var(--accent);
  color: #fff; border: none; border-radius: var(--radius);
  cursor: pointer; font-weight: 600; letter-spacing: 0.3px;
}
.grading-bar button:hover     { background: var(--accent-hover); }
.grading-bar button:disabled  { background: #bbb; cursor: not-allowed; }

</style>
</head>

var Q = {"chapter_id": "ch8", "chapter_label": "Topic 09: 自我——什么让你成为「你」？", "questions": [{"kc_id": "kc8.1", "cognitive_level": "记忆", "difficulty": 0.35, "type": "choice", "question": "以下哪项最准确地表述了「人格同一性」问题所探讨的核心？", "options": ["一个人的性格特征如何随时间变化", "一个人在时间流逝中保持为同一个人是由什么决定的", "一个人的道德责任如何跨越时间保持", "一个人如何区别于其他人的独特身份"], "answer": "B", "explanation": "人格同一性问题的核心是：在时间流逝中，是什么让一个人保持为「同一个人」。这探讨的是个人如何在时间中持续存在，而非性格变化、独特性或道德责任等其他问题。", "pitfall": "选A：将人格同一性与人格特质的变化混淆，未区分「为什么是同一个人」与「是怎样的人」；选C：虽然人格同一性涉及道德责任问题，但这只是其应用而非核心定义；选D：将同一性问题理解为个体差异问题，未把握同一性关注的是时间维度上的持续。"}, {"kc_id": "kc8.2", "cognitive_level": "理解", "difficulty": 0.5, "type": "choice", "question": "身体连续性理论面临的最严重挑战是什么？", "options": ["无法解释为什么细胞逐渐替换后身体仍是同一副", "无法解释为什么身体对自我认知很重要", "大脑移植思想实验中，大多数人认为「跟着大脑走」而非「跟着身体走」", "无法解释为什么我们需要通过身体来识别他人"], "answer": "C", "explanation": "身体连续性理论的核心困难在于大脑移植思想实验：当大脑被移植到另一个身体时，大多数人认为「你」跟着大脑走，而非跟着原来的身体走。这表明身体可能不是人格同一性的决定性因素。", "pitfall": "选A：误将身体连续性的内部问题（细胞替换）视为最大挑战，实际上这正是该理论能够解释的；选B：身体对自我认知的重要性并不否定身体作为同一性标准的理论；选D：这是身体连续性理论的优势而非挑战。"}, {"kc_id": "kc8.3", "cognitive_level": "理解", "difficulty": 0.55, "type": "choice", "question": "帕菲特的传送器思想实验（原版未被摧毁，产生两个完全相同的「你」）主要挑战了心理连续性理论的哪个方面？", "options": ["心理状态是否能够被完整复制", "记忆是否是心理连续性的核心", "心理状态是否具有因果连续性", "心理连续性是否足以定义同一性（唯一性）"], "answer": "D", "explanation": "传送器思想实验（原版未被摧毁）产生了两个心理状态完全相同的「你」，他们都与原来的你心理连续。但由于你是唯一的，不可能两个都是「你」。这表明：心理连续性（即使满足）不足以定义人格同一性，因为同一性要求唯一性。", "pitfall": "选A：传送器思想实验预设了心理状态可以被复制，但这不是该实验要挑战的核心问题；选B：记忆是否是核心不是该思想实验要挑战的点；选C：心理状态的因果连续性在该实验中是满足的，不是问题所在。"}, {"kc_id": "kc8.4", "cognitive_level": "理解", "difficulty": 0.5, "type": "choice", "question": "大脑连续性理论相比身体连续性理论的主要优势是什么？", "options": ["更好地解释了为什么「你」在大脑移植中跟着大脑走", "更好地解释了为什么细胞替换不影响同一性", "更好地解释了为什么记忆是同一性的关键", "更好地解释了为什么心理状态如此重要"], "answer": "A", "explanation": "大脑连续性理论的主要优势在于解释大脑移植直觉：当人们想象大脑被移植到另一个身体时，大多数人认为「你」跟着大脑走。大脑连续性理论直接捕捉了这一直觉，而身体连续性理论无法解释。", "pitfall": "选B：细胞替换的解释是身体连续性理论能够处理的；选C：记忆是心理连续性理论的核心，不是大脑理论的；选D：心理状态的重要性是心理连续性理论的优势，不是大脑理论的。"}, {"kc_id": "kc8.5", "cognitive_level": "分析", "difficulty": 0.7, "type": "choice", "question": "帕菲特的分裂思想实验（大脑分成两半分别移植）的哲学意义是什么？", "options": ["证明心理连续性理论是错误的", "表明身体连续性理论比心理连续性理论更正确", "证明人格同一性取决于大脑的完整性", "表明同一性（唯一性）可能不是最重要的——重要的是心理连续性本身"], "answer": "D", "explanation": "帕菲特的分裂思想实验中，你有两个「延续者」都心理连续于你，但他们不可能是同一个人。帕菲特的结论是：我们不应执着于「同一性」（唯一性）这个概念，重要的是心理连续性本身——即使有两个延续者，你的「重要部分」（心理状态）仍然存在。", "pitfall": "选A：帕菲特不是说心理连续性理论错误，而是指出同一性概念本身的局限；选B：分裂思想实验同样挑战身体连续性理论；选C：分裂思想实验挑战的正是大脑完整性作为同一性标准的观点。"}, {"kc_id": "kc8.1", "cognitive_level": "理解", "difficulty": 0.45, "type": "tf", "question": "人格同一性问题关注的是「你为什么是同一个人」，而不是「你是怎样的人」。", "options": ["A. 正确", "B. 错误"], "answer": "A", "explanation": "人格同一性探讨的是在时间流逝中一个人如何保持为同一个人，而非探讨一个人的性格、特质或身份特征。性格变化（如从内向变外向）不会改变人格同一性。", "pitfall": "误答为B：混淆了「人格同一性」与「人格特质」，未区分问题的不同层面。"}, {"kc_id": "kc8.2", "cognitive_level": "应用", "difficulty": 0.55, "type": "tf", "question": "德内特的「我在哪里？」思想实验（大脑被取出放在生命维持系统中，身体被远程操控）表明大脑比身体更重要，因为这支持了大脑连续性理论。", "options": ["A. 正确", "B. 错误"], "answer": "A", "explanation": "德内特的思想实验中，当被问及「你在哪里」时，大多数人会回答在实验室看着大脑的地方，而非操控身体的地方。这暗示大脑是人格同一性的关键，支持了大脑连续性理论，对body>身体连续性理论构成挑战。", "pitfall": "误答为B：虽然思想实验确实支持大脑的重要性，但可能误以为这只是一个个案，未理解思想实验的哲学功能在于检验直觉。"}, {"kc_id": "kc8.3", "cognitive_level": "应用", "difficulty": 0.6, "type": "tf", "question": "洛克认为人格同一性依赖于记忆——如果你能记得昨天的经历，那昨天的你就是今天的你。", "options": ["A. 正确", "B. 错误"], "answer": "A", "explanation": "洛克的经典观点是：人格同一性依赖于意识的连续性，特别是记忆。如果你能记得自己昨天的经历，那昨天的你和今天的你在意识上是连续的，因此是同一个人。", "pitfall": "误答为B：虽然这一观点面临后续批评（如记忆的可错性、记忆的间断如睡眠等），但洛克的核心观点确实是记忆/意识连续性构成人格同一性。"}, {"kc_id": "kc8.4", "cognitive_level": "应用", "difficulty": 0.55, "type": "tf", "question": "大脑连续性理论认为，如果大脑被逐渐替换（一个神经元一个神经元地被人工替代），最终完全变成人工大脑，那么这个人就不再是原来的那个人。", "options": ["A. 正确", "B. 错误"], "answer": "B", "explanation": "大脑连续性理论强调的是「连续性」——只要过程是连续的（即使大脑被逐渐替换），同一性就保持。这与身体连续性理论的逻辑一致：即使细胞逐渐替换，只要过程连续，同一性就保持。", "pitfall": "误答为A：混淆了「逐渐替换」（保持连续性）与「突然替换」（中断连续性）。大脑连续性理论恰恰认为逐渐替换不影响同一性。"}, {"kc_id": "kc8.5", "cognitive_level": "分析", "difficulty": 0.65, "type": "tf", "question": "帕菲特认为，在分裂思想实验中，即使有两个「延续者」，你的「重要部分」（心理状态）仍然存在，因此你的存在并不依赖于「同一性」。", "options": ["A. 正确", "B. 错误"], "answer": "A", "explanation": "帕菲特的激进观点是：我们不应执着于「同一性」（唯一性），重要的是心理连续性本身。即使有两个「延续者」，你的心理状态、记忆、性格等重要部分都延续下去了，这才是真正重要的。", "pitfall": "误答为B：可能误以为帕菲特否认自我存在或认为同一性绝对重要，未理解帕菲特是在重新定义什么才是重要的。"}, {"kc_id": "kc8.1", "cognitive_level": "记忆", "difficulty": 0.4, "type": "fill", "question": "人格同一性问题探讨的核心是：在______中，是什么让一个人保持为「同一个人」。", "options": ["A. 空间移动", "B. 时间流逝", "C. 道德责任", "D. 社会关系"], "answer": "B", "explanation": "人格同一性问题关注的是在时间流逝中，是什么让一个人保持为同一个人。这是该问题的核心维度。", "pitfall": "选A：空间移动与人格同一性无关；选C：道德责任是同一性问题的应用，不是核心定义；选D：社会关系是外部因素，不是同一性问题的核心。"}, {"kc_id": "kc8.2", "cognitive_level": "理解", "difficulty": 0.5, "type": "fill", "question": "身体连续性理论强调「______」——即使细胞逐渐替换，只要过程连续，同一性就保持。", "options": ["A. 不变性", "B. 完整性", "C. 连续性", "D. 稳定性"], "answer": "C", "explanation": "身体连续性理论的核心是「连续性」概念——即使细胞逐渐替换，只要替换过程是连续的（而非突然的、跳跃的），人格同一性就保持。", "pitfall": "选A：不变性同样与逐渐替换矛盾；选B：完整性暗示整体不可分割，与逐渐替换矛盾；选D：稳定性强调不变，与细胞替换矛盾。"}, {"kc_id": "kc8.3", "cognitive_level": "应用", "difficulty": 0.6, "type": "fill", "question": "心理连续性强调「______」——你的心理状态是由昨天的你的心理状态______导致的。两个心理相似但没有这种联系的人不是同一个人。", "options": ["A. 空间连续；空间", "B. 逻辑连续；逻辑", "C. 时间连续；时间", "D. 因果连续；因果"], "answer": "D", "explanation": "心理连续性不同于心理相似性，它强调「因果连续」——你的心理状态是由昨天的你的心理状态因果导致的。两个心理相似但没有因果联系的人（如克隆人）不是同一个人。", "pitfall": "选A：空间连续与心理连续性无关；选B：逻辑连续不是心理连续性的核心概念；选C：时间连续是必要的但不是充分的，关键在因果关系。"}, {"kc_id": "kc8.4", "cognitive_level": "理解", "difficulty": 0.5, "type": "fill", "question": "大脑连续性理论面临的一个难题是：如果大脑被逐渐替换，最终完全变成______大脑，你是否还是你？", "options": ["A. 电子", "B. 生物", "C. 人工", "D. 机械"], "answer": "C", "explanation": "大脑连续性理论面临的核心难题是：如果大脑被一个神经元一个神经元地逐渐替换为人工替代品，最终完全变成人工大脑，你还是你吗？这与身体连续性理论的逻辑一致，但挑战了「大脑」作为同一性标准的直觉。", "pitfall": "选A、D：虽然电子、机械都涉及非生物替代品，但「人工大脑」是最准确、最常用的表述；选B：生物大脑不会引发同一性难题。"}, {"kc_id": "kc8.5", "cognitive_level": "分析", "difficulty": 0.7, "type": "fill", "question": "帕菲特的分裂思想实验中，你有两个「______」都心理连续于你，但他们不可能是同一个人，这表明同一性（唯一性）可能不是最重要的。", "options": ["A. 分裂者", "B. 替代者", "C. 延续者", "D. 复制者"], "answer": "C", "explanation": "帕菲特使用「延续者」（continuers）这一术语来描述分裂后与你有心理连续性的两个人。他们都延续了你，但不可能是同一个人，这挑战了同一性（唯一性）的重要性。", "pitfall": "选A：分裂者指的是分裂过程，不是结果；选B：替代者暗示取代原初，不符合帕菲特的描述；选D：复制者暗示完全复制，但分裂是分成两半，不是复制。"}, {"kc_id": "kc8.1", "cognitive_level": "分析", "difficulty": 0.65, "type": "short", "question": "人格同一性问题的重要性体现在哪些方面？请简要说明。", "options": ["A. 关系到数学推理、逻辑证明、哲学体系的建构", "B. 关系到对自我的理解、道德责任的归属、来世问题的思考", "C. 关系到语言的表达、文化的传承、社会结构的稳定", "D. 关系到科学实验的设计、医疗诊断的准确性、法律判决的公正性"], "answer": "B", "explanation": "人格同一性问题的重要性体现在：(1)对自我的理解——我们是否有持久的「自我」？(2)道德责任——30年后的你该不该为现在的你负责？(3)来世问题——复活后的你还是你吗？这些都是人格同一性问题的重要应用。", "pitfall": "选A：将同一性问题与认识论问题混淆；选C：将同一性问题与社会文化问题混淆；选D：将哲学问题误认为具有直接的实践应用。"}, {"kc_id": "kc8.2", "cognitive_level": "分析", "difficulty": 0.6, "type": "short", "question": "身体连续性理论的核心直觉是什么？它面临的主要反例是什么？", "options": ["A. 身体是意识的物质基础；心理状态可以被完整复制", "B. 身体的连续性是客观的；记忆的可错性挑战了身体的可靠性", "C. 我们通常通过身体识别他人；大脑移植思想实验中「跟着大脑走」的直觉", "D. 身体是自我认知的核心；克隆人的出现挑战了身体的唯一性"], "answer": "C", "explanation": "身体连续性理论的直觉基础是：我们通常通过身体来识别他人（这是常识）。但它面临的主要反例是大脑移植思想实验：当大脑被移植到另一个身体时，大多数人认为「你」跟着大脑走，而非跟着原来的身体走。", "pitfall": "选A：将身体理论与心理复制问题混淆；选B：记忆的可错性与身体连续性理论无直接关系；选D：克隆人不是身体连续性理论的主要反例。"}, {"kc_id": "kc8.3", "cognitive_level": "分析", "difficulty": 0.65, "type": "short", "question": "洛克的记忆理论面临哪些主要问题？请简要说明。", "options": ["A. 记忆的存储位置、记忆的编码方式、记忆的提取机制", "B. 记忆的情感色彩、记忆的主观性、记忆的建构性", "C. 记忆的容量限制、记忆的遗忘曲线、记忆的干扰效应", "D. 记忆的可错性、记忆的间断（如睡眠）、循环记忆问题"], "answer": "D", "explanation": "洛克的记忆理论面临的主要哲学问题包括：(1)记忆的可错性——如果记忆是同一性的基础，错误的记忆是否改变同一性？(2)记忆的间断——睡眠、昏迷等间断是否中断同一性？(3)循环记忆——如果A记得B，B记得C，C记得A，他们是否都是同一个人？", "pitfall": "选A、B、C：这些选项涉及记忆的心理科学问题，而非洛克记忆理论面临的哲学问题。"}, {"kc_id": "kc8.4", "cognitive_level": "分析", "difficulty": 0.6, "type": "short", "question": "大脑连续性理论如何解释「大脑移植」直觉？它与身体连续性理论有何不同？", "options": ["A. 两种理论都认为你跟着身体走，但对身体的定义不同", "B. 两种理论都认为你跟着大脑走，但对大脑的定义不同", "C. 大脑连续性理论认为你跟着身体走，认为身体是同一性的关键；身体连续性理论认为你跟着大脑走", "D. 大脑连续性理论认为你跟着大脑走，认为大脑是同一性的关键；身体连续性理论认为你跟着身体走"], "answer": "D", "explanation": "大脑连续性理论的核心是：人格同一性取决于大脑的连续性，因此大脑移植时「你」跟着大脑走。身体连续性理论则认为同一性取决于身体的连续性，因此「你」跟着身体走。这两种理论给出了不同的预测。", "pitfall": "选A、B：错误地认为两种理论立场相同；选C：颠倒了两种理论的立场。"}, {"kc_id": "kc8.5", "cognitive_level": "评价", "difficulty": 0.75, "type": "short", "question": "帕菲特的分裂思想实验如何挑战所有关于人格同一性的简单答案？", "options": ["A. 它表明大脑连续性理论是正确的，因为分裂后大脑也分裂了", "B. 它表明无论同一性取决于身体、心理还是大脑，分裂后都不可能有两个「你」，因此同一性概念本身可能需要重新审视", "C. 它表明身体连续性理论是唯一正确的，因为分裂后身体保持不变", "D. 它表明心理连续性理论是错误的，因为分裂后没有心理连续性"], "answer": "B", "explanation": "帕菲特的分裂思想实验中，无论同一性取决于身体、心理还是大脑，分裂后都会产生两个「延续者」，他们都满足原有的同一性条件，但你不可能同时是两个人。这表明：同一性（唯一性）这个概念本身可能需要被重新审视——也许同一性并不重要，重要的是心理连续性本身。", "pitfall": "选A：分裂思想实验恰恰挑战大脑连续性理论，因为大脑也分裂了；选C：分裂后身体也改变了，身体连续性理论同样受挑战；选D：分裂后两个延续者都心理连续于原来的你，心理连续性是满足的。"}, {"kc_id": "kc8.1", "cognitive_level": "综合", "difficulty": 0.7, "type": "essay", "question": "比较身体连续性、心理连续性和大脑连续性三种理论，分析它们各自的优缺点，并讨论哪种理论最能解释人格同一性。", "options": ["A. 身体连续性理论最符合常识直觉，但无法解释大脑移植直觉；心理连续性理论解释了记忆的重要性，但面临复制问题；大脑连续性理论解释了大脑移植直觉，但面临逐渐替换问题。没有一种理论完美，需要综合考虑", "B. 三种理论都完全错误，人格同一性取决于灵魂，科学无法解释", "C. 身体连续性理论完全错误，因为它忽视了心理因素；心理连续性理论完美无缺，因为它抓住了记忆的核心地位；大脑连续性理论是多余的折中", "D. 三种理论都同样正确，只是从不同角度解释了同一性；大脑连续性理论是最终答案，因为它最科学"], "answer": "A", "explanation": "三种理论各有优缺点：身体连续性最符合常识但无法解释大脑移植直觉；心理连续性解释了记忆的重要性但面临传送器复制问题；大脑连续性解释了大脑移植直觉但面临逐渐替换问题。这个问题没有简单的答案，需要综合考虑各种直觉和论证。", "pitfall": "选B：引入了超自然的灵魂概念，不符合哲学分析的方法；选C：心理连续性理论并非完美无缺；选D：三种理论给出了不同的、相互矛盾的预测，不能都正确。"}, {"kc_id": "kc8.3", "cognitive_level": "综合", "difficulty": 0.75, "type": "essay", "question": "洛克的记忆理论和帕菲特的心理连续性理论有何异同？帕菲特对洛克理论的发展体现在哪些方面？", "options": ["A. 两者完全相同：帕菲特只是重复了洛克的理论，没有新的贡献", "B. 两者完全不同：洛克是二元论者，帕菲特是物理主义者；他们的理论建立在完全不同的基础上", "C. 两者完全不同：洛克强调记忆，帕菲特强调身体；帕菲特完全拒绝了洛克的理论", "D. 两者都强调心理连续性，但帕菲特弱化了记忆的单一核心地位，强调心理状态的全面连续性（包括性格、偏好等），并引入传送器思想实验来检验理论"], "answer": "D", "explanation": "洛克和帕菲特都强调心理连续性，但帕菲特对洛克理论有所发展：(1)弱化了记忆的唯一核心地位，强调心理状态的全面连续性（包括性格、偏好、信念等）；(2)引入传送器思想实验来检验心理连续性理论；(3)通过分裂思想实验挑战同一性概念本身。", "pitfall": "选A：帕菲特有重要的理论发展，不只是重复；选B：洛克和帕菲特都不是二元论者，他们的分歧不在此；选C：帕菲特并未强调身体，他是心理连续性理论的发展者。"}, {"kc_id": "kc8.5", "cognitive_level": "综合", "difficulty": 0.8, "type": "essay", "question": "帕菲特的分裂思想实验对「同一性」概念提出了怎样的挑战？帕菲特认为什么才是真正重要的？", "options": ["A. 分裂思想实验表明心理连续性理论是错误的，因为它无法解释分裂情况", "B. 分裂思想实验表明同一性是最重要的，因此我们必须接受同一性在分裂情况下消失", "C. 分裂思想实验表明同一性（唯一性）无法在分裂情况下保持，因此同一性可能不是最重要的——重要的是心理连续性本身，即记忆、性格等重要部分的延续", "D. 分裂思想实验表明大脑连续性理论是正确的，因为分裂后大脑也分裂了"], "answer": "C", "explanation": "帕菲特的分裂思想实验表明：无论同一性取决于什么（身体、心理还是大脑），分裂后都不可能有两个「你」，但你确实有两个「延续者」都延续了你。帕菲特因此认为：同一性（唯一性）可能不是最重要的——重要的是心理连续性本身，即记忆、性格等重要部分的延续。", "pitfall": "选A：帕菲特不是说心理连续性理论错误，而是指出同一性概念本身的局限；选B：与帕菲特的核心观点直接相反；选D：分裂思想实验恰恰挑战大脑连续性理论。"}, {"kc_id": "kc8.1", "cognitive_level": "综合", "difficulty": 0.75, "type": "comprehensive", "question": "综合分析人格同一性问题的哲学意义：它如何影响我们对自我、道德责任和来世的理解？", "options": ["A. 人格同一性问题已经被科学解决，哲学讨论不再必要", "B. 人格同一性问题只影响道德责任，不影响对自我和来世的理解", "C. 人格同一性问题只是纯粹的学术讨论，与我们对自我、道德责任和来世的理解无关", "D. 人格同一性问题关系到我们是否有持久的自我（还是自我是虚构的）、30年后的你是否为现在的你负责、复活后的你还是不是你。这些问题触及我们对自身存在的根本理解"], "answer": "D", "explanation": "人格同一性问题具有深远的哲学意义：(1)对自我的理解——我们是否有持久的「自我」，还是自我是方便的虚构？(2)道德责任——30年后的你该不该为现在的你负责？(3)来世问题——复活后的你还是你吗？这些问题触及我们对自身存在的根本理解。", "pitfall": "选A：人格同一性问题是哲学问题，科学无法直接解决；选B：过于狭隘，人格同一性问题的影响不限于道德责任；选C：忽视了人格同一性问题的实际应用价值。"}, {"kc_id": "kc8.2", "cognitive_level": "综合", "difficulty": 0.7, "type": "comprehensive", "question": "综合比较身体连续性理论与大脑连续性理论，分析德内特的「我在哪里？」思想实验如何支持大脑连续性理论。", "options": ["A. 两种理论都错误，德内特的思想实验表明同一性取决于意识而非任何物理基础", "B. 身体连续性理论认为同一性取决于身体的连续性；大脑连续性理论认为同一性取决于大脑的连续性。德内特的思想实验表明：当大脑和身体分离时，人们认为「你」在大脑所在的地方，支持大脑连续性理论", "C. 两种理论完全相同，都强调物理连续性；德内特的思想实验没有区分它们", "D. 身体连续性理论完全错误，大脑连续性理论完全正确；德内特的思想实验证明了这一点"], "answer": "B", "explanation": "身体连续性理论和大脑连续性理论都强调物理连续性，但指向不同的物理基础。德内特的思想实验（大脑被取出放在生命维持系统中，身体被远程操控）检验了人们的直觉：大多数人认为「你」在实验室看着大脑的地方，而非操控身体的地方。这支持大脑连续性理论，对body>身体连续性理论构成挑战。", "pitfall": "选B：德内特的思想实验支持大脑作为同一性基础，而非否定物理基础；选C：两种理论虽然都强调物理连续性，但指向不同的基础，德内特的思想实验恰恰区分了它们；选D：大脑连续性理论并非完全正确，它面临逐渐替换等问题。"}, {"kc_id": "kc8.3", "cognitive_level": "综合", "difficulty": 0.75, "type": "comprehensive", "question": "综合分析心理连续性理论面临的主要挑战（包括传送器思想实验和分裂思想实验），并讨论这些挑战是否成功反驳了该理论。", "options": ["A. 这些思想实验只是科幻设想，对心理连续性理论没有任何哲学影响", "B. 传送器思想实验（原版未被摧毁）挑战了心理连续性与同一性的关系，表明心理连续性可能不足以定义同一性；分裂思想实验进一步挑战同一性概念本身。这些挑战成功指出同一性概念的局限，但不一定完全否定心理连续性的重要性", "C. 传送器思想实验和分裂思想实验都支持心理连续性理论，因为它们都涉及心理连续性", "D. 传送器思想实验完全否定心理连续性理论，分裂思想实验与心理连续性理论无关"], "answer": "B", "explanation": "传送器思想实验（原版未被摧毁）产生两个心理连续的「你」，挑战了心理连续性与同一性的关系；分裂思想实验进一步挑战同一性概念本身。这些挑战成功指出：即使心理连续性满足，同一性（唯一性）也可能无法保持。但这不意味着心理连续性不重要——帕菲特恰恰认为即使同一性无法保持，心理连续性本身仍然重要。", "pitfall": "选B：思想实验是哲学的重要方法，不是纯粹的科幻；选C：这些思想实验挑战而非支持心理连续性理论对同一性的承诺；选D：分裂思想实验同样挑战心理连续性理论对同一性的承诺。"}]};

// ─── Answer normalization (robust to how the JSON was authored) ──────
// tf / choice answers may arrive as int index, boolean, letter ("A"),
// or label string ("正确"/"错误"/"对"/"错"). All are coerced to an
// option index so grading never silently fails on a type mismatch.

function tfAnswerIndex(ans) {
  // option 0 = true_label (正确), option 1 = false_label (错误)
  if (typeof ans === 'boolean') return ans ? 0 : 1;
  if (typeof ans === 'number') return ans === 0 ? 0 : 1;
  var s = ('' + ans).trim().toLowerCase();
  var truthy = ['0', 't', 'true', '正确', '对', '是', 'yes', 'y', '√', '✓'];
  var falsy  = ['1', 'f', 'false', '错误', '错', '否', 'no', 'n', '×', 'x'];
  if (truthy.indexOf(s) !== -1) return 0;
  if (falsy.indexOf(s) !== -1) return 1;
  return ans ? 0 : 1;
}

function choiceAnswerIndex(ans, options) {
  if (typeof ans === 'number') return ans;
  var s = ('' + ans).trim();
  if (/^[A-Za-z]$/.test(s)) return s.toUpperCase().charCodeAt(0) - 65;
  if (/^\d+$/.test(s)) return parseInt(s, 10);
  if (options) {
    for (var i = 0; i < options.length; i++) {
      if (('' + options[i]).trim() === s) return i;
    }
  }
  return parseInt(s, 10);
}

function multiAnswerSet(ans, options) {
  var arr = Array.isArray(ans) ? ans : [ans];
  var set = {};
  for (var i = 0; i < arr.length; i++) {
    set[choiceAnswerIndex(arr[i], options)] = true;
  }
  return set;
}

// Normalize free text for fill-in-the-blank comparison: trim, lowercase,
// drop surrounding whitespace and common punctuation, unify full/half width.
function normText(s) {
  s = ('' + s).trim().toLowerCase();
  s = s.replace(/[\s　]+/g, '');
  s = s.replace(/[.,;:!?。，、；：！？“”"'（）()【】\[\]<>《》]/g, '');
  // full-width ASCII -> half-width
  s = s.replace(/[！-～]/g, function (c) {
    return String.fromCharCode(c.charCodeAt(0) - 0xfee0);
  });
  return s;
}

// How many blanks does a fill question have? Count underscore / ＿ runs.
function fillBlankCount(question) {
  var m = ('' + question).match(/(_{2,}|＿+)/g);
  return m ? m.length : 0;
}

// Coerce a fill `answer` into an array (one entry per blank) of accepted
// answer lists. Handles: string, [synonyms], [[blank1 syns],[blank2 syns]].
function fillBlankAnswers(ans, nBlanks) {
  if (nBlanks < 1) nBlanks = 1;
  if (!Array.isArray(ans)) return padBlanks([[ans]], nBlanks);
  if (ans.length && Array.isArray(ans[0])) return padBlanks(ans, nBlanks);
  // flat array of strings
  if (nBlanks === 1) return [ans];                 // synonyms for one blank
  if (ans.length === nBlanks) {                    // one answer per blank
    return ans.map(function (a) { return [a]; });
  }
  return padBlanks([ans], nBlanks);                // ambiguous -> all on blank 1
}

function padBlanks(arr, n) {
  var out = arr.slice(0, n);
  while (out.length < n) out.push(['']);
  return out;
}

// ─── Build ───────────────────────────────────────────────────────────

function build() {
  var container = document.getElementById('questions-container');
  if (!container) { console.error('ExamPass: questions-container not found'); return; }

  // Stable-sort questions by section order so headings group correctly
  // regardless of input order.
  var order = LABELS.section_order || [];
  Q.forEach(function (q, i) { q._i = i; });
  Q.sort(function (a, b) {
    var oa = order.indexOf(a.type); if (oa === -1) oa = 99;
    var ob = order.indexOf(b.type); if (ob === -1) ob = 99;
    return oa - ob || a._i - b._i;
  });

  var h = '';
  var sec = '';
  var titles = LABELS.section;

  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    if (q.type !== sec) {
      sec = q.type;
      if (titles[q.type]) h += '<h3>' + titles[q.type] + '</h3>';
    }

    var qid = 'q' + i;
    h += '<div class="q-card" id="card-' + qid + '">';
    h += '<div class="q-num">' + (i + 1) + '. (' + q.points + ' ' + LABELS.points_suffix + ')</div>';

    if (q.type === 'fill') {
      h += '<div class="q-text">' + renderFill(q, qid) + '</div>';
    } else {
      h += '<div class="q-text">' + q.question + '</div>';
    }

    if (q.type === 'choice') {
      var opts = q.options || [];
      for (var j = 0; j < opts.length; j++) {
        h += '<label class="option" id="opt-' + qid + '-' + j + '" onclick="sel(\'' + qid + '\',' + j + ')">';
        h += '<input type="radio" name="' + qid + '" value="' + j + '">' + String.fromCharCode(65 + j) + '. ' + opts[j] + '</label>';
      }
    } else if (q.type === 'multi') {
      var mopts = q.options || [];
      for (var k = 0; k < mopts.length; k++) {
        h += '<label class="option" id="opt-' + qid + '-' + k + '" onclick="toggle(\'' + qid + '\',' + k + ')">';
        h += '<input type="checkbox" name="' + qid + '" value="' + k + '">' + String.fromCharCode(65 + k) + '. ' + mopts[k] + '</label>';
      }
    } else if (q.type === 'tf') {
      h += '<label class="option" id="opt-' + qid + '-0" onclick="sel(\'' + qid + '\',0)">';
      h += '<input type="radio" name="' + qid + '" value="0">' + LABELS.true_label + '</label>';
      h += '<label class="option" id="opt-' + qid + '-1" onclick="sel(\'' + qid + '\',1)">';
      h += '<input type="radio" name="' + qid + '" value="1">' + LABELS.false_label + '</label>';
    } else if (q.type === 'fill') {
      // inputs already rendered inline inside q-text
    } else if (q.type === 'code') {
      h += '<textarea class="q-textarea q-code" id="text-' + qid + '" placeholder="' + (LABELS.code_placeholder || LABELS.placeholder) + '" rows="8" spellcheck="false"></textarea>';
    } else {
      h += '<textarea class="q-textarea" id="text-' + qid + '" placeholder="' + LABELS.placeholder + '" rows="3"></textarea>';
    }

    h += '<div class="result" id="result-' + qid + '">';
    h += '<span class="badge" id="badge-' + qid + '"></span><span id="correct-' + qid + '"></span>';
    h += '<div class="explanation">' + (q.explanation || '') + '</div>';
    if (q.pitfall) {
      h += '<div class="pitfall">' + LABELS.pitfall_prefix + q.pitfall + '</div>';
    }
    h += '</div></div>';
  }

  container.innerHTML = h;

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise([container]).catch(function (err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

// Render fill question text with inline <input> boxes replacing blanks.
function renderFill(q, qid) {
  var nBlanks = fillBlankCount(q.question);
  var k = 0;
  var html = ('' + q.question).replace(/(_{2,}|＿+)/g, function () {
    var inp = '<input type="text" class="fill-input" id="fill-' + qid + '-' + k + '" autocomplete="off" spellcheck="false">';
    k++;
    return inp;
  });
  if (k === 0) {
    // No markers in text -> append boxes based on answer shape
    var n = fillBlankAnswers(q.answer, 1).length;
    var ans = q.answer;
    if (Array.isArray(ans)) n = Array.isArray(ans[0]) ? ans.length : (ans.length || 1);
    if (n < 1) n = 1;
    html += '<div class="fill-row">';
    for (var b = 0; b < n; b++) {
      if (n > 1) html += '<span class="fill-tag">' + (b + 1) + '.</span>';
      html += '<input type="text" class="fill-input" id="fill-' + qid + '-' + b + '" autocomplete="off" spellcheck="false">';
    }
    html += '</div>';
  }
  return html;
}

document.addEventListener('DOMContentLoaded', build);
if (document.readyState === 'interactive' || document.readyState === 'complete') {
  build();
}

// ─── Selection handlers ──────────────────────────────────────────────

function sel(qid, idx) {
  var prefix = 'opt-' + qid + '-';
  var all = document.querySelectorAll('[id^="' + prefix + '"]');
  for (var i = 0; i < all.length; i++) all[i].classList.remove('selected');
  var target = document.getElementById('opt-' + qid + '-' + idx);
  if (target) target.classList.add('selected');
  var radio = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  if (radio) radio.checked = true;
}

function toggle(qid, idx) {
  var box = document.querySelector('input[name="' + qid + '"][value="' + idx + '"]');
  var label = document.getElementById('opt-' + qid + '-' + idx);
  if (!box) return;
  box.checked = !box.checked;
  if (label) label.classList.toggle('selected', box.checked);
}

// ─── Grading ─────────────────────────────────────────────────────────

function gradeAll() {
  var score = 0;
  for (var i = 0; i < Q.length; i++) {
    var q = Q[i];
    var qid = 'q' + i;
    var card = document.getElementById('card-' + qid);
    var result = document.getElementById('result-' + qid);
    var badge = document.getElementById('badge-' + qid);
    var correctEl = document.getElementById('correct-' + qid);
    if (!card || !result) continue;

    result.style.display = 'block';

    if (q.type === 'choice' || q.type === 'tf') {
      score += gradeSingle(q, qid, card, badge, correctEl);
    } else if (q.type === 'multi') {
      score += gradeMulti(q, qid, card, badge, correctEl);
    } else if (q.type === 'fill') {
      score += gradeFill(q, qid, card, badge, correctEl);
    } else {
      card.classList.add('correct');
      badge.className = 'badge badge-ref';
      badge.textContent = LABELS.reference_label;
    }
  }

  var sb = document.getElementById('score-box');
  if (sb) {
    sb.style.display = 'block';
    document.getElementById('score-num').textContent = roundScore(score);
    sb.scrollIntoView({ behavior: 'smooth' });
  }

  var opts = document.querySelectorAll('.option');
  for (var a = 0; a < opts.length; a++) opts[a].style.pointerEvents = 'none';
  var tas = document.querySelectorAll('.q-textarea');
  for (var b = 0; b < tas.length; b++) tas[b].disabled = true;
  var fis = document.querySelectorAll('.fill-input');
  for (var c = 0; c < fis.length; c++) fis[c].disabled = true;

  var btn = document.getElementById('grade-btn');
  if (btn) { btn.disabled = true; btn.textContent = LABELS.graded_label; }

  if (window.MathJax && MathJax.typesetPromise) {
    MathJax.typesetPromise().catch(function (err) {
      console.error('MathJax typeset error:', err);
    });
  }
}

function roundScore(s) {
  return Math.round(s * 10) / 10;
}

function gradeSingle(q, qid, card, badge, correctEl) {
  var ansIdx = q.type === 'tf' ? tfAnswerIndex(q.answer) : choiceAnswerIndex(q.answer, q.options);
  var radio = document.querySelector('input[name="' + qid + '"]:checked');
  if (radio && parseInt(radio.value, 10) === ansIdx) {
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
    correctEl.innerHTML = '';
    var ok = document.getElementById('opt-' + qid + '-' + ansIdx);
    if (ok) ok.classList.add('correct-answer');
    return q.points;
  }
  card.classList.add('wrong');
  badge.className = 'badge badge-no';
  badge.textContent = LABELS.wrong_label;
  var ansText = q.type === 'choice'
    ? String.fromCharCode(65 + ansIdx) + '. ' + (q.options ? q.options[ansIdx] : '')
    : (ansIdx === 0 ? LABELS.true_label : LABELS.false_label);
  correctEl.innerHTML = LABELS.answer_prefix + ansText;
  if (radio) {
    var wrongOpt = document.getElementById('opt-' + qid + '-' + radio.value);
    if (wrongOpt) wrongOpt.classList.add('wrong-answer');
  }
  var corr = document.getElementById('opt-' + qid + '-' + ansIdx);
  if (corr) corr.classList.add('correct-answer');
  return 0;
}

function gradeMulti(q, qid, card, badge, correctEl) {
  var want = multiAnswerSet(q.answer, q.options);
  var wantKeys = Object.keys(want).map(Number);
  var checked = document.querySelectorAll('input[name="' + qid + '"]:checked');
  var picked = [];
  for (var i = 0; i < checked.length; i++) picked.push(parseInt(checked[i].value, 10));

  var anyWrong = false, hitCorrect = 0;
  for (var p = 0; p < picked.length; p++) {
    if (want[picked[p]]) hitCorrect++;
    else anyWrong = true;
  }

  // reveal correct / wrong option markers
  var mopts = q.options || [];
  for (var j = 0; j < mopts.length; j++) {
    var el = document.getElementById('opt-' + qid + '-' + j);
    if (!el) continue;
    if (want[j]) el.classList.add('correct-answer');
    else if (picked.indexOf(j) !== -1) el.classList.add('wrong-answer');
  }

  var earned;
  if (!anyWrong && hitCorrect === wantKeys.length && picked.length === wantKeys.length) {
    earned = q.points;
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
    correctEl.innerHTML = '';
  } else if (!anyWrong && hitCorrect > 0) {
    // 少选不错选 -> partial credit
    earned = roundScore(q.points * hitCorrect / wantKeys.length);
    card.classList.add('partial');
    badge.className = 'badge badge-partial';
    badge.textContent = LABELS.partial_label;
    correctEl.innerHTML = LABELS.answer_prefix + multiAnswerText(wantKeys, mopts);
  } else {
    earned = 0;
    card.classList.add('wrong');
    badge.className = 'badge badge-no';
    badge.textContent = LABELS.wrong_label;
    correctEl.innerHTML = LABELS.answer_prefix + multiAnswerText(wantKeys, mopts);
  }
  return earned;
}

function multiAnswerText(keys, options) {
  return keys.sort(function (a, b) { return a - b; }).map(function (k) {
    return String.fromCharCode(65 + k) + '. ' + (options ? options[k] : '');
  }).join('  ');
}

function gradeFill(q, qid, card, badge, correctEl) {
  var nBlanks = fillBlankCount(q.question);
  var blanks = fillBlankAnswers(q.answer, nBlanks);
  var n = blanks.length;
  var hit = 0;
  var displays = [];

  for (var b = 0; b < n; b++) {
    var inp = document.getElementById('fill-' + qid + '-' + b);
    var accepted = blanks[b] || [''];
    var user = inp ? normText(inp.value) : '';
    var ok = false;
    for (var a = 0; a < accepted.length; a++) {
      if (accepted[a] !== '' && normText(accepted[a]) === user && user !== '') { ok = true; break; }
    }
    if (inp) inp.classList.add(ok ? 'fill-ok' : 'fill-no');
    if (ok) hit++;
    displays.push((n > 1 ? (b + 1) + '. ' : '') + accepted.filter(function (x) { return x !== ''; }).join(' / '));
  }

  var earned = roundScore(q.points * hit / n);
  correctEl.innerHTML = LABELS.answer_prefix + displays.join('   ');

  if (hit === n) {
    card.classList.add('correct');
    badge.className = 'badge badge-ok';
    badge.textContent = LABELS.correct_label;
  } else if (hit > 0) {
    card.classList.add('partial');
    badge.className = 'badge badge-partial';
    badge.textContent = LABELS.partial_label;
  } else {
    card.classList.add('wrong');
    badge.className = 'badge badge-no';
    badge.textContent = LABELS.wrong_label;
  }
  return earned;
}

</script>
</body>
