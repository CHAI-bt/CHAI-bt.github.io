    <style>
        :root {
            --bg: #f7f8fb;
            --surface: #ffffff;
            --surface-hover: #f1f3f6;
            --border: #e2e5ea;
            --text: #1a1d23;
            --text-secondary: #5a5f6b;
            --primary: #d97706;
            --primary-light: #fffbeb;
            --accent: #2563eb;
            --accent-light: #eef3ff;
            --warn: #dc2626;
            --warn-light: #fef2f2;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.04);
            --shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            --radius: 12px;
            --radius-sm: 8px;
            --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            --sidebar-width: 280px;
            --header-height: 56px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.6;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar */
        .sidebar {
            width: var(--sidebar-width);
            height: 100vh;
            background: var(--surface);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            box-shadow: var(--shadow-sm);
            z-index: 10;
            overflow-y: auto;
        }
        .sidebar-header {
            padding: 18px 20px 14px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            background: var(--surface);
            z-index: 2;
        }
        .sidebar-header h2 {
            font-size: 1.05rem;
            font-weight: 700;
        }
        .sidebar-header .subtitle {
            font-size: 0.76rem;
            color: var(--text-secondary);
            margin-top: 2px;
        }
        .sidebar-nav {
            flex: 1;
            padding: 8px 0;
        }
        .nav-section {
            border-bottom: 1px solid var(--border);
        }
        .nav-section-header {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text);
            text-decoration: none;
            transition: var(--transition);
            cursor: pointer;
        }
        .nav-section-header:hover {
            background: var(--surface-hover);
        }
        .nav-section-header .icon {
            width: 20px;
            text-align: center;
            flex-shrink: 0;
        }

        /* Main */
        .main {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        .main-header {
            height: var(--header-height);
            padding: 0 28px;
            display: flex;
            align-items: center;
            border-bottom: 1px solid var(--border);
            background: var(--surface);
            position: sticky;
            top: 0;
            z-index: 5;
            gap: 12px;
            flex-shrink: 0;
        }
        .main-header h1 {
            font-size: 1.1rem;
            font-weight: 700;
        }
        .main-header .badge {
            font-size: 0.7rem;
            padding: 3px 10px;
            border-radius: 20px;
            font-weight: 500;
            background: var(--primary-light);
            color: var(--primary);
        }
        .breadcrumb {
            font-size: 0.78rem;
            color: var(--text-secondary);
        }
        .breadcrumb a {
            color: var(--primary);
            text-decoration: none;
        }
        .breadcrumb a:hover {
            text-decoration: underline;
        }
        .content-area {
            flex: 1;
            padding: 20px 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 800px;
            margin: 0 auto;
        }

        /* Flashcard */
        .flashcard-container {
            perspective: 1000px;
            cursor: pointer;
            width: 100%;
            max-width: 700px;
            margin-bottom: 20px;
        }
        .flashcard {
            width: 100%;
            min-height: 220px;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.5s ease;
            border-radius: var(--radius);
        }
        .flashcard.flipped {
            transform: rotateY(180deg);
        }
        .flashcard-front,
        .flashcard-back {
            position: absolute;
            width: 100%;
            min-height: 220px;
            backface-visibility: hidden;
            border-radius: var(--radius);
            padding: 30px 28px;
            border: 2px solid var(--border);
            background: var(--surface);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            box-shadow: var(--shadow);
        }
        .flashcard-back {
            transform: rotateY(180deg);
        }
        .flashcard-front .fc-q {
            font-size: 1.1rem;
            font-weight: 600;
        }
        .flashcard-front .fc-hint {
            font-size: 0.72rem;
            color: var(--text-secondary);
            margin-top: 12px;
            opacity: 0.7;
        }
        .flashcard-back .fc-a {
            font-size: 0.95rem;
            line-height: 1.7;
        }
        .flashcard-nav {
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            justify-content: center;
        }
        .fc-btn {
            padding: 8px 20px;
            border-radius: 24px;
            border: 1px solid var(--border);
            background: var(--surface);
            cursor: pointer;
            font-size: 0.82rem;
            transition: var(--transition);
            font-family: inherit;
            font-weight: 500;
        }
        .fc-btn:hover {
            background: var(--surface-hover);
            border-color: var(--primary);
        }
        .fc-index {
            font-size: 0.82rem;
            color: var(--text-secondary);
            min-width: 60px;
            text-align: center;
        }

        ::-webkit-scrollbar {
            width: 5px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #d0d4db;
            border-radius: 10px;
        }
        /* ===== Mobile: Hamburger + Drawer ===== */
        .menu-toggle {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 5px;
            width: 44px;
            height: 44px;
            padding: 8px;
            background: transparent;
            border: none;
            cursor: pointer;
            -webkit-tap-highlight-color: transparent;
            flex-shrink: 0;
        }
        .menu-toggle span {
            display: block;
            width: 100%;
            height: 2px;
            background: var(--text);
            border-radius: 2px;
            transition: transform 0.3s, opacity 0.3s;
        }
        .menu-toggle.active span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
        .menu-toggle.active span:nth-child(2) { opacity: 0; }
        .menu-toggle.active span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }

        .sidebar-backdrop {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            z-index: 999;
            opacity: 0;
            transition: opacity 0.3s;
        }
        .sidebar-backdrop.active { opacity: 1; }

        @media (max-width: 768px) {
            body { overflow: auto; height: auto; min-height: 100vh; display: block; }
            .menu-toggle { display: flex; }
            .sidebar {
                position: fixed;
                top: 0;
                left: 0;
                height: 100vh;
                height: 100dvh;
                z-index: 1000;
                transform: translateX(-100%);
                transition: transform 0.3s ease;
            }
            .sidebar.open { transform: translateX(0); }
            .sidebar-backdrop.active { display: block; }
            .main { min-height: 100vh; }
            .main-header { gap: 12px; }
        }

        @media (min-width: 769px) {
            .menu-toggle { display: none !important; }
        }
    </style>
</head>

    <script>
        const flashcardsData = [
            // ---- 基本概念与约束 ----
            { q: '什么是理论力学中的"约束"？', a: '对系统运动所施加的几何或运动学限制。分为<strong>完整约束</strong>（可表为 $f(r_1,\\dots,r_N,t)=0$）和<strong>非完整约束</strong>（不可积微分约束或不等式）。' },
            { q: '什么是完整约束？举例说明。', a: '形如 $f(r_1,r_2,\\dots,t)=0$ 的约束。例如：质点被限制在球面上 $x^2+y^2+z^2=R^2$；刚体内两点距离固定 $(r_i-r_j)^2-c_{ij}^2=0$。' },
            { q: '什么是非完整约束？举例说明。', a: '不能写成 $f(r_i,t)=0$ 的约束，通常包含速度且不可积。例如：垂直纯滚的圆盘 $dx = a\\cos\\phi\\,d\\theta,\\, dy = a\\sin\\phi\\,d\\theta$；不等式约束 $z>0$。' },
            { q: '广义坐标的定义和优点？', a: '描述系统位形的独立参数 $q_1,\\dots,q_n$，$n=3N-k$（$k$ 为完整约束数）。优点：自动满足约束，自由度数减少；方程形式在任意广义坐标下不变。' },
            { q: '什么是虚位移？与实位移的区别？', a: '<strong>虚位移</strong> $\\delta r_i$：满足瞬时约束（$\\delta t=0$）的任意无穷小位移，与运动方程无关。<br><strong>实位移</strong> $dr_i$：同时满足约束和运动方程的真实位移。' },
            { q: '什么是位形空间？', a: '由 $n$ 个广义坐标张成的 $n$ 维抽象空间，系统任意时刻的位形对应其中一点。系统演化为位形空间中的一条曲线。' },
            { q: '什么是理想约束？', a: '约束力在任意虚位移上所做的虚功之和为零：$\\sum_i \\mathbf{f}_i\\cdot\\delta\\mathbf{r}_i = 0$。光滑接触、刚性连接等均属理想约束。' },

            // ---- 达朗伯原理与哈密顿原理 ----
            { q: '写出达朗伯原理的数学表达式。', a: '$$\\sum_i \\left(\\mathbf{F}_i^{(a)} - \\dot{\\mathbf{p}}_i\\right)\\cdot\\delta\\mathbf{r}_i = 0$$ 其中 $\\mathbf{F}_i^{(a)}$ 为主动力，$-\\dot{\\mathbf{p}}_i$ 为反向有效力。' },
            { q: '达朗伯原理中的广义力 $Q_j$ 如何定义？', a: '$$Q_j = \\sum_i \\mathbf{F}_i\\cdot\\frac{\\partial\\mathbf{r}_i}{\\partial q_j}.$$ 其与广义坐标变分的乘积 $Q_j\\delta q_j$ 具有功的量纲。' },
            { q: '哈密顿原理（最小作用量原理）的内容是什么？', a: '单演系统在通过位形空间中两固定点的所有可能运动中，真实路径使<strong>作用量</strong> $I = \\int_{t_1}^{t_2} L\\,dt$ 取极值（通常为极小），即 $\\delta I = 0$。属于 <strong>等时变分</strong>（δ变分）。' },
            { q: '拉格朗日方程的适用范围是什么？', a: '适用于<strong>完整约束、理想约束、单演系统</strong>（主动力可由广义势 $U(q,\\dot{q},t)$ 导出）。当势函数仅依赖于坐标时退化为 $L=T-V$。' },

            // ---- 拉格朗日方程与规范不变性 ----
            { q: '拉格朗日方程的形式是什么？', a: '$$\\frac{d}{dt}\\left(\\frac{\\partial L}{\\partial \\dot{q}_j}\\right) - \\frac{\\partial L}{\\partial q_j} = 0 \\quad (j=1,\\dots,n)$$ 其中 $L=T-V$ 或 $L=T-U$。' },
            { q: '什么是拉格朗日量的规范不变性？', a: '若 $L$ 是系统的拉格朗日量，则 $L\' = L + \\frac{dF(q,t)}{dt}$ 给出相同的运动方程，其中 $F$ 是任意可微函数。' },
            { q: '什么是单演系统？', a: '所有主动力均可由某一广义势函数 $U(q,\\dot{q},t)$ 导出的系统，即 $Q_j = -\\frac{\\partial U}{\\partial q_j} + \\frac{d}{dt}\\frac{\\partial U}{\\partial \\dot{q}_j}$。' },
            { q: '写出电磁场中带电粒子的拉格朗日量。', a: '$$L = \\frac{1}{2}mv^2 - q\\phi + q\\mathbf{A}\\cdot\\mathbf{v}$$ 广义势 $U = q\\phi - q\\mathbf{A}\\cdot\\mathbf{v}$，是速度依赖的势函数。' },

            // ---- 非完整约束与乘子法 ----
            { q: '拉格朗日乘子法用于处理什么问题？', a: '处理<strong>非完整约束</strong>（Pfaflian形式 $\\sum_k a_{\\alpha k}dq_k + a_{\\alpha t}dt = 0$）或<strong>不便约化变量的完整约束</strong>，同时可求出广义约束力。' },
            { q: '乘子法的运动方程形式是什么？', a: '$$\\frac{d}{dt}\\left(\\frac{\\partial L}{\\partial \\dot{q}_i}\\right) - \\frac{\\partial L}{\\partial q_i} = \\sum_\\alpha \\lambda_\\alpha a_{\\alpha i} = Q_i$$ 其中 $Q_i$ 为广义约束力。' },
            { q: '如何用乘子法求无滑滚下斜面铁环的摩擦力？', a: '约束 $R\\theta - x = 0$，引入一个乘子 $\\lambda$。拉格朗日方程给出 $m\\ddot{x} - mg\\sin\\phi = -\\lambda,\\, mR^2\\ddot{\\theta} = \\lambda R$。结合约束解得 $\\ddot{x} = \\frac{g\\sin\\phi}{2}$，约束力 $|Q_x| = |\\lambda| = \\frac{mg\\sin\\phi}{2}$。' },

            // ---- 对称性与诺特定理 ----
            { q: '什么是诺特定理？', a: '作用量的每一个<strong>连续对称性</strong>对应一个守恒量。守恒量 $C_m = \\sum_j \\frac{\\partial L}{\\partial \\dot{q}_j}Q_j$，其中 $Q_j$ 是对称变换的生成元。' },
            { q: '空间平移不变性对应什么守恒量？', a: '<strong>总动量</strong>守恒。对称变换 $x_i\\to x_i+\\epsilon\\hat{n}$，生成元 $Q=\\hat{n}$，守恒量即总动量在 $\\hat{n}$ 方向的分量。' },
            { q: '空间旋转不变性对应什么守恒量？', a: '<strong>总角动量</strong>守恒。绕 $\\hat{n}$ 轴转动无穷小角 $\\epsilon$ 时，生成元 $Q = \\hat{n}\\times\\mathbf{r}_i$，守恒量 $\\hat{n}\\cdot\\sum_i \\mathbf{r}_i\\times\\mathbf{p}_i$。' },
            { q: '时间平移不变性对应什么守恒量？', a: '<strong>能量函数</strong> $h = \\sum_j \\dot{q}_j\\frac{\\partial L}{\\partial \\dot{q}_j} - L$ 守恒。若约束稳定且势能不依赖速度，则 $h = T+V = E$ 为机械能。' },
            { q: '什么是循环坐标？', a: '拉格朗日量中不显含的广义坐标 $q_j$。其共轭动量 $p_j = \\partial L/\\partial \\dot{q}_j$ 守恒。例如：有心力场中的角坐标 $\\theta$。' },
            { q: '能量函数 $h$ 等于总机械能的条件是什么？', a: '① 约束是时间无关的（从而动能 $T$ 是 $\\dot{q}$ 的二次齐次式）；② 势函数不依赖于广义速度。此外 $\\partial L/\\partial t = 0$ 确保 $h$ 守恒。' },

            // ---- 有心力与轨道 ----
            { q: '两体问题如何约化为单体有心力问题？', a: '引入质心坐标 $\\mathbf{R}$ 和相对坐标 $\\mathbf{r}$，质心匀速运动。相对运动的拉格朗日量为 $L = \\frac12\\mu\\dot{r}^2 - V(r)$，其中 $\\mu = m_1 m_2/(m_1+m_2)$ 为约化质量。' },
            { q: '写出一维径向运动的等效能量方程。', a: '$$\\frac12 m \\dot{r}^2 + \\frac{l^2}{2mr^2} + V(r) = E$$ 其中 $l = mr^2\\dot{\\theta}$ 为守恒角动量，$\\frac{l^2}{2mr^2}$ 为离心势。' },
            { q: '什么是比奈（Binet）方程？', a: '$$\\frac{d^2u}{d\\theta^2} + u + \\frac{m}{l^2}\\frac{dV(1/u)}{du} = 0, \\quad u \\equiv \\frac{1}{r}.$$ 用来直接求轨道形状 $r(\\theta)$，而不需先解出 $r(t)$。' },
            { q: '平方反比力 $V=-k/r$ 对应的轨道是什么？', a: '圆锥曲线：$1/r = C(1 + e\\cos\\theta)$，其中偏心率 $e = \\sqrt{1+2El^2/(mk^2)}$。$e<1$ 椭圆，$e=1$ 抛物线，$e>1$ 双曲线，$e=0$ 圆。' },
            { q: '伯特兰定理的内容是什么？', a: '在所有束缚运动中，只有<strong>平方反比力</strong>（$f \\propto r^{-2}$，如引力）和<strong>胡克定律</strong>（$f \\propto r$，弹性力）能给出严格的闭合轨道。其他幂律力的束缚轨道一般不闭合。' },
            { q: '开普勒第二定律的解析表达是什么？', a: '$\\frac{dA}{dt} = \\frac{l}{2m} = \\text{常数}$，其中 $dA = \\frac12 r^2 d\\theta$ 是矢径扫过的面积。该定律对任何有心力均成立。' },

            // ---- 受限三体问题 ----
            { q: '受限三体问题的基本假设是什么？', a: '① $m_1, m_2 \\gg m$（小质量不影响两主天体）；② 两主天体在万有引力下绕质心做<strong>圆轨道</strong>运动；③ 三者在同一平面内。' },
            { q: '同步旋转系中的有效势是什么？', a: '$$V_{\\text{eff}}(\\mathbf{x}) = -\\frac12\\Omega^2(x^2+y^2) - \\frac{Gm_1}{r_1} - \\frac{Gm_2}{r_2}$$ 离心势（负）与引力势之和。同步旋转角速度 $\\Omega^2 = G(m_1+m_2)/R^3$。' },
            { q: '拉格朗日点的定义及个数？', a: '满足 $\\nabla V_{\\text{eff}} = \\mathbf{0}$ 的平衡点，共<strong>5个</strong>。质点在此处若初速为零，则科里奥利力也为零，可保持相对静止。' },
            { q: 'L1、L2、L3 的位置和稳定性？', a: '位于两主天体连线上（共线点），L1在中间，L2在外侧，L3在另一侧远端。它们都是<strong>不稳定</strong>平衡点（鞍点）。' },
            { q: 'L4、L5 的位置和稳定性？', a: '与两主天体构成<strong>等边三角形</strong>，分别位于轨道平面前方和后方。当质量比 $m_2/m_1 \\lesssim 0.04$ 时<strong>稳定</strong>（有效势极小，因科氏力而稳定）。' },
            { q: '希尔半径的定义？', a: '$r_H = R\\left(\\frac{m_2}{3m_1}\\right)^{1/3}$，是较小天体 $m_2$ 的引力主导范围的特征尺度，近似为 L1 或 L2 到 $m_2$ 的距离。' },

            // ---- 哈密顿力学基础 ----
            { q: '什么是勒让德变换？', a: '从 $L(q,\\dot{q},t)$ 到 $H(q,p,t) = \\dot{q}_i p_i - L$ 的变换，其中 $p_i = \\partial L/\\partial \\dot{q}_i$。要求 $L$ 关于 $\\dot{q}$ 是凸函数，保证 $p$ 与 $\\dot{q}$ 一一对应。' },
            { q: '什么是相空间？', a: '由广义坐标 $q_i$ 和共轭动量 $p_i$ 构成的 $2n$ 维空间。系统状态由相空间中的一点表示，演化轨迹为相空间曲线。相空间是位形空间的<strong>余切丛</strong>。' },
            { q: '哈密顿正则方程是什么？', a: '$$\\dot{q}_i = \\frac{\\partial H}{\\partial p_i}, \\quad \\dot{p}_i = -\\frac{\\partial H}{\\partial q_i} \\qquad (i=1,\\dots,n)$$ 共 $2n$ 个一阶方程，$q$ 和 $p$ 地位对称。' },
            { q: '电磁场中粒子的哈密顿量如何写？', a: '$$H = \\frac{(\\mathbf{p} - q\\mathbf{A})^2}{2m} + q\\phi$$ 注意 $\\mathbf{p}$ 是正则动量，机械动量为 $m\\mathbf{v} = \\mathbf{p} - q\\mathbf{A}$。这里 $H$ 等于总能量，但不等于 $T+V$（因为磁矢势贡献）。' },
            { q: '哈密顿量的时间导数如何？何时守恒？', a: '$\\frac{dH}{dt} = \\frac{\\partial H}{\\partial t}$。若哈密顿量不显含时间（$\\partial H/\\partial t = 0$），则 $H$ 守恒。注意 $H$ 守恒不一定等于能量守恒。' },

            // ---- 潘宁阱 ----
            { q: '潘宁阱的基本结构和用途？', a: '由两个罩电极和一个环电极（旋转双曲面）加上轴向磁场构成，用于<strong>囚禁带电粒子</strong>。1989年诺贝尔奖工作利用它精密测量了电子的 g 因子。' },
            { q: '潘宁阱中粒子的运动可分为哪几个特征频率？', a: '轴向简谐振动频率 $\\omega_z$，以及 $x$-$y$ 平面内的修正回旋频率 $\\omega_+$ 和磁控管频率 $\\omega_-$，二者满足 $\\omega_\\pm = \\frac12(\\omega_c \\pm \\sqrt{\\omega_c^2-2\\omega_z^2})$，需要 $\\omega_c^2 > 2\\omega_z^2$ 以实现稳定约束。' },

            // ---- 3D转动与欧拉角 ----
            { q: '刚体转动用几个独立参数描述？', a: '3个。转动矩阵 $A\\in\\mathrm{SO}(3)$ 有9个元素，但正交条件 $A^TA=I$ 给出6个约束，独立参数为3个。' },
            { q: '欧拉角 $\\phi,\\theta,\\psi$ 的物理意义？', a: '$\\phi$：绕空间 $z$ 轴进动角；$\\theta$：绕节线（$\\xi$ 轴）章动角；$\\psi$：绕体 $z\'$ 轴自转角。典型约定：$A = BCD$，$C$ 绕 $\\xi$ 轴转 $\\theta$。' },
            { q: '什么是万向节锁死？', a: '当 $\\theta=0$ 时，欧拉角 $\\phi$ 和 $\\psi$ 不再独立，失去一个自由度。参数空间从三维环面 $T^3$ 映射到转动群（$\\mathbb{RP}^3$）时无法全局一一对应。四元数/SU(2)表示可避免。' },
            { q: '四元数或SU(2)如何表示转动？', a: '用复二维特殊幺正矩阵 $Q\\in\\mathrm{SU}(2)$，满足 $\\det Q=1$。$Q$ 与三维矢量矩阵 $M=x_i\\sigma_i$ 作用：$M\' = QMQ^\\dagger$ 诱导纯转动。参数空间为三维球面 $S^3$，<strong>双覆盖</strong> SO(3)。' },

            // ---- 重陀螺定点转动 ----
            { q: '对称重陀螺的拉格朗日量用欧拉角如何表达？', a: '$$L = \\frac{I_1}{2}(\\dot{\\theta}^2 + \\dot{\\phi}^2\\sin^2\\theta) + \\frac{I_3}{2}(\\dot{\\phi}\\cos\\theta + \\dot{\\psi})^2 - Mgl\\cos\\theta$$ 其中 $I_1 = I_2$。' },
            { q: '为什么 $\\phi$ 和 $\\psi$ 是循环坐标？', a: '拉格朗日量不显含 $\\phi$ 和 $\\psi$，因此其共轭动量 $p_\\phi$ 和 $p_\\psi$ 守恒，分别对应<strong>角动量沿空间 $z$ 轴分量</strong>和<strong>绕体对称轴的自转角动量</strong>。' },
            { q: '章动角 $\\theta$ 的运动等效于什么？', a: '等效于质量为 $I_1$ 的质点在一维有效势 $V_{\\text{eff}}(\\theta) = \\frac{(p_\\phi-p_\\psi\\cos\\theta)^2}{2I_1\\sin^2\\theta} + Mgl\\cos\\theta$ 中运动，能量守恒给出 $\\frac12 I_1\\dot{\\theta}^2 + V_{\\text{eff}}(\\theta) = \\text{const.}$' },
            { q: '规则进动的条件是什么？', a: '章动角无变化：$\\dot{\\theta}=0$，且 $\\dot{\\phi}$ 为常数。此时需满足 $Mgl = \\dot{\\phi}(I_3\\omega_3 - I_1\\dot{\\phi}\\cos\\theta_0)$。' },
            { q: '快进动和慢进动分别如何近似？', a: '<strong>慢进动</strong>：$\\dot{\\phi} \\approx \\frac{Mgl}{I_3\\omega_3}$（要求自转很快）；<strong>快进动</strong>：$\\dot{\\phi} \\approx \\frac{I_3\\omega_3}{I_1\\cos\\theta_0}$（要求进动远大于重力项）。' },
            { q: '磁场中磁偶极子的拉摩进动频率？', a: '$\\omega_L = -\\gamma B$，其中磁矩 $\\boldsymbol{\\mu} = \\gamma \\mathbf{L}$。对于经典带电体 $\\gamma = q/(2m)$（$g=1$），对于电子自旋 $\\gamma = g q/(2m)$ 且 $g\\approx2$。' },

            // ---- 莫佩蒂原理与雅可比形式 ----
            { q: '莫佩蒂原理（最小作用量原理 Δ 变分）的核心思想？', a: '在<strong>等能不等时</strong>的变分下，真实路径使简约作用量 $\\Delta\\int \\sum p_i dq_i = 0$ 取极值。与哈密顿原理（等时不等能）互补。' },
            { q: '雅可比形式的最小作用量原理如何表述？', a: '若约束稳定、势场保守，有 $\\Delta\\int\\sqrt{2(E-V)}\\,ds = 0$，其中 $ds$ 是位形空间的线元。真实轨道对应位形空间中<strong>短程线</strong>。' },
            { q: '均匀重力场中质点运动如何用雅可比形式求解？', a: '取 $x$ 为独立变量，$ds^2 = m(1+y\'^2)dx^2$，被积函数 $f=\\sqrt{2(E-mgy)}\\sqrt{m(1+y\'^2)}$。由 $f - y\'\\frac{\\partial f}{\\partial y\'}=C$ 积分得抛物线轨迹。' },
            { q: '经典 $g$ 因子与量子 $g$ 因子的差异？', a: '经典：$\\boldsymbol{\\mu} = \\frac{q}{2m}\\mathbf{L}$，$g=1$；狄拉克电子：$\\boldsymbol{\\mu} = g\\frac{q}{2m}\\mathbf{S}$，$g\\approx2$；质子 $g\\approx2.8$，中子 $g\\approx-1.9$（复合粒子内部结构）。' },
            { q: '诺特定理中守恒量的一般表达式？', a: '对于连续对称变换 $q_j \\to q_j + \\epsilon Q_j$，若拉格朗日量不变，则守恒量 $C = \\sum_j \\frac{\\partial L}{\\partial \\dot{q}_j}Q_j$。若变换还导致 $L$ 改变一个时间全导数，守恒量形式需调整。' },
            { q: '有心力场中角动量守恒的根源是什么？', a: '系统的拉格朗日量具有<strong>旋转对称性</strong>（各向同性），角坐标 $\\theta$ 为循环坐标，其共轭动量（角动量）守恒。亦可由诺特定理导出。' },
            { q: '为什么说"哈密顿力学与量子力学具有相似性"？', a: '哈密顿力学中的正则变量对 $(q,p)$ 满足的泊松括号结构与量子力学中对易关系 $[\\hat{q},\\hat{p}]=i\\hbar$ 形式一致；此外，哈密顿-雅可比方程与薛定谔方程有密切联系。' },
            { q: '什么是作用量？', a: '作用量 $I = \\int_{t_1}^{t_2} L\\,dt$。在哈密顿原理中，真实运动使 $I$ 取极值；在路径积分量子化中，所有路径的贡献由 $e^{iI/\\hbar}$ 决定。' },
        ];

        let currentIndex = 0;
        let isFlipped = false;

        function updateCard() {
            const card = document.getElementById('flashcard');
            const q = flashcardsData[currentIndex].q;
            const a = flashcardsData[currentIndex].a;
            document.getElementById('fcQuestion').innerHTML = q;
            document.getElementById('fcAnswer').innerHTML = a;
            document.getElementById('fcTotal').textContent = flashcardsData.length;
            document.getElementById('fcNum').textContent = currentIndex + 1;
            isFlipped = false;
            card.classList.remove('flipped');
            if (window.MathJax) MathJax.typesetPromise();
        }

        function flipCard() {
            const card = document.getElementById('flashcard');
            card.classList.toggle('flipped');
            isFlipped = !isFlipped;
        }

        function nextCard(e) {
            if (e) e.stopPropagation();
            currentIndex = (currentIndex + 1) % flashcardsData.length;
            updateCard();
        }

        function prevCard(e) {
            if (e) e.stopPropagation();
            currentIndex = (currentIndex - 1 + flashcardsData.length) % flashcardsData.length;
            updateCard();
        }

        function shuffleCards(e) {
            if (e) e.stopPropagation();
            for (let i = flashcardsData.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [flashcardsData[i], flashcardsData[j]] = [flashcardsData[j], flashcardsData[i]];
            }
            currentIndex = 0;
            updateCard();
        }

        // Sidebar drawer
        function toggleSidebar() {
            const sidebar = document.querySelector('.sidebar');
            const backdrop = document.querySelector('.sidebar-backdrop');
            const btn = document.querySelector('.menu-toggle');
            const isOpen = sidebar.classList.contains('open');
            if (isOpen) {
                sidebar.classList.remove('open');
                backdrop.classList.remove('active');
                btn.classList.remove('active');
                document.body.style.overflow = '';
            } else {
                sidebar.classList.add('open');
                backdrop.classList.add('active');
                btn.classList.add('active');
                document.body.style.overflow = 'hidden';
            }
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') toggleSidebar(); });
        document.querySelectorAll('.sidebar a').forEach(link => {
            link.addEventListener('click', () => { if (window.innerWidth <= 768) toggleSidebar(); });
        });

        // Touch swipe for flashcards
        let touchStartX = 0;
        document.getElementById('flashcardContainer').addEventListener('touchstart', e => {
            touchStartX = e.changedTouches[0].screenX;
        });
        document.getElementById('flashcardContainer').addEventListener('touchend', e => {
            const diff = e.changedTouches[0].screenX - touchStartX;
            if (Math.abs(diff) > 50) { diff > 0 ? prevCard() : nextCard(); }
        });

        updateCard();
    </script>
</body>
</html>
